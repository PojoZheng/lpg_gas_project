<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安检上报</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page {
        min-height: 100vh;
        padding: 16px 14px calc(188px + env(safe-area-inset-bottom, 0px));
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .hero-card {
        padding: 16px;
        background: linear-gradient(180deg, #ffffff 0%, #f5fbfb 100%);
        border-color: #d7e8ea;
      }
      .hero-top,
      .section-head,
      .status-row,
      .photo-meta,
      .action-row,
      .abnormal-actions,
      .dock-secondary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .hero-kicker,
      .section-kicker,
      .meta-label {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .order-no {
        margin-top: 6px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2px;
        font-family: var(--font-title);
      }
      .hero-copy {
        margin: 8px 0 0;
        font-size: 13px;
        line-height: 1.6;
        color: #5a666b;
      }
      .status-pill,
      .mini-pill {
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #d7e8ea;
        background: #f4fafb;
        color: var(--brand);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }
      .status-pill.pending { background: #f4fafb; color: var(--brand); }
      .status-pill.failed { background: #fff3f0; border-color: #f2d3cb; color: #c65c37; }
      .status-pill.completed { background: #eff8f1; border-color: #cfe7d5; color: #20804f; }
      .step-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }
      .step-chip {
        min-height: 54px;
        padding: 10px;
        border-radius: 14px;
        background: #fbfcfd;
        border: 1px solid #e5edef;
        display: grid;
        gap: 4px;
      }
      .step-chip strong {
        font-size: 13px;
        font-weight: 700;
      }
      .step-chip span {
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1.4;
      }
      .check-list {
        display: grid;
        gap: 10px;
      }
      .check-item {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 10px;
        align-items: start;
        padding: 12px;
        border: 1px solid #deebed;
        border-radius: 16px;
        background: #fbfcfd;
      }
      .check-item input {
        margin: 1px 0 0;
        width: 18px;
        height: 18px;
        accent-color: var(--brand);
      }
      .check-copy {
        display: grid;
        gap: 4px;
      }
      .check-title {
        font-size: 14px;
        font-weight: 700;
      }
      .check-desc {
        font-size: 12px;
        line-height: 1.5;
        color: var(--text-secondary);
      }
      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .chip-btn,
      .hazard-chip,
      .photo-add-btn,
      .photo-tag {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #d6e8ea;
        background: #fff;
        color: var(--text-primary);
        font-size: 13px;
      }
      .chip-btn.active,
      .hazard-chip.active,
      .photo-tag {
        background: var(--brand-soft);
        border-color: var(--brand);
        color: var(--brand);
      }
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .photo-tile,
      .photo-placeholder {
        aspect-ratio: 1 / 1;
        border-radius: 18px;
        border: 1px dashed #c7dbe0;
        background: #f7fbfb;
      }
      .photo-tile {
        border-style: solid;
        overflow: hidden;
        position: relative;
      }
      .photo-tile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .photo-tile button {
        position: absolute;
        right: 8px;
        top: 8px;
        width: 26px;
        height: 26px;
        border: none;
        border-radius: 999px;
        background: rgba(66, 73, 73, 0.74);
        color: #fff;
        font-size: 16px;
      }
      .photo-placeholder {
        display: grid;
        place-items: center;
        color: #93a6ac;
        font-size: 28px;
      }
      .photo-caption {
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      .tone-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .tone-btn {
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid #d6e8ea;
        background: #fff;
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
      }
      .tone-btn.active {
        background: var(--brand-soft);
        border-color: var(--brand);
        color: var(--brand);
      }
      .abnormal-panel[hidden] { display: none; }
      .abnormal-panel {
        margin-top: 12px;
        padding: 12px;
        border-radius: 16px;
        background: #fff8f3;
        border: 1px solid #f1ddd0;
        display: grid;
        gap: 10px;
      }
      .hazard-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .field-label {
        font-size: 13px;
        font-weight: 600;
      }
      textarea {
        width: 100%;
        min-height: 92px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        resize: vertical;
        font: inherit;
        color: var(--text-primary);
      }
      .history-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .history-item {
        padding: 10px 12px;
        border-radius: 14px;
        background: #fbfcfd;
        border: 1px solid #e7edef;
        display: grid;
        gap: 4px;
      }
      .history-main {
        font-size: 13px;
        font-weight: 600;
      }
      .history-sub {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .tip {
        min-height: 20px;
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-secondary);
      }
      .err { color: #b42318; }
      .dock-wrap {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
        background: linear-gradient(180deg, rgba(247, 248, 250, 0) 0%, rgba(247, 248, 250, 0.94) 16%, rgba(247, 248, 250, 0.99) 100%);
      }
      .dock-card {
        max-width: 460px;
        margin: 0 auto;
        padding: 12px;
        border-radius: 20px;
        border: 1px solid #dbe7ea;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 28px rgba(35, 55, 58, 0.08);
      }
      .dock-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .dock-secondary-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .dock-status {
        min-height: 20px;
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-secondary);
      }
      .hidden-input { display: none; }
      .app-btn:disabled,
      .photo-add-btn:disabled,
      .chip-btn:disabled,
      .tone-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      @media (max-width: 380px) {
        .step-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .photo-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="app-header">
        <button class="back-icon-btn" id="backBtn" aria-label="返回上一页"></button>
        <h1 class="app-title">安检上报</h1>
        <div style="width: 38px"></div>
      </header>

      <section class="card hero-card">
        <div class="hero-top">
          <div>
            <div class="hero-kicker">本次完单安检</div>
            <div class="order-no" id="orderText">订单号</div>
          </div>
          <div class="status-pill pending" id="statusPill">待上报</div>
        </div>
        <p class="hero-copy" id="heroCopy">按顺序完成检查项、补现场照片，再决定是否存在隐患。异常时补充说明后再提交。</p>
        <div class="step-strip">
          <div class="step-chip"><strong>1. 检查</strong><span>勾选已完成的安检动作</span></div>
          <div class="step-chip"><strong>2. 拍照</strong><span>至少补 1 张现场照片</span></div>
          <div class="step-chip"><strong>3. 判断</strong><span>正常直提，异常补隐患说明</span></div>
          <div class="step-chip"><strong>4. 上报</strong><span>失败可直接重试</span></div>
        </div>
      </section>

      <section class="card" id="safetyCard" aria-labelledby="safetyCardTitle">
        <div class="section-head">
          <div>
            <div class="section-kicker">安检检查项</div>
            <h2 class="app-card-title" id="safetyCardTitle">至少选择 1 项</h2>
          </div>
          <div class="mini-pill" id="selectedCount">已选 0 项</div>
        </div>
        <div class="check-list">
          <label class="check-item"><input type="checkbox" class="safety-check" value="阀门密封检查" /><span class="check-copy"><span class="check-title">阀门密封检查</span><span class="check-desc">确认接口无松动、无漏气、无明显损伤。</span></span></label>
          <label class="check-item"><input type="checkbox" class="safety-check" value="减压阀连接检查" /><span class="check-copy"><span class="check-title">减压阀连接检查</span><span class="check-desc">检查连接方向、卡扣与减压阀状态是否正常。</span></span></label>
          <label class="check-item"><input type="checkbox" class="safety-check" value="软管老化检查" /><span class="check-copy"><span class="check-title">软管老化检查</span><span class="check-desc">确认软管无老化、龟裂、过长或被挤压。</span></span></label>
          <label class="check-item"><input type="checkbox" class="safety-check" value="通风环境检查" /><span class="check-copy"><span class="check-title">通风环境检查</span><span class="check-desc">确认用气环境通风正常，周边无明显风险源。</span></span></label>
        </div>
        <div class="quick-actions">
          <button type="button" class="chip-btn" id="selectAllBtn">常规项全选</button>
          <button type="button" class="chip-btn" id="clearChecksBtn">清空</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">现场照片</div>
            <h2 class="app-card-title">至少 1 张</h2>
          </div>
          <button type="button" class="photo-add-btn" id="addPhotoBtn">添加照片</button>
        </div>
        <div class="photo-meta">
          <span class="meta-label">优先拍现场环境、阀门连接、气瓶摆放</span>
          <span class="mini-pill" id="photoCount">0 张</span>
        </div>
        <input class="hidden-input" id="photoFileInput" type="file" accept="image/*" multiple />
        <div class="photo-grid" id="photoGrid">
          <div class="photo-placeholder">+</div>
        </div>
        <div class="photo-caption">当前为原型态，照片会本地预览，并按编号写入安检上报。</div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">异常判断</div>
            <h2 class="app-card-title">正常可直接提交</h2>
          </div>
          <div class="mini-pill" id="abnormalStatePill">当前：正常</div>
        </div>
        <div class="tone-switch">
          <button type="button" class="tone-btn active" id="normalBtn">正常</button>
          <button type="button" class="tone-btn" id="abnormalBtn">发现隐患</button>
        </div>
        <div class="abnormal-panel" id="abnormalPanel" hidden>
          <div>
            <div class="field-label">快速标记</div>
            <div class="hazard-grid">
              <button type="button" class="hazard-chip" data-note="疑似漏气">疑似漏气</button>
              <button type="button" class="hazard-chip" data-note="软管老化">软管老化</button>
              <button type="button" class="hazard-chip" data-note="阀门松动">阀门松动</button>
              <button type="button" class="hazard-chip" data-note="摆放不规范">摆放不规范</button>
            </div>
          </div>
          <div>
            <div class="field-label">隐患说明</div>
            <textarea id="hazardInput" placeholder="请补充隐患位置、现象、是否已现场提醒客户"></textarea>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="status-row">
          <div>
            <div class="section-kicker">上报状态</div>
            <h2 class="app-card-title" style="margin-bottom: 0">可重试，可回看</h2>
          </div>
          <div class="mini-pill" id="attemptCount">0 次</div>
        </div>
        <div class="tip" id="tip"></div>
        <div class="history-list" id="historyList"></div>
      </section>
    </main>

    <div class="dock-wrap" role="region" aria-label="安检操作区">
      <div class="dock-card">
        <div class="dock-actions">
          <button class="app-btn primary" id="submitBtn">提交安检并上报</button>
          <div class="dock-secondary-row">
            <button class="app-btn ghost" id="retryBtn">失败重试</button>
            <button class="app-btn" id="backWorkbenchBtn">返回结果页</button>
          </div>
        </div>
        <div class="dock-status" id="dockStatus" aria-live="polite"></div>
      </div>
    </div>

    <script type="module">
      import { ensureAuthenticatedPage } from "./auth-client.js";
      import { goBackOr } from "./app-shell.js";
      import {
        fetchCurrentPlatformPolicy,
        fetchSafetyByOrder,
        submitSafetyByOrder,
        retrySafetyReport,
      } from "./delivery-complete-client.js";
      import { getFlowState } from "./delivery-flow-state.js";

      if (!ensureAuthenticatedPage()) throw new Error("未登录");

      const flow = getFlowState();
      const orderId = flow.lastComplete?.orderId || flow.selectedOrderId || "";
      if (!orderId) window.location.href = "./pending-delivery-list.html";

      let currentSafety = null;
      let localPhotos = [];
      let objectUrls = [];
      let hasAbnormal = false;
      const checks = [...document.querySelectorAll(".safety-check")];
      const tipEl = document.getElementById("tip");
      const dockStatus = document.getElementById("dockStatus");
      const photoGrid = document.getElementById("photoGrid");
      const photoFileInput = document.getElementById("photoFileInput");
      const statusPill = document.getElementById("statusPill");
      const selectedCount = document.getElementById("selectedCount");
      const photoCount = document.getElementById("photoCount");
      const abnormalStatePill = document.getElementById("abnormalStatePill");
      const attemptCount = document.getElementById("attemptCount");
      const historyList = document.getElementById("historyList");
      const heroCopy = document.getElementById("heroCopy");
      const hazardInput = document.getElementById("hazardInput");
      const abnormalPanel = document.getElementById("abnormalPanel");
      const normalBtn = document.getElementById("normalBtn");
      const abnormalBtn = document.getElementById("abnormalBtn");
      const retryBtn = document.getElementById("retryBtn");
      const CHECK_VALUE_SET = new Set(checks.map((item) => item.value));

      function setTip(text, err = false) {
        tipEl.textContent = text || "";
        tipEl.className = `tip ${err ? "err" : ""}`;
        dockStatus.textContent = text || "";
        dockStatus.className = `dock-status ${err ? "err" : ""}`;
      }

      function formatTime(value) {
        if (!value) return "刚刚";
        const date = new Date(value);
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${month}-${day} ${hour}:${minute}`;
      }

      function setStatus(status, lastError = "") {
        const normalized = String(status || "pending");
        statusPill.className = `status-pill ${normalized}`;
        if (normalized === "completed") {
          statusPill.textContent = "已上报";
          heroCopy.textContent = "本次安检已完成监管上报，可直接返回结果页查看订单状态。";
          retryBtn.disabled = true;
          return;
        }
        if (normalized === "failed") {
          statusPill.textContent = "上报失败";
          heroCopy.textContent = lastError || "安检信息已保存，可直接点失败重试继续上报。";
          retryBtn.disabled = false;
          return;
        }
        statusPill.textContent = "待上报";
        heroCopy.textContent = "按顺序完成检查项、补现场照片，再决定是否存在隐患。异常时补充说明后再提交。";
        retryBtn.disabled = !currentSafety?.safetyId;
      }

      function updateSelectedCount() {
        const count = checks.filter((item) => item.checked).length;
        selectedCount.textContent = `已选 ${count} 项`;
      }

      function setAbnormalState(nextValue) {
        hasAbnormal = Boolean(nextValue);
        normalBtn.classList.toggle("active", !hasAbnormal);
        abnormalBtn.classList.toggle("active", hasAbnormal);
        abnormalPanel.hidden = !hasAbnormal;
        abnormalStatePill.textContent = hasAbnormal ? "当前：发现隐患" : "当前：正常";
        if (!hasAbnormal) {
          document.querySelectorAll(".hazard-chip").forEach((chip) => chip.classList.remove("active"));
        }
      }

      function renderPhotos() {
        photoCount.textContent = `${localPhotos.length} 张`;
        if (!localPhotos.length) {
          photoGrid.innerHTML = '<div class="photo-placeholder">+</div>';
          return;
        }
        photoGrid.innerHTML = localPhotos
          .map(
            (photo, index) => `
              <div class="photo-tile">
                <img src="${photo.preview}" alt="安检照片${index + 1}" />
                <button type="button" data-remove-photo="${photo.id}" aria-label="删除照片">×</button>
              </div>
            `,
          )
          .join("");
      }

      function addFiles(files) {
        [...files].slice(0, Math.max(0, 9 - localPhotos.length)).forEach((file, index) => {
          const preview = URL.createObjectURL(file);
          objectUrls.push(preview);
          localPhotos.push({
            id: `img-${Date.now()}-${index}`,
            value: `${file.name}-${Date.now()}`,
            preview,
          });
        });
        renderPhotos();
      }

      function syncFromSafetyRecord(record) {
        currentSafety = record || null;
        if (!record) {
          attemptCount.textContent = "0 次";
          historyList.innerHTML = '<div class="history-item"><div class="history-main">还没有上报记录</div><div class="history-sub">完成检查并提交后，这里会显示最近状态</div></div>';
          setStatus("pending");
          return;
        }
        checks.forEach((item) => {
          item.checked = (record.checkItems || []).includes(item.value);
        });
        updateSelectedCount();
        setAbnormalState(Boolean(record.hasAbnormal));
        hazardInput.value = record.hazardNote || "";
        const customHazard = String(record.hazardNote || "");
        document.querySelectorAll(".hazard-chip").forEach((chip) => {
          chip.classList.toggle("active", customHazard.includes(String(chip.dataset.note || "")));
        });
        if (!localPhotos.length && Array.isArray(record.photoUrls) && record.photoUrls.length) {
          localPhotos = record.photoUrls.map((item, index) => ({
            id: `server-${index}`,
            value: String(item),
            preview: `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect width="120" height="120" rx="18" fill="#eef6f7"/><text x="60" y="54" text-anchor="middle" font-size="14" fill="#4799a0">已录入</text><text x="60" y="76" text-anchor="middle" font-size="10" fill="#6a7272">${String(item).slice(0, 12)}</text></svg>`)}`,
          }));
          renderPhotos();
        }
        attemptCount.textContent = `${Number(record.reportAttempts || 0)} 次`;
        setStatus(record.status, record.lastError || "");
        const logs = Array.isArray(record.reportLogs) ? record.reportLogs : [];
        historyList.innerHTML = logs.length
          ? logs
              .map(
                (log) => `
                  <div class="history-item">
                    <div class="history-main">${log.status === "completed" ? "上报成功" : "上报失败"} · ${String(log.summary || "")}</div>
                    <div class="history-sub">${formatTime(log.at)}</div>
                  </div>
                `,
              )
              .join("")
          : '<div class="history-item"><div class="history-main">还没有上报记录</div><div class="history-sub">提交后会在这里显示最近状态</div></div>';
      }

      async function guardByPolicy() {
        const res = await fetchCurrentPlatformPolicy();
        const required = Boolean(res.success ? res.data?.content?.safetyCheckRequired : true);
        if (!required) {
          window.location.href = "./delivery-result.html";
          return false;
        }
        return true;
      }

      async function loadSafety() {
        const ok = await guardByPolicy();
        if (!ok) return;
        document.getElementById("orderText").textContent = `订单 ${orderId}`;
        setTip("加载安检记录中...");
        const res = await fetchSafetyByOrder(orderId);
        if (!res.success) return setTip(res.error || "读取安检记录失败", true);
        syncFromSafetyRecord(res.data || null);
        setTip("");
      }

      document.getElementById("backBtn").addEventListener("click", () => goBackOr("./delivery-settlement.html"));
      document.getElementById("backWorkbenchBtn").addEventListener("click", () => {
        window.location.href = "./delivery-result.html";
      });
      document.getElementById("selectAllBtn").addEventListener("click", () => {
        checks.forEach((item) => {
          item.checked = true;
        });
        updateSelectedCount();
      });
      document.getElementById("clearChecksBtn").addEventListener("click", () => {
        checks.forEach((item) => {
          item.checked = false;
        });
        updateSelectedCount();
      });
      checks.forEach((item) => item.addEventListener("change", updateSelectedCount));

      normalBtn.addEventListener("click", () => setAbnormalState(false));
      abnormalBtn.addEventListener("click", () => setAbnormalState(true));
      document.querySelectorAll(".hazard-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          chip.classList.toggle("active");
          const notes = [...document.querySelectorAll(".hazard-chip.active")]
            .map((item) => String(item.dataset.note || "").trim())
            .filter(Boolean);
          const extra = String(hazardInput.value || "")
            .split(/\n+/)
            .map((item) => item.trim())
            .filter((item) => item && !notes.includes(item));
          hazardInput.value = [...notes, ...extra].join("\n");
        });
      });

      document.getElementById("addPhotoBtn").addEventListener("click", () => photoFileInput.click());
      photoFileInput.addEventListener("change", (event) => {
        if (event.target.files?.length) addFiles(event.target.files);
        photoFileInput.value = "";
      });
      photoGrid.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-remove-photo]");
        if (!btn) return;
        localPhotos = localPhotos.filter((photo) => photo.id !== btn.dataset.removePhoto);
        renderPhotos();
      });

      document.getElementById("submitBtn").addEventListener("click", async () => {
        const checkItems = checks.filter((item) => item.checked).map((item) => item.value).filter((value) => CHECK_VALUE_SET.has(value));
        const photoUrls = localPhotos.map((item) => item.value).filter(Boolean);
        const hazardNote = String(hazardInput.value || "").trim();

        setTip("正在提交安检...");
        const res = await submitSafetyByOrder(orderId, { checkItems, photoUrls, hasAbnormal, hazardNote });
        if (!res.success) return setTip(res.error || "安检提交失败", true);
        currentSafety = { ...(currentSafety || {}), ...(res.data || {}), checkItems, photoUrls, hasAbnormal, hazardNote };
        setStatus(res.data?.status, res.data?.lastError || "");
        attemptCount.textContent = `${Number(res.data?.reportAttempts || 0)} 次`;
        if (res.data?.status === "completed") {
          historyList.innerHTML = `
            <div class="history-item">
              <div class="history-main">上报成功 · 监管上报成功</div>
              <div class="history-sub">${formatTime(res.data?.updatedAt)}</div>
            </div>
          `;
          setTip("安检上报成功，正在进入结果页");
          window.setTimeout(() => (window.location.href = "./delivery-result.html"), 300);
          return;
        }
        historyList.innerHTML = `
          <div class="history-item">
            <div class="history-main">上报失败 · ${String(res.data?.lastError || "请稍后重试")}</div>
            <div class="history-sub">${formatTime(res.data?.updatedAt)}</div>
          </div>
        `;
        setTip(`当前状态：${res.data?.status || "pending"}，可直接点失败重试`, true);
      });

      retryBtn.addEventListener("click", async () => {
        if (!currentSafety?.safetyId) return setTip("当前无可重试记录", true);
        setTip("正在重试上报...");
        const res = await retrySafetyReport(currentSafety.safetyId);
        if (!res.success) return setTip(res.error || "重试失败", true);
        currentSafety = { ...(currentSafety || {}), ...(res.data || {}) };
        attemptCount.textContent = `${Number(res.data?.reportAttempts || 0)} 次`;
        setStatus(res.data?.status, res.data?.lastError || "");
        historyList.innerHTML = `
          <div class="history-item">
            <div class="history-main">${res.data?.status === "completed" ? "上报成功" : "上报失败"} · ${String(res.data?.lastError || "监管上报成功")}</div>
            <div class="history-sub">${formatTime(res.data?.updatedAt)}</div>
          </div>
        `;
        if (res.data?.status === "completed") {
          setTip("重试成功，正在进入结果页");
          window.setTimeout(() => (window.location.href = "./delivery-result.html"), 300);
          return;
        }
        setTip(`当前状态：${res.data?.status || "pending"}，可继续重试`, true);
      });

      updateSelectedCount();
      setAbnormalState(false);
      renderPhotos();
      void loadSafety();

      window.addEventListener("beforeunload", () => {
        objectUrls.forEach((url) => URL.revokeObjectURL(url));
      });
    </script>
  </body>
</html>
