<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安检上报</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page {
        min-height: 100vh;
        padding: 16px 14px calc(188px + env(safe-area-inset-bottom, 0px));
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .hero-top,
      .section-head,
      .status-row,
      .photo-meta,
      .action-row,
      .abnormal-actions,
      .dock-secondary-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .hero-kicker,
      .section-kicker,
      .meta-label {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .status-pill,
      .mini-pill {
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #d7e8ea;
        background: #f4fafb;
        color: var(--brand);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }
      .check-list {
        display: grid;
        gap: 10px;
      }
      .check-item {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 10px;
        align-items: start;
        padding: 12px;
        border: 1px solid #deebed;
        border-radius: 16px;
        background: #fbfcfd;
      }
      .check-item input {
        margin: 1px 0 0;
        width: 18px;
        height: 18px;
        accent-color: var(--brand);
      }
      .check-copy {
        display: grid;
        gap: 4px;
      }
      .check-title {
        font-size: 14px;
        font-weight: 700;
      }
      .check-desc {
        font-size: 12px;
        line-height: 1.5;
        color: var(--text-secondary);
      }
      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .chip-btn,
      .hazard-chip,
      .photo-add-btn,
      .photo-tag {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #d6e8ea;
        background: #fff;
        color: var(--text-primary);
        font-size: 13px;
      }
      .chip-btn.active,
      .hazard-chip.active,
      .photo-tag {
        background: var(--brand-soft);
        border-color: var(--brand);
        color: var(--brand);
      }
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }
      .photo-tile,
      .photo-placeholder {
        aspect-ratio: 1 / 1;
        border-radius: 18px;
        border: 1px dashed #c7dbe0;
        background: #f7fbfb;
      }
      .photo-tile {
        border-style: solid;
        overflow: hidden;
        position: relative;
      }
      .photo-tile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .photo-tile button {
        position: absolute;
        right: 8px;
        top: 8px;
        width: 26px;
        height: 26px;
        border: none;
        border-radius: 999px;
        background: rgba(66, 73, 73, 0.74);
        color: #fff;
        font-size: 16px;
      }
      .photo-placeholder {
        display: grid;
        place-items: center;
        color: #93a6ac;
        font-size: 28px;
        cursor: pointer;
      }
      .photo-caption {
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      .tone-switch {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .tone-btn {
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid #d6e8ea;
        background: #fff;
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
      }
      .tone-btn.active {
        background: var(--brand-soft);
        border-color: var(--brand);
        color: var(--brand);
      }
      .abnormal-panel[hidden] { display: none; }
      .abnormal-panel {
        margin-top: 12px;
        padding: 12px;
        border-radius: 16px;
        background: #fff8f3;
        border: 1px solid #f1ddd0;
        display: grid;
        gap: 10px;
      }
      .hazard-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .field-label {
        font-size: 13px;
        font-weight: 600;
      }
      textarea {
        width: 100%;
        min-height: 92px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        resize: vertical;
        font: inherit;
        color: var(--text-primary);
      }
      .tip {
        min-height: 20px;
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-secondary);
      }
      .err { color: #b42318; }
      .dock-wrap {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
        background: linear-gradient(180deg, rgba(247, 248, 250, 0) 0%, rgba(247, 248, 250, 0.94) 16%, rgba(247, 248, 250, 0.99) 100%);
      }
      .dock-card {
        max-width: 460px;
        margin: 0 auto;
        padding: 12px;
        border-radius: 20px;
        border: 1px solid #dbe7ea;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 28px rgba(35, 55, 58, 0.08);
      }
      .dock-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .dock-status {
        min-height: 20px;
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-secondary);
      }
      .hidden-input { display: none; }
      .app-btn:disabled,
      .photo-add-btn:disabled,
      .chip-btn:disabled,
      .tone-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      @media (max-width: 380px) {
        .photo-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="app-header">
        <button class="back-icon-btn" id="backBtn" aria-label="返回上一页"></button>
        <h1 class="app-title">安检上报</h1>
        <div style="width: 38px"></div>
      </header>

      <section class="card" id="safetyCard" aria-labelledby="safetyCardTitle">
        <div class="section-head">
          <div>
            <div class="section-kicker">安检检查项</div>
            <h2 class="app-card-title" id="safetyCardTitle">至少选择 1 项</h2>
          </div>
          <div class="mini-pill" id="selectedCount">已选 0 项</div>
        </div>
        <div class="check-list" id="checkList"></div>
        <div class="quick-actions">
          <button type="button" class="chip-btn" id="selectAllBtn">常规项全选</button>
          <button type="button" class="chip-btn" id="clearChecksBtn">清空</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">现场照片</div>
            <h2 class="app-card-title">至少 1 张</h2>
          </div>
          <button type="button" class="photo-add-btn" id="addPhotoBtn">添加照片</button>
        </div>
        <div class="photo-meta">
          <span class="meta-label">优先拍现场环境、阀门连接、气瓶摆放</span>
          <span class="mini-pill" id="photoCount">0 张</span>
        </div>
        <input class="hidden-input" id="photoFileInput" type="file" accept="image/*" capture="environment" multiple />
        <div class="photo-grid" id="photoGrid">
          <div class="photo-placeholder" role="button" tabindex="0" aria-label="添加现场照片">+</div>
        </div>
        <div class="photo-caption">照片会本地预览，并随安检记录一并提交。</div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="section-kicker">异常判断</div>
            <h2 class="app-card-title">正常可直接提交</h2>
          </div>
          <div class="mini-pill" id="abnormalStatePill">当前：正常</div>
        </div>
        <div class="tone-switch">
          <button type="button" class="tone-btn active" id="normalBtn">正常</button>
          <button type="button" class="tone-btn" id="abnormalBtn">发现隐患</button>
        </div>
        <div class="abnormal-panel" id="abnormalPanel" hidden>
          <div>
            <div class="field-label">快速标记</div>
            <div class="hazard-grid">
              <button type="button" class="hazard-chip" data-note="疑似漏气">疑似漏气</button>
              <button type="button" class="hazard-chip" data-note="软管老化">软管老化</button>
              <button type="button" class="hazard-chip" data-note="阀门松动">阀门松动</button>
              <button type="button" class="hazard-chip" data-note="摆放不规范">摆放不规范</button>
            </div>
          </div>
          <div>
            <div class="field-label">隐患说明</div>
            <textarea id="hazardInput" placeholder="请补充隐患位置、现象、是否已现场提醒客户"></textarea>
          </div>
        </div>
      </section>

      <div class="tip" id="tip"></div>
    </main>

    <div class="dock-wrap" role="region" aria-label="安检操作区">
      <div class="dock-card">
        <div class="dock-actions">
          <button class="app-btn primary" id="submitBtn">提交安检并上报</button>
          <button class="app-btn" id="backWorkbenchBtn">返回结果页</button>
        </div>
        <div class="dock-status" id="dockStatus" aria-live="polite"></div>
      </div>
    </div>

    <script src="./runtime-config.js"></script>
    <script type="module">
      import { ensureAuthenticatedPage } from "./auth-client.js";
      import {
        fetchCurrentPlatformPolicy,
        fetchOrderById,
        fetchSafetyByOrder,
        submitSafetyByOrder,
      } from "./delivery-complete-client.js";
      import { enqueueOfflineChange, submitOfflineQueueBatch } from "./offline-sync-client.js";
      import { getFlowState, patchFlowState } from "./delivery-flow-state.js";

      if (!ensureAuthenticatedPage()) throw new Error("未登录");

      const flow = getFlowState();
      const orderId = flow.selectedOrderId || flow.lastComplete?.orderId || "";
      if (!orderId) window.location.href = "./pending-delivery-list.html";

      let currentSafety = null;
      let localPhotos = [];
      let hasAbnormal = false;
      let checks = [];
      const fallbackChecks = [
        { value: "阀门密封检查", title: "阀门密封检查", desc: "确认接口无松动、无漏气、无明显损伤。" },
        { value: "减压阀连接检查", title: "减压阀连接检查", desc: "检查连接方向、卡扣与减压阀状态是否正常。" },
        { value: "软管老化检查", title: "软管老化检查", desc: "确认软管无老化、龟裂、过长或被挤压。" },
        { value: "通风环境检查", title: "通风环境检查", desc: "确认用气环境通风正常，周边无明显风险源。" },
      ];
      const tipEl = document.getElementById("tip");
      const dockStatus = document.getElementById("dockStatus");
      const photoGrid = document.getElementById("photoGrid");
      const photoFileInput = document.getElementById("photoFileInput");
      const selectedCount = document.getElementById("selectedCount");
      const photoCount = document.getElementById("photoCount");
      const abnormalStatePill = document.getElementById("abnormalStatePill");
      const hazardInput = document.getElementById("hazardInput");
      const abnormalPanel = document.getElementById("abnormalPanel");
      const normalBtn = document.getElementById("normalBtn");
      const abnormalBtn = document.getElementById("abnormalBtn");
      const checkList = document.getElementById("checkList");
      let CHECK_VALUE_SET = new Set();

      function setTip(text, err = false) {
        tipEl.textContent = text || "";
        tipEl.className = `tip ${err ? "err" : ""}`;
        dockStatus.textContent = text || "";
        dockStatus.className = `dock-status ${err ? "err" : ""}`;
      }

      function formatTime(value) {
        if (!value) return "刚刚";
        const date = new Date(value);
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hour = String(date.getHours()).padStart(2, "0");
        const minute = String(date.getMinutes()).padStart(2, "0");
        return `${month}-${day} ${hour}:${minute}`;
      }

      function escapeHtml(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function updateSelectedCount() {
        const count = checks.filter((item) => item.checked).length;
        selectedCount.textContent = `已选 ${count} 项`;
      }

      function normalizePolicyCheckItems(policy) {
        const configured = Array.isArray(policy?.content?.inspection?.delivery?.checkItems)
          ? policy.content.inspection.delivery.checkItems
          : [];
        const normalizedConfigured = configured
          .map((item, index) => {
            if (typeof item === "string") {
              return {
                value: item.trim(),
                title: item.trim(),
                desc: "按平台安检策略执行。",
                order: index,
              };
            }
            const value = String(item?.value || item?.key || item?.name || item?.title || "").trim();
            const title = String(item?.title || item?.name || value).trim();
            if (!value || !title) return null;
            return {
              value,
              title,
              desc: String(item?.desc || item?.description || "按平台安检策略执行。").trim(),
              order: index,
            };
          })
          .filter(Boolean);
        if (normalizedConfigured.length) return normalizedConfigured;

        const aiItems = Array.isArray(policy?.content?.inspection?.delivery?.aiItems)
          ? policy.content.inspection.delivery.aiItems
          : [];
        const requiredPhotos = Array.isArray(policy?.content?.inspection?.delivery?.requiredPhotos)
          ? policy.content.inspection.delivery.requiredPhotos
          : [];
        const inferred = [];
        if (aiItems.includes("cylinder") || requiredPhotos.includes("cylinder")) {
          inferred.push({
            value: "瓶体外观检查",
            title: "瓶体外观检查",
            desc: "确认钢瓶瓶体、角阀与瓶身标识无明显异常。",
          });
        }
        if (aiItems.includes("hose")) {
          inferred.push({
            value: "软管老化检查",
            title: "软管老化检查",
            desc: "确认软管无老化、龟裂、过长或被挤压。",
          });
        }
        if (requiredPhotos.includes("environment")) {
          inferred.push({
            value: "通风环境检查",
            title: "通风环境检查",
            desc: "确认用气环境通风正常，周边无明显风险源。",
          });
        }
        inferred.push({
          value: "阀门密封检查",
          title: "阀门密封检查",
          desc: "确认接口无松动、无漏气、无明显损伤。",
        });
        const deduped = [];
        const seen = new Set();
        [...inferred, ...fallbackChecks].forEach((item) => {
          if (!item?.value || seen.has(item.value)) return;
          seen.add(item.value);
          deduped.push(item);
        });
        return deduped;
      }

      function bindCheckEvents() {
        checks.forEach((item) => item.addEventListener("change", updateSelectedCount));
      }

      function renderChecks(items) {
        const rows = Array.isArray(items) && items.length ? items : fallbackChecks;
        checkList.innerHTML = rows
          .map(
            (item) => `
              <label class="check-item">
                <input type="checkbox" class="safety-check" value="${escapeHtml(item.value)}" />
                <span class="check-copy">
                  <span class="check-title">${escapeHtml(item.title)}</span>
                  <span class="check-desc">${escapeHtml(item.desc || "按平台安检策略执行。")}</span>
                </span>
              </label>
            `
          )
          .join("");
        checks = [...checkList.querySelectorAll(".safety-check")];
        CHECK_VALUE_SET = new Set(checks.map((item) => item.value));
        bindCheckEvents();
        updateSelectedCount();
      }

      function setAbnormalState(nextValue) {
        hasAbnormal = Boolean(nextValue);
        normalBtn.classList.toggle("active", !hasAbnormal);
        abnormalBtn.classList.toggle("active", hasAbnormal);
        abnormalPanel.hidden = !hasAbnormal;
        abnormalStatePill.textContent = hasAbnormal ? "当前：发现隐患" : "当前：正常";
        if (!hasAbnormal) {
          document.querySelectorAll(".hazard-chip").forEach((chip) => chip.classList.remove("active"));
        }
      }

      function renderPhotos() {
        photoCount.textContent = `${localPhotos.length} 张`;
        if (!localPhotos.length) {
          photoGrid.innerHTML = '<div class="photo-placeholder" role="button" tabindex="0" aria-label="添加现场照片">+</div>';
          return;
        }
        photoGrid.innerHTML = localPhotos
          .map(
            (photo, index) => `
              <div class="photo-tile">
                <img src="${photo.preview}" alt="安检照片${index + 1}" />
                <button type="button" data-remove-photo="${photo.id}" aria-label="删除照片">×</button>
              </div>
            `,
          )
          .join("");
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("照片读取失败"));
          reader.readAsDataURL(file);
        });
      }

      async function addFiles(files) {
        const pickedFiles = [...files].slice(0, Math.max(0, 9 - localPhotos.length));
        if (!pickedFiles.length) return;
        try {
          const photos = await Promise.all(
            pickedFiles.map(async (file, index) => {
              const dataUrl = await readFileAsDataUrl(file);
              return {
                id: `img-${Date.now()}-${index}`,
                value: dataUrl,
                preview: dataUrl,
                name: String(file.name || `photo-${index + 1}`),
              };
            })
          );
          localPhotos.push(...photos);
          renderPhotos();
          setTip(`已添加 ${photos.length} 张现场照片`);
        } catch (err) {
          setTip(err.message || "照片读取失败", true);
        }
      }

      function syncFromSafetyRecord(record) {
        currentSafety = record || null;
        if (!record) {
          return;
        }
        checks.forEach((item) => {
          item.checked = (record.checkItems || []).includes(item.value);
        });
        updateSelectedCount();
        setAbnormalState(Boolean(record.hasAbnormal));
        hazardInput.value = record.hazardNote || "";
        const customHazard = String(record.hazardNote || "");
        document.querySelectorAll(".hazard-chip").forEach((chip) => {
          chip.classList.toggle("active", customHazard.includes(String(chip.dataset.note || "")));
        });
        if (!localPhotos.length && Array.isArray(record.photoUrls) && record.photoUrls.length) {
          localPhotos = record.photoUrls.map((item, index) => ({
            id: `server-${index}`,
            value: String(item),
            preview: `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect width="120" height="120" rx="18" fill="#eef6f7"/><text x="60" y="54" text-anchor="middle" font-size="14" fill="#4799a0">已录入</text><text x="60" y="76" text-anchor="middle" font-size="10" fill="#6a7272">${String(item).slice(0, 12)}</text></svg>`)}`,
          }));
          renderPhotos();
        }
      }

      async function flushOfflineSafetyQueue() {
        if (!navigator.onLine) return false;
        const res = await submitOfflineQueueBatch();
        if (!res.success) return false;
        return true;
      }

      async function enqueueSafetyOffline(mode, payload, fallbackRecord = {}) {
        const res = await enqueueOfflineChange({
          entityType: "safety",
          action: "sync",
          payload: {
            mode,
            ...payload,
          },
        });
        currentSafety = {
          ...(currentSafety || {}),
          ...fallbackRecord,
          status: "failed",
          lastError: "已加入离线队列，联网后自动补传",
        };
        if (!res.success) {
          setTip(res.error || "加入离线队列失败", true);
          return false;
        }
        setTip("已加入离线队列，联网后自动补传");
        return true;
      }

      async function guardByPolicy() {
        const res = await fetchCurrentPlatformPolicy();
        const required = Boolean(res.success ? res.data?.content?.safetyCheckRequired : true);
        renderChecks(normalizePolicyCheckItems(res.success ? res.data : null));
        if (!required) {
          window.location.href = "./delivery-result.html";
          return false;
        }
        return true;
      }

      async function loadSafety() {
        const ok = await guardByPolicy();
        if (!ok) return;
        const orderRes = await fetchOrderById(orderId);
        if (orderRes?.success && orderRes.data) {
          patchFlowState({
            selectedOrderId: orderId,
            selectedOrder: orderRes.data,
          });
        }
        setTip("加载安检记录中...");
        const res = await fetchSafetyByOrder(orderId);
        if (!res.success) return setTip(res.error || "读取安检记录失败", true);
        syncFromSafetyRecord(res.data || null);
        setTip("");
      }

      document.getElementById("backBtn").addEventListener("click", () => {
        window.location.href = "./delivery-settlement.html";
      });
      document.getElementById("backWorkbenchBtn").addEventListener("click", () => {
        window.location.href = "./delivery-result.html";
      });
      document.getElementById("selectAllBtn").addEventListener("click", () => {
        checks.forEach((item) => {
          item.checked = true;
        });
        updateSelectedCount();
      });
      document.getElementById("clearChecksBtn").addEventListener("click", () => {
        checks.forEach((item) => {
          item.checked = false;
        });
        updateSelectedCount();
      });

      normalBtn.addEventListener("click", () => setAbnormalState(false));
      abnormalBtn.addEventListener("click", () => setAbnormalState(true));
      document.querySelectorAll(".hazard-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          chip.classList.toggle("active");
          const notes = [...document.querySelectorAll(".hazard-chip.active")]
            .map((item) => String(item.dataset.note || "").trim())
            .filter(Boolean);
          const extra = String(hazardInput.value || "")
            .split(/\n+/)
            .map((item) => item.trim())
            .filter((item) => item && !notes.includes(item));
          hazardInput.value = [...notes, ...extra].join("\n");
        });
      });

      document.getElementById("addPhotoBtn").addEventListener("click", () => photoFileInput.click());
      photoFileInput.addEventListener("change", (event) => {
        if (event.target.files?.length) void addFiles(event.target.files);
        photoFileInput.value = "";
      });
      photoGrid.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-remove-photo]");
        if (btn) {
          localPhotos = localPhotos.filter((photo) => photo.id !== btn.dataset.removePhoto);
          renderPhotos();
          return;
        }
        const placeholder = event.target.closest(".photo-placeholder");
        if (placeholder) {
          photoFileInput.click();
        }
      });
      photoGrid.addEventListener("keydown", (event) => {
        const placeholder = event.target.closest(".photo-placeholder");
        if (!placeholder) return;
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        photoFileInput.click();
      });

      document.getElementById("submitBtn").addEventListener("click", async () => {
        const checkItems = checks.filter((item) => item.checked).map((item) => item.value).filter((value) => CHECK_VALUE_SET.has(value));
        const photoUrls = localPhotos.map((item) => item.value).filter(Boolean);
        const hazardNote = String(hazardInput.value || "").trim();
        const submitPayload = { checkItems, photoUrls, hasAbnormal, hazardNote };

        setTip("正在提交安检...");
        const res = await submitSafetyByOrder(orderId, submitPayload);
        if (!res.success) {
          if (res.error_code === "VALIDATION_400" || res.error_code === "ORDER_409_STATUS") {
            setTip(res.error || "安检信息校验失败", true);
            return;
          }
          await enqueueSafetyOffline("submit", { orderId, submitPayload }, submitPayload);
          return;
        }
        currentSafety = { ...(currentSafety || {}), ...(res.data || {}), ...submitPayload };
        if (res.data?.status === "completed") {
          patchFlowState({
            selectedOrderId: orderId,
            lastSafety: {
              orderId,
              safetyId: res.data?.safetyId || "",
              status: res.data?.status || "completed",
              updatedAt: res.data?.updatedAt || Date.now(),
            },
          });
          setTip("安检上报成功，正在进入结果页");
          window.setTimeout(() => (window.location.href = "./delivery-result.html"), 300);
          return;
        }
        await enqueueSafetyOffline(
          res.data?.safetyId ? "retry" : "submit",
          res.data?.safetyId ? { safetyId: res.data.safetyId } : { orderId, submitPayload },
          { ...(res.data || {}), ...submitPayload },
        );
      });

      renderChecks(fallbackChecks);
      setAbnormalState(false);
      renderPhotos();
      void loadSafety();
      if (navigator.onLine) {
        void flushOfflineSafetyQueue();
      }
      window.addEventListener("online", () => {
        void flushOfflineSafetyQueue();
      });
    </script>
  </body>
</html>
