<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订单列表</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page {
        min-height: 100vh;
        padding: 16px 14px calc(96px + env(safe-area-inset-bottom, 0px));
      }

      /* 搜索栏 */
      .search-bar {
        position: relative;
        margin-bottom: 12px;
      }
      .search-input {
        width: 100%;
        height: 44px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        padding: 0 12px 0 36px;
        font-size: 14px;
        font-family: var(--font-body);
        color: var(--text-primary);
      }
      .search-input::placeholder {
        color: var(--text-secondary);
      }
      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        stroke: var(--text-secondary);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .search-clear {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        border: none;
        background: var(--text-secondary);
        color: #fff;
        border-radius: 50%;
        font-size: 12px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .search-clear.visible {
        display: flex;
      }

      /* 筛选标签 */
      .filter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: none;
      }
      .filter-tabs::-webkit-scrollbar {
        display: none;
      }
      .filter-tab {
        flex-shrink: 0;
        height: 32px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--text-secondary);
        font-size: 13px;
        font-family: var(--font-body);
        cursor: pointer;
        white-space: nowrap;
      }
      .filter-tab.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }

      /* 订单卡片 */
      .order-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .order-card:active {
        background: #f8f9fa;
      }
      .order-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .customer-name {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        color: var(--text-primary);
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        height: 22px;
        padding: 0 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
      }
      .status-pending {
        background: #fff3e0;
        color: #e65100;
      }
      .status-completed {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .status-cancelled {
        background: #f5f5f5;
        color: #757575;
      }
      .status-returned {
        background: #ffebee;
        color: #c62828;
      }
      .order-address {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .order-body {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        margin-bottom: 10px;
      }
      .order-spec {
        font-size: 14px;
        color: var(--text-primary);
      }
      .order-amount {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        color: var(--text-primary);
      }
      .order-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .order-time {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .order-action {
        height: 32px;
        padding: 0 14px;
        border: none;
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        font-size: 13px;
        font-family: var(--font-body);
        cursor: pointer;
      }
      .order-action.secondary {
        background: var(--brand-soft);
        color: #1f6f76;
      }

      /* 空状态 */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
      }
      .empty-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        stroke: var(--text-secondary);
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.5;
      }
      .empty-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 8px;
      }
      .empty-desc {
        font-size: 14px;
        color: var(--text-secondary);
      }

      /* 加载更多 */
      .load-more {
        text-align: center;
        padding: 20px;
      }
      .load-more-btn {
        height: 40px;
        padding: 0 24px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        color: var(--text-secondary);
        font-size: 14px;
        font-family: var(--font-body);
        cursor: pointer;
      }
      .load-more-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      
      /* 加载中 */
      .loading-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-secondary);
      }
      .loading-spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 2px solid var(--border);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 12px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* 错误状态 */
      .error-state {
        text-align: center;
        padding: 40px 20px;
      }
      .error-state .empty-title {
        color: var(--error);
      }
      .retry-btn {
        margin-top: 16px;
        height: 40px;
        padding: 0 24px;
        border: 1px solid var(--brand);
        border-radius: 10px;
        background: var(--brand);
        color: #fff;
        font-size: 14px;
        font-family: var(--font-body);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="app-header">
        <button class="back-icon-btn" id="backBtn" aria-label="返回上一页"></button>
        <h1 class="app-title">订单列表</h1>
        <div style="width: 38px;"></div>
      </header>

      <!-- 搜索栏 -->
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索客户、地址、订单号..." />
        <button class="search-clear" id="searchClear">×</button>
      </div>

      <!-- 筛选标签 -->
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="all">全部</button>
        <button class="filter-tab" data-filter="pending_delivery">待配送</button>
        <button class="filter-tab" data-filter="completed">已完成</button>
        <button class="filter-tab" data-filter="cancelled">已取消</button>
        <button class="filter-tab" data-filter="returned">已退货</button>
      </div>

      <!-- 订单列表 -->
      <div id="orderList">
        <!-- 动态生成订单卡片 -->
      </div>

      <!-- 加载更多 -->
      <div class="load-more" id="loadMore" style="display: none;">
        <button class="load-more-btn" id="loadMoreBtn">加载更多</button>
      </div>
    </main>

    <script type="module">
      import { ensureAuthenticatedPage } from "./auth-client.js";
      import { goBackOr, restoreListScroll, navigateWithListScroll } from "./app-shell.js";

      if (!ensureAuthenticatedPage()) {
        throw new Error("未登录");
      }

      const API_BASE = "http://localhost:3100";
      
      function getAccessToken() {
        const authSession = JSON.parse(localStorage.getItem("auth_session") || "{}");
        if (authSession.accessToken) return authSession.accessToken;
        const legacySession = JSON.parse(localStorage.getItem("driver_session") || "{}");
        return legacySession.accessToken || "";
      }

      // 状态映射
      const statusMap = {
        pending_delivery: { text: "待配送", class: "status-pending" },
        completed: { text: "已完成", class: "status-completed" },
        cancelled: { text: "已取消", class: "status-cancelled" },
        returned: { text: "已退货", class: "status-returned" }
      };

      // 状态管理
      let currentFilter = "all";
      let searchKeyword = "";
      let currentPage = 1;
      let pageSize = 20;
      let totalOrders = 0;
      let isLoading = false;
      let hasMore = false;
      let currentCustomerId = "";
      let hasRestoredListScroll = false;

      // 格式化时间
      function formatTime(timestamp) {
        if (!timestamp) return "";
        const date = new Date(timestamp);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const orderDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        
        const diffDays = Math.floor((today - orderDay) / (1000 * 60 * 60 * 24));
        
        const hours = String(date.getHours()).padStart(2, "0");
        const minutes = String(date.getMinutes()).padStart(2, "0");
        
        if (diffDays === 0) {
          return `今天 ${hours}:${minutes}`;
        } else if (diffDays === 1) {
          return `昨天 ${hours}:${minutes}`;
        } else if (diffDays < 7) {
          const days = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
          return `${days[date.getDay()]} ${hours}:${minutes}`;
        } else {
          return `${date.getMonth() + 1}月${date.getDate()}日 ${hours}:${minutes}`;
        }
      }

      // 获取订单列表
      async function fetchOrders(page = 1, append = false) {
        if (isLoading) return;
        isLoading = true;
        
        const loadMoreBtn = document.getElementById("loadMoreBtn");
        if (loadMoreBtn) {
          loadMoreBtn.disabled = true;
          loadMoreBtn.textContent = "加载中...";
        }
        
        if (!append) {
          document.getElementById("orderList").innerHTML = `
            <div class="loading-state">
              <div class="loading-spinner"></div>
              <div>加载中...</div>
            </div>
          `;
        }

        try {
          const params = new URLSearchParams();
          params.append("page", page);
          params.append("size", pageSize);
          if (currentFilter !== "all") {
            params.append("status", currentFilter);
          }
          if (searchKeyword) {
            params.append("keyword", searchKeyword);
          }
          if (currentCustomerId) {
            params.append("customerId", currentCustomerId);
          }

          const res = await fetch(`${API_BASE}/orders?${params}`, {
            headers: { Authorization: `Bearer ${getAccessToken()}` },
          });
          
          const result = await res.json();
          
          if (!result.success) {
            throw new Error(result.error?.message || "加载失败");
          }

          const data = result.data;
          totalOrders = data.total;
          currentPage = data.page;
          hasMore = currentPage * data.size < totalOrders;

          if (append) {
            // 追加模式：保留现有列表
            const listEl = document.getElementById("orderList");
            const existingOrders = listEl.querySelectorAll(".order-card");
            const existingHtml = Array.from(existingOrders).map(el => el.outerHTML).join("");
            const newHtml = data.list.map(order => renderOrderCard(order)).join("");
            listEl.innerHTML = existingHtml + newHtml;
            
            // 绑定事件
            data.list.forEach(order => {
              bindOrderEvents(order);
            });
          } else {
            renderOrderList(data.list);
            if (!hasRestoredListScroll) {
              restoreListScroll("order-list");
              hasRestoredListScroll = true;
            }
          }

          // 更新加载更多按钮
          updateLoadMoreButton();

        } catch (err) {
          console.error("加载订单失败:", err);
          if (!append) {
            document.getElementById("orderList").innerHTML = `
              <div class="error-state">
                <svg class="empty-icon" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="m15 9-6 6"/>
                  <path d="m9 9 6 6"/>
                </svg>
                <div class="empty-title">加载失败</div>
                <div class="empty-desc">${err.message || "请检查网络连接后重试"}</div>
                <button class="retry-btn" id="retryBtn">重新加载</button>
              </div>
            `;
            document.getElementById("retryBtn")?.addEventListener("click", () => {
              fetchOrders(1, false);
            });
          }
        } finally {
          isLoading = false;
          if (loadMoreBtn) {
            loadMoreBtn.disabled = false;
            loadMoreBtn.textContent = "加载更多";
          }
        }
      }

      // 更新加载更多按钮状态
      function updateLoadMoreButton() {
        const loadMoreEl = document.getElementById("loadMore");
        if (totalOrders === 0) {
          loadMoreEl.style.display = "none";
        } else {
          loadMoreEl.style.display = hasMore ? "block" : "none";
          if (!hasMore) {
            loadMoreEl.innerHTML = '<div style="color: var(--text-secondary); font-size: 14px;">没有更多订单了</div>';
          } else {
            loadMoreEl.innerHTML = '<button class="load-more-btn" id="loadMoreBtn">加载更多</button>';
            document.getElementById("loadMoreBtn")?.addEventListener("click", () => {
              fetchOrders(currentPage + 1, true);
            });
          }
        }
      }

      // 渲染订单列表
      function renderOrderList(orders) {
        const listEl = document.getElementById("orderList");
        
        if (orders.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <svg class="empty-icon" viewBox="0 0 24 24">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="2"/>
                <path d="M9 14h.01"/>
                <path d="M9 17h.01"/>
                <path d="M12 14h.01"/>
                <path d="M12 17h.01"/>
                <path d="M15 14h.01"/>
                <path d="M15 17h.01"/>
              </svg>
              <div class="empty-title">暂无订单</div>
              <div class="empty-desc">${searchKeyword ? "未找到相关订单，换个关键词试试" : "还没有订单，点击首页快速开单"}</div>
            </div>
          `;
          return;
        }

        listEl.innerHTML = orders.map(order => renderOrderCard(order)).join("");
        
        // 绑定事件
        orders.forEach(order => {
          bindOrderEvents(order);
        });
      }

      // 绑定订单事件
      function bindOrderEvents(order) {
        const card = document.getElementById(`order-${order.orderId}`);
        const actionBtn = document.getElementById(`action-${order.orderId}`);

        if (card) {
          card.addEventListener("click", (e) => {
            if (e.target.tagName !== "BUTTON") {
              handleOrderClick(order);
            }
          });
        }

        if (actionBtn) {
          actionBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            handleAction(order);
          });
        }
      }

      // 渲染订单卡片
      function renderOrderCard(order) {
        const status = statusMap[order.orderStatus] || statusMap.pending_delivery;
        const actionText = order.orderStatus === "pending_delivery" ? "送达收款" : "查看详情";
        const actionClass = order.orderStatus === "pending_delivery" ? "" : "secondary";
        
        // 格式化规格显示
        const specText = `${order.spec || "-"}×${Number(order.quantity || 0)}`;

        return `
          <div class="order-card" id="order-${order.orderId}">
            <div class="order-header">
              <span class="customer-name">${order.customerName || "-"}</span>
              <span class="status-badge ${status.class}">${status.text}</span>
            </div>
            <div class="order-address">${order.address || ""}</div>
            <div class="order-body">
              <span class="order-spec">${specText}</span>
              <span class="order-amount">¥${Number(order.amount || 0).toFixed(2)}</span>
            </div>
            <div class="order-footer">
              <span class="order-time">${formatTime(order.createdAt)}</span>
              <button class="order-action ${actionClass}" id="action-${order.orderId}">${actionText}</button>
            </div>
          </div>
        `;
      }

      // 操作处理函数
      function handleOrderClick(order) {
        if (order.orderStatus === "pending_delivery") {
          navigateWithListScroll(`./pending-delivery-list.html?orderId=${order.orderId}`, "order-list");
          return;
        }
        navigateWithListScroll(`./order-detail.html?orderId=${order.orderId}`, "order-list");
      }

      function handleAction(order) {
        if (order.orderStatus === "pending_delivery") {
          navigateWithListScroll(`./pending-delivery-list.html?orderId=${order.orderId}`, "order-list");
        } else {
          navigateWithListScroll(`./order-detail.html?orderId=${order.orderId}`, "order-list");
        }
      }

      // 筛选标签切换
      document.getElementById("filterTabs").addEventListener("click", (e) => {
        if (e.target.classList.contains("filter-tab")) {
          document.querySelectorAll(".filter-tab").forEach(tab => tab.classList.remove("active"));
          e.target.classList.add("active");
          currentFilter = e.target.dataset.filter;
          currentPage = 1;
          fetchOrders(1, false);
        }
      });

      // 搜索输入（带防抖）
      const searchInput = document.getElementById("searchInput");
      const searchClear = document.getElementById("searchClear");
      let searchTimeout;
      
      searchInput.addEventListener("input", (e) => {
        const value = e.target.value.trim();
        searchClear.classList.toggle("visible", value.length > 0);
        
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchKeyword = value;
          currentPage = 1;
          fetchOrders(1, false);
        }, 300);
      });

      // 清空搜索
      searchClear.addEventListener("click", () => {
        searchInput.value = "";
        searchClear.classList.remove("visible");
        searchKeyword = "";
        currentPage = 1;
        fetchOrders(1, false);
      });

      // 返回按钮
      document.getElementById("backBtn").addEventListener("click", () => {
        goBackOr("./workbench.html");
      });

      const initialParams = new URLSearchParams(window.location.search);
      const initialKeyword = String(initialParams.get("keyword") || "").trim();
      const initialStatus = String(initialParams.get("status") || "all").trim();
      currentCustomerId = String(initialParams.get("customerId") || "").trim();
      if (initialKeyword) {
        searchKeyword = initialKeyword;
        searchInput.value = initialKeyword;
        searchClear.classList.add("visible");
      }
      if (["all", "pending_delivery", "completed", "cancelled", "returned"].includes(initialStatus)) {
        currentFilter = initialStatus;
        document.querySelectorAll(".filter-tab").forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.filter === currentFilter);
        });
      }

      // 初始化加载
      fetchOrders(1, false);
    </script>
  </body>
</html>
