<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>库存管理</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page {
        min-height: 100vh;
        padding: 16px 14px calc(182px + env(safe-area-inset-bottom, 0px));
      }

      /* 库存概览 */
      .inventory-overview {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .overview-title {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        margin: 0 0 12px;
        color: var(--text-primary);
      }
      .inventory-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .inventory-item:last-child {
        border-bottom: none;
      }
      .inventory-info {
        flex: 1;
      }
      .inventory-name {
        font-size: 15px;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .inventory-status {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
      }
      .status-safe {
        color: var(--success);
      }
      .status-warning {
        color: var(--warning);
      }
      .status-danger {
        color: var(--error);
      }
      .inventory-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .inventory-count {
        font-size: 18px;
        font-weight: 600;
        font-family: var(--font-title);
        color: var(--text-primary);
        min-width: 40px;
        text-align: center;
      }
      .control-btn {
        width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--brand);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .control-btn:active {
        background: var(--brand-soft);
      }

      /* 预警卡片 */
      .alert-card {
        background: #fff5f5;
        border: 1px solid #fecaca;
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .alert-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .alert-badge {
        width: 20px;
        height: 20px;
        background: var(--error);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 12px;
        font-weight: 600;
      }
      .alert-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--error);
      }
      .alert-text {
        font-size: 13px;
        color: #b91c1c;
        margin-bottom: 10px;
      }
      .alert-btn {
        height: 32px;
        padding: 0 14px;
        border: 1px solid var(--error);
        border-radius: 8px;
        background: #fff;
        color: var(--error);
        font-size: 13px;
        cursor: pointer;
      }

      /* 最近操作 */
      .log-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .section-title {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        margin: 0 0 12px;
        color: var(--text-primary);
      }
      .log-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .log-item:last-child {
        border-bottom: none;
      }
      .log-info {
        flex: 1;
      }
      .log-type {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 2px;
      }
      .log-detail {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .log-time {
        font-size: 12px;
        color: var(--text-secondary);
      }

      /* 快捷操作 */
      .action-section {
        position: fixed;
        left: 0;
        right: 0;
        bottom: calc(62px + env(safe-area-inset-bottom, 0px));
        z-index: 22;
        padding: 0 14px;
        margin: 0;
      }
      .action-panel {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 10px;
        max-width: 460px;
        margin: 0 auto;
        box-shadow: 0 8px 20px rgba(17, 24, 39, 0.08);
        backdrop-filter: blur(6px);
      }
      .action-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .quick-action {
        min-height: 74px;
        border: 1px solid #d5e5e8;
        border-radius: 14px;
        background: #fff;
        color: var(--text-primary);
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font-body);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 7px;
        transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease,
          background 120ms ease;
      }
      .quick-action:hover {
        border-color: #bdd8dc;
        box-shadow: 0 6px 14px rgba(17, 24, 39, 0.08);
        background: linear-gradient(180deg, #ffffff, #f7fcfd);
      }
      .quick-action:active {
        transform: scale(0.98);
        background: #eef7f8;
      }
      .action-icon {
        width: 22px;
        height: 22px;
        stroke: var(--brand);
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .action-spacer {
        height: 132px;
      }
      .sheet-overlay {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .sheet-overlay.show {
        display: flex;
      }
      .sheet-scrim {
        position: absolute;
        inset: 0;
        border: none;
        margin: 0;
        padding: 0;
        background: rgba(17, 24, 39, 0.36);
      }
      .sheet-panel {
        position: relative;
        width: 100%;
        max-width: 460px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        padding: 14px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
        box-shadow: 0 -10px 28px rgba(17, 24, 39, 0.16);
        transform: translateY(100%);
        transition: transform 180ms ease;
      }
      .sheet-overlay.show .sheet-panel {
        transform: translateY(0);
      }
      .sheet-handle {
        width: 40px;
        height: 5px;
        border-radius: 999px;
        background: var(--border);
        margin: 0 auto 10px;
      }
      .sheet-title {
        margin: 0 0 10px;
        font-size: 18px;
        font-weight: 700;
        font-family: var(--font-title);
      }
      .sheet-row {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }
      .sheet-label {
        font-size: 13px;
        color: var(--text-secondary);
      }
      .sheet-actions {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .sheet-hint {
        font-size: 12px;
        color: var(--text-secondary);
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="app-header">
        <button class="back-icon-btn" id="backBtn" aria-label="返回上一页"></button>
        <h1 class="app-title">库存管理</h1>
        <div style="width: 38px;"></div>
      </header>

      <!-- 库存概览 -->
      <div class="inventory-overview">
        <h2 class="overview-title">库存概览</h2>
        <div id="inventoryList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 库存预警 -->
      <div class="alert-card" id="alertCard" style="display: none;">
        <div class="alert-header">
          <span class="alert-badge">!</span>
          <span class="alert-title">库存预警</span>
        </div>
        <div class="alert-text" id="alertText">低库存请及时补货</div>
        <button class="alert-btn" id="alertBtn">查看详情</button>
      </div>

      <!-- 最近操作 -->
      <div class="log-section">
        <h2 class="section-title">最近操作</h2>
        <div id="logList">
          <!-- 动态生成 -->
        </div>
      </div>
      <div class="state-block info" id="tip" hidden></div>

      <!-- 快捷操作 -->
      <div class="action-section">
        <div class="action-panel">
          <div class="action-grid">
            <button class="quick-action" id="purchaseBtn">
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              <span>采购入库</span>
            </button>
            <button class="quick-action" id="refillBtn">
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
              <span>气瓶充装</span>
            </button>
            <button class="quick-action" id="checkBtn">
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg>
              <span>库存盘点</span>
            </button>
          </div>
        </div>
      </div>
      <div class="action-spacer" aria-hidden="true"></div>
    </main>
    <div class="sheet-overlay" id="actionSheetOverlay" aria-hidden="true">
      <button class="sheet-scrim" id="actionSheetScrim" aria-label="关闭弹层"></button>
      <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="actionSheetTitle">
        <div class="sheet-handle" aria-hidden="true"></div>
        <h3 class="sheet-title" id="actionSheetTitle">库存操作</h3>
        <div class="sheet-row">
          <label class="sheet-label" for="actionSpec">规格</label>
          <select id="actionSpec" class="app-select">
            <option value="10kg">10kg</option>
            <option value="15kg">15kg</option>
            <option value="50kg">50kg</option>
          </select>
        </div>
        <div class="sheet-row">
          <label class="sheet-label" for="actionQty" id="actionQtyLabel">数量</label>
          <input id="actionQty" class="app-input" type="number" min="1" step="1" inputmode="numeric" />
        </div>
        <div class="sheet-row" id="actionWeightRow" hidden>
          <label class="sheet-label" for="actionWeight">充装重量（kg）</label>
          <input
            id="actionWeight"
            class="app-input"
            type="number"
            min="0.1"
            step="0.1"
            inputmode="decimal"
            placeholder="请输入本次充装总重量"
          />
        </div>
        <div class="sheet-hint" id="actionSheetHint"></div>
        <div class="sheet-actions">
          <button type="button" class="app-btn ghost" id="actionSheetCancelBtn">取消</button>
          <button type="button" class="app-btn primary" id="actionSheetSubmitBtn">确认</button>
        </div>
      </section>
    </div>

    <script type="module">
      import { ensureAuthenticatedPage, authFetchJson } from "./auth-client.js";
      import { goBackOr } from "./app-shell.js";
      const API_BASE_URL = "http://localhost:3100";

      if (!ensureAuthenticatedPage()) {
        throw new Error("未登录");
      }

      const inventoryData = [];
      const operationLogs = [];
      const inventoryAlertBySpec = new Map();
      const tip = document.getElementById("tip");
      const actionSheetOverlay = document.getElementById("actionSheetOverlay");
      const actionSheetScrim = document.getElementById("actionSheetScrim");
      const actionSheetTitle = document.getElementById("actionSheetTitle");
      const actionSpec = document.getElementById("actionSpec");
      const actionQty = document.getElementById("actionQty");
      const actionQtyLabel = document.getElementById("actionQtyLabel");
      const actionWeightRow = document.getElementById("actionWeightRow");
      const actionWeight = document.getElementById("actionWeight");
      const actionSheetHint = document.getElementById("actionSheetHint");
      const actionSheetCancelBtn = document.getElementById("actionSheetCancelBtn");
      const actionSheetSubmitBtn = document.getElementById("actionSheetSubmitBtn");
      let actionMode = "";
      let actionSubmitting = false;

      function setTip(text = "", type = "info") {
        const msg = String(text || "").trim();
        if (!msg) {
          tip.hidden = true;
          tip.textContent = "";
          tip.className = "state-block info";
          return;
        }
        tip.hidden = false;
        tip.textContent = msg;
        tip.className = `state-block ${type}`;
      }

      function formatTime(ts) {
        const value = Number(ts || 0);
        if (!value) return "--";
        const date = new Date(value);
        const hh = String(date.getHours()).padStart(2, "0");
        const mm = String(date.getMinutes()).padStart(2, "0");
        return `${hh}:${mm}`;
      }

      function logTypeLabel(type) {
        const map = {
          purchase_in: "采购入库",
          refill_in: "气瓶充装",
          stocktake_adjust: "库存盘点",
          direct_consume: "直接扣减",
          consume: "锁定消耗",
          lock: "库存锁定",
          release: "释放锁定",
          order_return: "订单退货",
          to_inspection: "送检登记",
        };
        return map[String(type || "").trim()] || "库存变更";
      }

      function normalizeSpec(input) {
        const val = String(input || "").trim().toLowerCase().replace(/\s+/g, "");
        if (val === "10" || val === "10kg" || val === "10公斤") return "10kg";
        if (val === "15" || val === "15kg" || val === "15公斤") return "15kg";
        if (val === "50" || val === "50kg" || val === "50公斤") return "50kg";
        return "";
      }

      function parsePositiveInt(input) {
        const n = Number(String(input || "").trim());
        return Number.isInteger(n) && n > 0 ? n : 0;
      }

      function parsePositiveDecimal(input) {
        const n = Number(String(input || "").trim());
        if (!Number.isFinite(n) || n <= 0) return 0;
        return Number(n.toFixed(2));
      }

      function openActionSheet(mode, defaults = {}) {
        actionMode = mode;
        if (mode === "purchase") {
          actionSheetTitle.textContent = "采购入库";
          actionQtyLabel.textContent = "采购数量";
          actionSheetHint.textContent = "确认采购入库后会直接增加在库数量。";
          actionWeightRow.hidden = true;
          actionWeight.value = "";
        } else if (mode === "refill") {
          actionSheetTitle.textContent = "气瓶充装";
          actionQtyLabel.textContent = "充装数量";
          actionSheetHint.textContent = "请填写充装数量与本次充装总重量。";
          actionWeightRow.hidden = false;
          actionWeight.value = String(defaults.weight || 0);
        } else {
          actionSheetTitle.textContent = "库存盘点";
          actionQtyLabel.textContent = "盘点后在库数量";
          actionSheetHint.textContent = "盘点会直接把在库数量更新为录入值。";
          actionWeightRow.hidden = true;
          actionWeight.value = "";
        }
        actionSpec.value = defaults.spec || "15kg";
        actionQty.value = String(defaults.qty || (mode === "stocktake" ? 10 : 5));
        actionSubmitting = false;
        actionSheetSubmitBtn.disabled = false;
        actionSheetOverlay.classList.add("show");
        actionSheetOverlay.setAttribute("aria-hidden", "false");
        setTimeout(() => actionQty.focus(), 80);
      }

      function closeActionSheet() {
        if (actionSubmitting) return;
        actionSheetOverlay.classList.remove("show");
        actionSheetOverlay.setAttribute("aria-hidden", "true");
        actionMode = "";
      }

      async function fetchInventorySnapshot() {
        return authFetchJson(`${API_BASE_URL}/inventory/snapshot`);
      }

      async function fetchInventoryAlerts() {
        return authFetchJson(`${API_BASE_URL}/inventory/alerts`);
      }

      async function submitInventoryAction(route, payload) {
        return authFetchJson(`${API_BASE_URL}${route}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {}),
        });
      }

      async function reloadAll() {
        setTip("正在加载库存...", "loading");
        const [snapshotRes, alertRes] = await Promise.all([
          fetchInventorySnapshot(),
          fetchInventoryAlerts(),
        ]);
        if (!snapshotRes?.success) {
          setTip(snapshotRes?.error || "库存加载失败", "error");
          return;
        }
        inventoryData.length = 0;
        const snapshotItems = Array.isArray(snapshotRes.data) ? snapshotRes.data : [];
        snapshotItems.forEach((item) => {
          inventoryData.push({
            spec: item.spec,
            onHand: Number(item.onHand || 0),
            locked: Number(item.locked || 0),
            pendingInspection: Number(item.pendingInspection || 0),
            available: Number(item.available || 0),
          });
        });
        operationLogs.length = 0;
        const logs = Array.isArray(snapshotRes.logs) ? snapshotRes.logs : [];
        logs.slice(0, 8).forEach((x) => {
          operationLogs.push({
            type: logTypeLabel(x.type),
            detail: `${x.spec || "--"} 在库${x.deltaOnHand > 0 ? "+" : ""}${Number(x.deltaOnHand || 0)} 锁定${
              x.deltaLocked > 0 ? "+" : ""
            }${Number(x.deltaLocked || 0)}`,
            time: formatTime(x.createdAt),
          });
        });
        inventoryAlertBySpec.clear();
        if (alertRes?.success) {
          const alertItems = Array.isArray(alertRes?.data?.items) ? alertRes.data.items : [];
          alertItems.forEach((x) => inventoryAlertBySpec.set(x.spec, x));
          const card = document.getElementById("alertCard");
          const textEl = document.getElementById("alertText");
          if (Number(alertRes?.data?.lowCount || 0) > 0) {
            card.style.display = "block";
            textEl.textContent = alertRes?.data?.message || "存在低库存预警";
          } else {
            card.style.display = "none";
            textEl.textContent = "当前无低库存预警";
          }
        }
        renderInventory();
        renderLogs();
        setTip("", "info");
      }

      // 渲染库存列表
      function renderInventory() {
        const listEl = document.getElementById("inventoryList");
        listEl.innerHTML = inventoryData.map((item, index) => {
          const alertMeta = inventoryAlertBySpec.get(item.spec);
          const threshold = Number(alertMeta?.threshold || 0);
          const isLow = Boolean(alertMeta?.isLow);
          const statusClass = isLow ? "status-warning" : "status-safe";
          const statusText = isLow
            ? `不足（阈值${threshold}）`
            : `正常（可用${item.available} 锁定${item.locked} 待检${item.pendingInspection}）`;
          return `
            <div class="inventory-item">
              <div class="inventory-info">
                <div class="inventory-name">${item.spec}重瓶</div>
                <div class="inventory-status ${statusClass}">${statusText}</div>
              </div>
              <div class="inventory-controls">
                <button class="control-btn" data-index="${index}" data-action="minus">-</button>
                <span class="inventory-count">${item.onHand}</span>
                <button class="control-btn" data-index="${index}" data-action="plus">+</button>
              </div>
            </div>
          `;
        }).join("");

        // 绑定加减按钮
        document.querySelectorAll(".control-btn").forEach(btn => {
          btn.addEventListener("click", async (e) => {
            const index = parseInt(e.target.dataset.index);
            const action = e.target.dataset.action;
            const row = inventoryData[index];
            if (!row) return;
            const next = action === "plus" ? row.onHand + 1 : Math.max(0, row.onHand - 1);
            if (next <= 0) {
              setTip("盘点数量必须大于 0", "error");
              return;
            }
            setTip("正在提交盘点...", "loading");
            const result = await submitInventoryAction("/inventory/stocktake", {
              spec: row.spec,
              countedOnHand: next,
              note: "页面快捷盘点调整",
            });
            if (!result?.success) {
              setTip(result?.error || "盘点失败", "error");
              return;
            }
            await reloadAll();
            setTip(`${row.spec}盘点已更新为 ${next}`, "success");
          });
        });
      }

      // 渲染操作日志
      function renderLogs() {
        const logEl = document.getElementById("logList");
        if (!operationLogs.length) {
          logEl.innerHTML = '<div class="log-item"><div class="log-detail">暂无库存操作记录</div></div>';
          return;
        }
        logEl.innerHTML = operationLogs.map(log => `
          <div class="log-item">
            <div class="log-info">
              <div class="log-type">${log.type}</div>
              <div class="log-detail">${log.detail}</div>
            </div>
            <span class="log-time">${log.time}</span>
          </div>
        `).join("");
      }

      // 事件绑定
      document.getElementById("backBtn").addEventListener("click", () => {
        goBackOr("./my.html");
      });

      document.getElementById("alertBtn").addEventListener("click", () => {
        const lowList = [...inventoryAlertBySpec.values()].filter((x) => x.isLow);
        if (!lowList.length) {
          setTip("当前无低库存预警", "info");
          return;
        }
        setTip(
          `预警明细：${lowList.map((x) => `${x.spec}库存${x.onHand}/阈值${x.threshold}`).join("；")}`,
          "warning"
        );
      });

      document.getElementById("purchaseBtn").addEventListener("click", () => {
        openActionSheet("purchase", { spec: "15kg", qty: 5 });
      });

      document.getElementById("refillBtn").addEventListener("click", () => {
        openActionSheet("refill", { spec: "15kg", qty: 3, weight: 45 });
      });

      document.getElementById("checkBtn").addEventListener("click", () => {
        openActionSheet("stocktake", { spec: "15kg", qty: 10 });
      });

      actionSheetScrim.addEventListener("click", closeActionSheet);
      actionSheetCancelBtn.addEventListener("click", closeActionSheet);
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeActionSheet();
      });
      actionSheetSubmitBtn.addEventListener("click", async () => {
        if (!actionMode || actionSubmitting) return;
        const spec = normalizeSpec(actionSpec.value);
        if (!spec) {
          setTip("规格不合法", "error");
          return;
        }
        const qty = parsePositiveInt(actionQty.value);
        if (!qty) {
          setTip("数量必须为正整数", "error");
          return;
        }
        let route = "";
        let payload = {};
        let loadingText = "";
        let successText = "";
        if (actionMode === "purchase") {
          route = "/inventory/purchase";
          payload = { spec, quantity: qty };
          loadingText = "正在提交采购入库...";
          successText = `已入库：${spec} × ${qty}`;
        } else if (actionMode === "refill") {
          const refillWeightKg = parsePositiveDecimal(actionWeight.value);
          if (!refillWeightKg) {
            setTip("请填写有效的充装重量（kg）", "error");
            return;
          }
          route = "/inventory/refill";
          payload = { spec, quantity: qty, refillWeightKg };
          loadingText = "正在提交气瓶充装...";
          successText = `已充装：${spec} × ${qty}（${refillWeightKg}kg）`;
        } else {
          route = "/inventory/stocktake";
          payload = { spec, countedOnHand: qty };
          loadingText = "正在提交库存盘点...";
          successText = `盘点完成：${spec} 在库 ${qty}`;
        }
        actionSubmitting = true;
        actionSheetSubmitBtn.disabled = true;
        setTip(loadingText, "loading");
        const result = await submitInventoryAction(route, payload);
        actionSubmitting = false;
        actionSheetSubmitBtn.disabled = false;
        if (!result?.success) {
          setTip(result?.error || "库存操作失败", "error");
          return;
        }
        closeActionSheet();
        await reloadAll();
        setTip(successText, "success");
      });

      // 初始化
      reloadAll();
    </script>
  </body>
</html>
