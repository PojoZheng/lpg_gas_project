<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>库存管理</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page {
        min-height: 100vh;
        padding: 16px 14px calc(182px + env(safe-area-inset-bottom, 0px));
      }

      /* 库存概览 */
      .inventory-overview {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .overview-title {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        margin: 0 0 12px;
        color: var(--text-primary);
      }
      .inventory-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .inventory-item:last-child {
        border-bottom: none;
      }
      .inventory-info {
        flex: 1;
      }
      .inventory-name {
        font-size: 15px;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .inventory-status {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
      }
      .status-safe {
        color: var(--success);
      }
      .status-warning {
        color: var(--warning);
      }
      .status-danger {
        color: var(--error);
      }
      .inventory-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .inventory-count {
        font-size: 18px;
        font-weight: 600;
        font-family: var(--font-title);
        color: var(--text-primary);
        min-width: 40px;
        text-align: center;
      }
      .control-btn {
        width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--brand);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .control-btn:active {
        background: var(--brand-soft);
      }

      /* 预警卡片 */
      .alert-card {
        background: #fff5f5;
        border: 1px solid #fecaca;
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .alert-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .alert-badge {
        width: 20px;
        height: 20px;
        background: var(--error);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 12px;
        font-weight: 600;
      }
      .alert-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--error);
      }
      .alert-text {
        font-size: 13px;
        color: #b91c1c;
        margin-bottom: 10px;
      }
      .alert-btn {
        height: 32px;
        padding: 0 14px;
        border: 1px solid var(--error);
        border-radius: 8px;
        background: #fff;
        color: var(--error);
        font-size: 13px;
        cursor: pointer;
      }

      /* 最近操作 */
      .log-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .section-title {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        margin: 0 0 12px;
        color: var(--text-primary);
      }
      .log-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .log-item:last-child {
        border-bottom: none;
      }
      .log-info {
        flex: 1;
      }
      .log-type {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 2px;
      }
      .log-detail {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .log-time {
        font-size: 12px;
        color: var(--text-secondary);
      }

      /* 快捷操作 */
      .action-section {
        position: fixed;
        left: 0;
        right: 0;
        bottom: calc(62px + env(safe-area-inset-bottom, 0px));
        z-index: 22;
        padding: 0 14px;
        margin: 0;
      }
      .action-panel {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 10px;
        max-width: 460px;
        margin: 0 auto;
        box-shadow: 0 8px 20px rgba(17, 24, 39, 0.08);
        backdrop-filter: blur(6px);
      }
      .action-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .quick-action {
        min-height: 74px;
        border: 1px solid #d5e5e8;
        border-radius: 14px;
        background: #fff;
        color: var(--text-primary);
        font-size: 13px;
        font-weight: 600;
        font-family: var(--font-body);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 7px;
        transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease,
          background 120ms ease;
      }
      .quick-action:hover {
        border-color: #bdd8dc;
        box-shadow: 0 6px 14px rgba(17, 24, 39, 0.08);
        background: linear-gradient(180deg, #ffffff, #f7fcfd);
      }
      .quick-action:active {
        transform: scale(0.98);
        background: #eef7f8;
      }
      .action-icon {
        width: 22px;
        height: 22px;
        stroke: var(--brand);
        fill: none;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .action-spacer {
        height: 132px;
      }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="app-header">
        <button class="back-icon-btn" id="backBtn" aria-label="返回上一页"></button>
        <h1 class="app-title">库存管理</h1>
        <div style="width: 38px;"></div>
      </header>

      <!-- 库存概览 -->
      <div class="inventory-overview">
        <h2 class="overview-title">库存概览</h2>
        <div id="inventoryList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 过期预警 -->
      <div class="alert-card" id="alertCard" style="display: none;">
        <div class="alert-header">
          <span class="alert-badge">!</span>
          <span class="alert-title">过期预警</span>
        </div>
        <div class="alert-text" id="alertText">3个气瓶7天后过期，需送检</div>
        <button class="alert-btn" id="alertBtn">查看详情</button>
      </div>

      <!-- 最近操作 -->
      <div class="log-section">
        <h2 class="section-title">最近操作</h2>
        <div id="logList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 快捷操作 -->
      <div class="action-section">
        <div class="action-panel">
          <div class="action-grid">
            <button class="quick-action" id="purchaseBtn">
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              <span>采购入库</span>
            </button>
            <button class="quick-action" id="refillBtn">
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
              <span>气瓶充装</span>
            </button>
            <button class="quick-action" id="checkBtn">
              <svg class="action-icon" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg>
              <span>库存盘点</span>
            </button>
          </div>
        </div>
      </div>
      <div class="action-spacer" aria-hidden="true"></div>
    </main>

    <script type="module">
      import { ensureAuthenticatedPage } from "./auth-client.js";
      import { goBackOr } from "./app-shell.js";

      if (!ensureAuthenticatedPage()) {
        throw new Error("未登录");
      }

      // 模拟库存数据
      const inventoryData = [
        { spec: "15kg", type: "重瓶", count: 12, safeStock: 5 },
        { spec: "15kg", type: "空瓶", count: 8, safeStock: 3 },
        { spec: "10kg", type: "重瓶", count: 2, safeStock: 3 },
        { spec: "10kg", type: "空瓶", count: 3, safeStock: 2 },
        { spec: "50kg", type: "重瓶", count: 2, safeStock: 2 },
        { spec: "50kg", type: "空瓶", count: 1, safeStock: 1 }
      ];

      // 模拟操作日志
      const operationLogs = [
        { type: "采购入库", detail: "15kg×10", time: "今天 09:30" },
        { type: "充装入库", detail: "15kg×5", time: "今天 10:00" },
        { type: "配送出库", detail: "15kg×1 李大妈", time: "今天 10:15" },
        { type: "回收入库", detail: "15kg×1 李大妈", time: "今天 10:30" }
      ];

      // 渲染库存列表
      function renderInventory() {
        const listEl = document.getElementById("inventoryList");
        listEl.innerHTML = inventoryData.map((item, index) => {
          const statusClass = item.count < item.safeStock ? "status-warning" : "status-safe";
          const statusText = item.count < item.safeStock ? "不足" : "正常";
          return `
            <div class="inventory-item">
              <div class="inventory-info">
                <div class="inventory-name">${item.spec}${item.type}</div>
                <div class="inventory-status ${statusClass}">${statusText}</div>
              </div>
              <div class="inventory-controls">
                <button class="control-btn" data-index="${index}" data-action="minus">-</button>
                <span class="inventory-count">${item.count}</span>
                <button class="control-btn" data-index="${index}" data-action="plus">+</button>
              </div>
            </div>
          `;
        }).join("");

        // 绑定加减按钮
        document.querySelectorAll(".control-btn").forEach(btn => {
          btn.addEventListener("click", (e) => {
            const index = parseInt(e.target.dataset.index);
            const action = e.target.dataset.action;
            if (action === "plus") {
              inventoryData[index].count++;
            } else if (action === "minus" && inventoryData[index].count > 0) {
              inventoryData[index].count--;
            }
            renderInventory();
          });
        });
      }

      // 渲染操作日志
      function renderLogs() {
        const logEl = document.getElementById("logList");
        logEl.innerHTML = operationLogs.map(log => `
          <div class="log-item">
            <div class="log-info">
              <div class="log-type">${log.type}</div>
              <div class="log-detail">${log.detail}</div>
            </div>
            <span class="log-time">${log.time}</span>
          </div>
        `).join("");
      }

      // 显示过期预警
      function showAlert() {
        document.getElementById("alertCard").style.display = "block";
      }

      // 事件绑定
      document.getElementById("backBtn").addEventListener("click", () => {
        goBackOr("./my.html");
      });

      document.getElementById("alertBtn").addEventListener("click", () => {
        alert("过期气瓶详情功能开发中...");
      });

      document.getElementById("purchaseBtn").addEventListener("click", () => {
        alert("采购入库功能开发中...");
      });

      document.getElementById("refillBtn").addEventListener("click", () => {
        alert("气瓶充装功能开发中...");
      });

      document.getElementById("checkBtn").addEventListener("click", () => {
        alert("库存盘点功能开发中...");
      });

      // 初始化
      renderInventory();
      renderLogs();
      showAlert();
    </script>
  </body>
</html>
