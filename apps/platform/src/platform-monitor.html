<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>平台监控与合规看板</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
    <style>
      .page-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .page-toolbar-copy h2 {
        margin: 0;
        font-size: 22px;
      }
      .page-toolbar-copy p {
        margin: 4px 0 0;
        color: var(--text-secondary);
        font-size: 13px;
      }
      .monitor-layout {
        display: grid;
        grid-template-columns: 300px minmax(520px, 1fr) 360px;
        gap: 12px;
        align-items: start;
      }
      .column-stack {
        display: grid;
        gap: 12px;
        min-width: 0;
      }
      .panel-sticky {
        position: sticky;
        top: 18px;
      }
      .summary-grid {
        display: grid;
        gap: 8px;
      }
      .summary-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        background: #fff;
      }
      .summary-card strong {
        display: block;
        font-size: 20px;
        margin-top: 6px;
      }
      .summary-card span {
        color: var(--text-secondary);
        font-size: 12px;
      }
      .filter-row {
        display: grid;
        gap: 8px;
      }
      .filter-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .filter-chip {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        cursor: pointer;
        font-size: 13px;
      }
      .filter-chip.active {
        border-color: var(--brand);
        background: var(--brand-soft);
        color: var(--brand);
      }
      .failed-list {
        display: grid;
        gap: 8px;
      }
      .failed-card {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 12px;
        background: #fff;
        text-align: left;
        cursor: pointer;
      }
      .failed-card.active {
        border-color: var(--brand);
        box-shadow: 0 8px 20px rgba(71, 153, 160, 0.08);
        background: linear-gradient(180deg, #ffffff 0%, #f8fbfb 100%);
      }
      .failed-head,
      .detail-head,
      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: start;
      }
      .failed-title,
      .detail-title {
        font-size: 15px;
        font-weight: 700;
      }
      .failed-sub,
      .detail-sub,
      .panel-muted {
        margin-top: 4px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      .severity-pill,
      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid transparent;
      }
      .severity-pill.high {
        background: #fff1f2;
        color: #be123c;
        border-color: #fecdd3;
      }
      .severity-pill.medium {
        background: #fff7ed;
        color: #c2410c;
        border-color: #fed7aa;
      }
      .status-pill.pending {
        background: #eef6ff;
        color: #2563eb;
        border-color: #bfdbfe;
      }
      .detail-grid {
        display: grid;
        gap: 8px;
      }
      .detail-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        background: #fff;
      }
      .detail-list {
        display: grid;
        gap: 8px;
      }
      .detail-line {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        color: var(--text-secondary);
      }
      .detail-line strong {
        color: var(--text-primary);
        text-align: right;
      }
      .detail-actions {
        display: grid;
        gap: 8px;
      }
      .empty-block {
        border: 1px dashed var(--border);
        border-radius: 18px;
        padding: 20px;
        text-align: center;
        color: var(--text-secondary);
        background: #fff;
      }
      @media (max-width: 1360px) {
        .monitor-layout {
          grid-template-columns: 280px minmax(0, 1fr);
        }
        .panel-sticky {
          position: static;
        }
      }
      @media (max-width: 980px) {
        .monitor-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="platform-app">
      <div id="platformSidebar"></div>

      <div class="content-wrap">
        <div id="platformTopBar"></div>

        <main class="page-content">
          <div class="page-toolbar">
            <div class="page-toolbar-copy">
              <h2>异常监控</h2>
              <p>以失败记录为核心查看异常、定位对象，并执行重试处理。</p>
            </div>
            <span class="btn secondary" id="refreshBtn">刷新数据</span>
          </div>

          <div class="monitor-layout">
            <div class="column-stack">
              <section class="card">
                <div class="section-head" style="margin-bottom: 10px;">
                  <strong>状态筛选</strong>
                  <span class="panel-muted" id="failedCountText">0 条异常</span>
                </div>
                <div class="filter-row">
                  <input id="searchInput" placeholder="搜索安检ID、订单号、客户名" />
                  <div class="filter-chip-row" id="filterWrap">
                    <button class="filter-chip active" data-filter="all">全部异常</button>
                    <button class="filter-chip" data-filter="high">高优先级</button>
                    <button class="filter-chip" data-filter="retryable">可重试</button>
                  </div>
                </div>
              </section>

              <section class="card">
                <div class="section-head" style="margin-bottom: 10px;">
                  <strong>监控摘要</strong>
                  <span class="panel-muted">仅保留处理相关指标</span>
                </div>
                <div class="summary-grid" id="summaryGrid"></div>
              </section>
            </div>

            <div class="column-stack">
              <section class="card">
                <div class="section-head" style="margin-bottom: 10px;">
                  <strong>失败记录列表</strong>
                  <span class="panel-muted">按更新时间倒序</span>
                </div>
                <div class="failed-list" id="failedList"></div>
              </section>
              <p class="tip" id="tip"></p>
            </div>

            <div class="column-stack panel-sticky">
              <section class="card">
                <div class="detail-head" style="margin-bottom: 10px;">
                  <div>
                    <div class="detail-title">异常详情</div>
                    <div class="detail-sub">选中失败记录后查看完整信息</div>
                  </div>
                  <span class="panel-muted" id="detailTime">--</span>
                </div>
                <div id="detailPanel" class="detail-grid"></div>
              </section>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module">
      import {
        fetchBusinessMetrics,
        fetchComplianceMetrics,
        retrySafetyById,
      } from "./platform-monitor-client.js";
      import { mountPlatformChrome } from "./platform-shell.js";

      const summaryGrid = document.getElementById("summaryGrid");
      const failedList = document.getElementById("failedList");
      const detailPanel = document.getElementById("detailPanel");
      const detailTime = document.getElementById("detailTime");
      const searchInput = document.getElementById("searchInput");
      const filterWrap = document.getElementById("filterWrap");
      const failedCountText = document.getElementById("failedCountText");
      const refreshBtn = document.getElementById("refreshBtn");
      const tip = document.getElementById("tip");

      let businessData = null;
      let complianceData = null;
      let selectedSafetyId = "";
      let activeFilter = "all";

      function setTip(text, isError = false) {
        tip.textContent = text;
        tip.className = isError ? "tip err" : "tip";
      }

      function fmtTime(ts) {
        if (!ts) return "未知";
        return new Date(ts).toLocaleString("zh-CN", { hour12: false });
      }

      function buildSeverity(item) {
        if (Number(item.reportAttempts || 0) >= 2) return "high";
        if (String(item.lastError || "").includes("监管")) return "high";
        return "medium";
      }

      function renderSummary() {
        const biz = businessData || {};
        const compliance = complianceData?.summary || {};
        const failed = complianceData?.failedList || [];
        const rows = [
          { label: "待处理异常", value: failed.length, note: "当前失败记录" },
          { label: "安检失败", value: compliance.failed || 0, note: "监管上报失败" },
          { label: "待上报", value: compliance.pending || 0, note: "仍在等待同步" },
          { label: "同步失败", value: biz.sync?.failedCount || 0, note: "离线与同步异常" },
        ];
        summaryGrid.innerHTML = rows
          .map(
            (row) => `
              <div class="summary-card">
                <span>${row.label}</span>
                <strong>${row.value}</strong>
                <span>${row.note}</span>
              </div>
            `,
          )
          .join("");
      }

      function getFilteredFailedList() {
        const list = [...(complianceData?.failedList || [])];
        const keyword = String(searchInput.value || "").trim().toLowerCase();
        return list.filter((item) => {
          const severity = buildSeverity(item);
          const passFilter =
            activeFilter === "all"
              ? true
              : activeFilter === "high"
                ? severity === "high"
                : Number(item.reportAttempts || 0) < 3;
          const text = `${item.safetyId} ${item.orderId} ${item.customerName} ${item.lastError || ""}`.toLowerCase();
          const passKeyword = !keyword || text.includes(keyword);
          return passFilter && passKeyword;
        });
      }

      function renderFailedList() {
        const rows = getFilteredFailedList();
        failedCountText.textContent = `${rows.length} 条异常`;
        if (!rows.length) {
          failedList.innerHTML = '<div class="empty-block">当前没有匹配到异常记录</div>';
          if (!selectedSafetyId) renderDetail(null);
          return;
        }
        if (!selectedSafetyId || !rows.some((item) => item.safetyId === selectedSafetyId)) {
          selectedSafetyId = rows[0].safetyId;
        }
        failedList.innerHTML = rows
          .map((item) => {
            const severity = buildSeverity(item);
            return `
              <button class="failed-card ${item.safetyId === selectedSafetyId ? "active" : ""}" type="button" data-safety-id="${item.safetyId}">
                <div class="failed-head">
                  <div>
                    <div class="failed-title">${item.customerName || "未知客户"}</div>
                    <div class="failed-sub">安检 ${item.safetyId} · 订单 ${item.orderId}</div>
                  </div>
                  <span class="severity-pill ${severity}">${severity === "high" ? "高优先级" : "待处理"}</span>
                </div>
                <div class="failed-sub">${item.lastError || "未知异常"}</div>
                <div class="scope-card-meta" style="margin-top: 10px;">
                  <div class="scope-meta-tile">
                    <div class="scope-meta-label">重试次数</div>
                    <div class="scope-meta-value">${item.reportAttempts || 0} 次</div>
                  </div>
                  <div class="scope-meta-tile">
                    <div class="scope-meta-label">更新时间</div>
                    <div class="scope-meta-value">${fmtTime(item.updatedAt)}</div>
                  </div>
                </div>
              </button>
            `;
          })
          .join("");
        failedList.querySelectorAll("[data-safety-id]").forEach((node) => {
          node.addEventListener("click", () => {
            selectedSafetyId = node.getAttribute("data-safety-id") || "";
            renderFailedList();
            renderDetail((complianceData?.failedList || []).find((item) => item.safetyId === selectedSafetyId) || null);
          });
        });
        renderDetail((complianceData?.failedList || []).find((item) => item.safetyId === selectedSafetyId) || null);
      }

      function renderDetail(item) {
        if (!item) {
          detailTime.textContent = "--";
          detailPanel.innerHTML = '<div class="empty-block">当前没有可查看的异常详情</div>';
          return;
        }
        detailTime.textContent = fmtTime(item.updatedAt);
        detailPanel.innerHTML = `
          <div class="detail-card">
            <div class="detail-list">
              <div class="detail-line"><span>客户</span><strong>${item.customerName || "未知"}</strong></div>
              <div class="detail-line"><span>安检ID</span><strong>${item.safetyId}</strong></div>
              <div class="detail-line"><span>订单号</span><strong>${item.orderId}</strong></div>
              <div class="detail-line"><span>失败原因</span><strong>${item.lastError || "未知"}</strong></div>
              <div class="detail-line"><span>重试次数</span><strong>${item.reportAttempts || 0} 次</strong></div>
            </div>
          </div>
          <div class="detail-card">
            <div class="detail-list">
              <div class="detail-line"><span>待上报</span><strong>${complianceData?.summary?.pending || 0}</strong></div>
              <div class="detail-line"><span>失败总数</span><strong>${complianceData?.summary?.failed || 0}</strong></div>
              <div class="detail-line"><span>同步失败</span><strong>${businessData?.sync?.failedCount || 0}</strong></div>
              <div class="detail-line"><span>累计实收</span><strong>￥${Number(businessData?.finance?.totalRevenue || 0).toFixed(2)}</strong></div>
            </div>
          </div>
          <div class="detail-actions">
            <button class="btn danger" id="retrySelectedBtn">立即重试上报</button>
            <button class="btn ghost" id="refreshDetailBtn">刷新当前列表</button>
          </div>
        `;
        document.getElementById("retrySelectedBtn")?.addEventListener("click", async () => {
          setTip("正在执行重试...");
          const r = await retrySafetyById(item.safetyId);
          if (!r.success) return setTip(r.error || "重试失败，请稍后再试", true);
          setTip("重试请求已提交");
          await loadAll();
        });
        document.getElementById("refreshDetailBtn")?.addEventListener("click", () => {
          void loadAll();
        });
      }

      async function loadAll() {
        try {
          setTip("正在加载监控数据...");
          const [bizRes, complianceRes] = await Promise.all([fetchBusinessMetrics(), fetchComplianceMetrics()]);
          if (!bizRes.success) throw new Error(bizRes.error || "经营数据加载失败");
          if (!complianceRes.success) throw new Error(complianceRes.error || "合规数据加载失败");
          businessData = bizRes.data || {};
          complianceData = complianceRes.data || { summary: {}, failedList: [] };
          renderSummary();
          renderFailedList();
          setTip("监控数据已更新");
        } catch (err) {
          setTip(err.message || "加载失败，请稍后重试", true);
        }
      }

      searchInput.addEventListener("input", renderFailedList);
      filterWrap.querySelectorAll("[data-filter]").forEach((node) => {
        node.addEventListener("click", () => {
          activeFilter = node.getAttribute("data-filter") || "all";
          filterWrap.querySelectorAll("[data-filter]").forEach((x) => x.classList.toggle("active", x === node));
          renderFailedList();
        });
      });
      refreshBtn.addEventListener("click", () => {
        void loadAll();
      });

      mountPlatformChrome({
        active: "monitor",
        breadcrumb: "异常监控",
        title: "平台监控",
        actions: [{ label: "进入策略配置", href: "./policy-release.html", variant: "secondary" }],
      });

      loadAll();
    </script>
  </body>
</html>
