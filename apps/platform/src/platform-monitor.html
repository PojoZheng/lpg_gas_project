<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>平台监控</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
  </head>
  <body>
    <div class="platform-app">
      <div id="platformSidebar"></div>
      <div class="content-wrap">
        <div id="platformTopBar"></div>
        <main class="page-content">
          <div class="page-stack">
            <section class="hero-panel">
              <div class="hero-grid">
                <div>
                  <span class="hero-kicker">Compliance Monitor</span>
                  <h2 class="hero-title-lg">异常监控列表</h2>
                  <p class="hero-copy">
                    聚焦真正需要处理的异常。先用列表筛出高优先级失败记录，再进入详情页做重试和排查。
                  </p>
                  <div class="hero-actions">
                    <button class="btn primary" id="refreshBtn">刷新数据</button>
                    <a class="btn ghost" href="./policy-release.html">进入策略配置</a>
                  </div>
                </div>
                <div class="inline-metrics" id="metricPanel">
                  <div class="inline-metric"><div class="inline-metric-label">失败异常</div><div class="inline-metric-value">--</div><div class="inline-metric-note">上报失败记录</div></div>
                  <div class="inline-metric"><div class="inline-metric-label">待上报</div><div class="inline-metric-value">--</div><div class="inline-metric-note">仍未完成上报</div></div>
                  <div class="inline-metric"><div class="inline-metric-label">同步失败</div><div class="inline-metric-value">--</div><div class="inline-metric-note">离线与同步异常</div></div>
                </div>
              </div>
            </section>

            <section class="section-card">
              <div class="section-head">
                <div>
                  <h3 class="section-title">异常检索</h3>
                  <p class="section-copy">按关键字和优先级筛出最需要处理的异常记录。</p>
                </div>
                <span class="badge brand" id="rowCountBadge">0 条</span>
              </div>

              <div class="toolbar">
                <input class="input" id="searchInput" placeholder="搜索安检ID、订单号、客户名" />
                <select id="priorityFilter">
                  <option value="all">全部异常</option>
                  <option value="high">高优先级</option>
                  <option value="retryable">可重试</option>
                </select>
                <div class="toolbar-cluster">
                  <span class="muted-note">只展示失败异常记录</span>
                </div>
              </div>

              <p class="tip" id="tip"></p>

              <div class="table-shell">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>客户与安检</th>
                      <th>异常信息</th>
                      <th>优先级</th>
                      <th>更新时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="5">加载中...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="./runtime-config.js"></script>
    <script type="module">
      import { fetchBusinessMetrics, fetchComplianceMetrics } from "./platform-monitor-client.js";
      import { mountPlatformChrome } from "./platform-shell.js";

      const metricPanel = document.getElementById("metricPanel");
      const searchInput = document.getElementById("searchInput");
      const priorityFilter = document.getElementById("priorityFilter");
      const rowCountBadge = document.getElementById("rowCountBadge");
      const tableBody = document.getElementById("tableBody");
      const refreshBtn = document.getElementById("refreshBtn");
      const tip = document.getElementById("tip");

      let businessData = null;
      let complianceData = null;

      function setTip(text = "", isError = false) {
        tip.textContent = text;
        tip.className = isError ? "tip err" : "tip";
      }

      function fmtTime(ts) {
        if (!ts) return "--";
        return new Date(ts).toLocaleString("zh-CN", { hour12: false });
      }

      function buildSeverity(item) {
        if (Number(item.reportAttempts || 0) >= 2) return "high";
        if (String(item.lastError || "").includes("监管")) return "high";
        return "medium";
      }

      function filteredRows() {
        const list = [...(complianceData?.failedList || [])];
        const keyword = String(searchInput.value || "").trim().toLowerCase();
        const priority = String(priorityFilter.value || "all");
        return list.filter((item) => {
          const severity = buildSeverity(item);
          const passPriority =
            priority === "all"
              ? true
              : priority === "high"
                ? severity === "high"
                : Number(item.reportAttempts || 0) < 3;
          const text = `${item.safetyId} ${item.orderId} ${item.customerName} ${item.lastError || ""}`.toLowerCase();
          return passPriority && (!keyword || text.includes(keyword));
        });
      }

      function renderMetrics() {
        const failed = complianceData?.summary?.failed || 0;
        const pending = complianceData?.summary?.pending || 0;
        const syncFailed = businessData?.sync?.failedCount || 0;
        metricPanel.innerHTML = `
          <div class="inline-metric">
            <div class="inline-metric-label">失败异常</div>
            <div class="inline-metric-value">${failed}</div>
            <div class="inline-metric-note">上报失败记录</div>
          </div>
          <div class="inline-metric">
            <div class="inline-metric-label">待上报</div>
            <div class="inline-metric-value">${pending}</div>
            <div class="inline-metric-note">仍未完成上报</div>
          </div>
          <div class="inline-metric">
            <div class="inline-metric-label">同步失败</div>
            <div class="inline-metric-value">${syncFailed}</div>
            <div class="inline-metric-note">离线与同步异常</div>
          </div>
        `;
      }

      function renderTable() {
        const rows = filteredRows();
        rowCountBadge.textContent = `${rows.length} 条`;
        if (!rows.length) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="5">
                <div class="empty-state">
                  <div>
                    <div>当前没有匹配到异常记录</div>
                    <div class="muted-note">可以调整筛选条件，或者刷新数据后再看。</div>
                  </div>
                </div>
              </td>
            </tr>
          `;
          return;
        }
        tableBody.innerHTML = rows
          .map((item) => {
            const severity = buildSeverity(item);
            const badgeClass = severity === "high" ? "draft" : "history";
            return `
              <tr>
                <td>
                  <div class="table-title">${item.customerName || "未知客户"}</div>
                  <div class="table-sub">安检 ${item.safetyId} · 订单 ${item.orderId}</div>
                </td>
                <td>
                  <div class="table-title">${item.lastError || "未知异常"}</div>
                  <div class="table-sub">累计重试 ${Number(item.reportAttempts || 0)} 次</div>
                </td>
                <td><span class="badge ${badgeClass}">${severity === "high" ? "高优先级" : "待处理"}</span></td>
                <td>
                  <div class="table-title">${fmtTime(item.updatedAt)}</div>
                  <div class="table-sub">最近更新时间</div>
                </td>
                <td>
                  <div class="toolbar-cluster">
                    <a class="btn secondary" href="./monitor-detail.html?safetyId=${encodeURIComponent(item.safetyId || "")}">查看详情</a>
                  </div>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      async function loadAll() {
        try {
          setTip("正在加载监控数据...");
          const [bizRes, complianceRes] = await Promise.all([fetchBusinessMetrics(), fetchComplianceMetrics()]);
          if (!bizRes.success) throw new Error(bizRes.error || "经营数据加载失败");
          if (!complianceRes.success) throw new Error(complianceRes.error || "合规数据加载失败");
          businessData = bizRes.data || {};
          complianceData = complianceRes.data || { summary: {}, failedList: [] };
          renderMetrics();
          renderTable();
          setTip("监控数据已更新");
        } catch (err) {
          setTip(err.message || "加载失败，请稍后重试", true);
        }
      }

      searchInput.addEventListener("input", renderTable);
      priorityFilter.addEventListener("change", renderTable);
      refreshBtn.addEventListener("click", () => {
        void loadAll();
      });

      mountPlatformChrome({
        active: "monitor",
        breadcrumb: "异常监控",
        title: "平台监控",
        actions: [{ label: "进入策略配置", href: "./policy-release.html", variant: "secondary" }],
      });

      loadAll();
    </script>
  </body>
</html>
