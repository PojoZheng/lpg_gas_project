<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>策略规则</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
    <style>
      .page-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .page-toolbar-copy h2 {
        margin: 0;
        font-size: 22px;
      }
      .page-toolbar-copy p {
        margin: 6px 0 0;
        color: var(--text-secondary);
        font-size: 13px;
      }
      .saas-layout {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }
      .panel-card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.04);
        margin-bottom: 0;
      }
      .panel-head,
      .detail-head,
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }
      .panel-copy h3,
      .section-head h3,
      .summary-card h3 {
        margin: 0;
        font-size: 15px;
      }
      .panel-copy p,
      .section-head p,
      .panel-muted {
        margin: 6px 0 0;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.5;
      }
      .filter-row {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 8px;
        margin: 14px 0;
      }
      .rule-list {
        display: grid;
        gap: 8px;
      }
      .rule-card {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 12px;
        background: #fff;
        text-align: left;
        cursor: pointer;
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }
      .rule-card.active {
        border-color: var(--brand);
        box-shadow: 0 8px 20px rgba(71, 153, 160, 0.1);
        background: linear-gradient(180deg, #ffffff 0%, #f8fbfb 100%);
      }
      .rule-card-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 10px;
      }
      .rule-title {
        font-size: 14px;
        font-weight: 700;
      }
      .rule-sub {
        margin-top: 4px;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.5;
      }
      .rule-meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .meta-tile,
      .summary-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 10px;
        background: #fff;
      }
      .meta-label {
        color: var(--text-secondary);
        font-size: 11px;
      }
      .meta-value {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 600;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid #d4e7ea;
        background: #fff;
        font-size: 12px;
      }
      .status-pill.active {
        background: #eff8f1;
        border-color: #cfe7d5;
        color: #20804f;
      }
      .status-pill.draft {
        background: #fff7ed;
        border-color: #fed7aa;
        color: #b45309;
      }
      .status-pill.history {
        background: #f3f4f6;
        border-color: #e5e7eb;
        color: #6b7280;
      }
      .detail-stack,
      .summary-grid,
      .summary-list {
        display: grid;
        gap: 12px;
      }
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .summary-list {
        gap: 8px;
        margin-top: 10px;
      }
      .summary-line {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--text-secondary);
        font-size: 13px;
      }
      .summary-line strong {
        color: var(--text-primary);
        text-align: right;
      }
      .empty-block {
        border: 1px dashed var(--border);
        border-radius: 18px;
        padding: 24px;
        text-align: center;
        color: var(--text-secondary);
        background: #fff;
      }
      @media (max-width: 1120px) {
        .saas-layout {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 860px) {
        .filter-row,
        .rule-meta,
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="platform-app">
      <div id="platformSidebar"></div>
      <div class="content-wrap">
        <div id="platformTopBar"></div>
        <main class="page-content">
          <div class="page-toolbar">
            <div class="page-toolbar-copy">
              <h2>策略规则</h2>
              <p>左侧查看适用范围，右侧查看当前规则摘要。新增或编辑进入单独页面处理。</p>
            </div>
            <a class="btn primary" href="./policy-editor.html">新增规则</a>
          </div>

          <div class="saas-layout">
            <section class="panel-card">
              <div class="panel-head">
                <div class="panel-copy">
                  <h3>规则列表</h3>
                  <p>按地区和燃气公司查看当前配送员执行的规则。</p>
                </div>
                <span class="btn secondary" id="ruleCountTag">0 条</span>
              </div>
              <div class="filter-row">
                <select id="typeFilter">
                  <option value="all">全部范围</option>
                  <option value="region">地区规则</option>
                  <option value="company">燃气公司规则</option>
                </select>
                <input id="keywordInput" placeholder="搜索地区、燃气公司、区域编码" />
              </div>
              <div class="rule-list" id="ruleList"></div>
            </section>

            <section class="panel-card">
              <div class="detail-head">
                <div class="panel-copy">
                  <h3>规则详情</h3>
                  <p>先确认当前规则内容，再进入编辑页调整。</p>
                </div>
                <a class="btn secondary" id="editBtn" href="./policy-editor.html">编辑规则</a>
              </div>
              <div class="detail-stack" id="detailPanel"></div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script type="module">
      import { fetchCurrentPolicy, fetchPolicyVersions } from "./policy-release-client.js";
      import { mountPlatformChrome } from "./platform-shell.js";

      const typeFilter = document.getElementById("typeFilter");
      const keywordInput = document.getElementById("keywordInput");
      const ruleCountTag = document.getElementById("ruleCountTag");
      const ruleList = document.getElementById("ruleList");
      const detailPanel = document.getElementById("detailPanel");
      const editBtn = document.getElementById("editBtn");

      let selectedVersion = "";
      let allPolicyVersions = [];

      function formatTime(ts) {
        if (!ts) return "未发布";
        return new Date(ts).toLocaleString("zh-CN", { hour12: false });
      }

      function scopeTypeLabel(value) {
        return value === "company" ? "燃气公司" : "地区";
      }

      function statusLabel(value) {
        return value === "active" ? "生效中" : value === "draft" ? "草稿" : "历史";
      }

      function inspectionLabel(content) {
        const delivery = content.inspection?.delivery || {};
        if (!delivery.enabled) return "不需要";
        if (String(delivery.mode || "") === "optional") return "可选";
        return "必做";
      }

      function scanLabel(content) {
        const scan = content.scan || {};
        if (!scan.enabled) return "不需要";
        if (!scan.required) return "建议";
        return "必须";
      }

      function reportTargetLabel(content) {
        const value = String(content.reporting?.mode || "company_first");
        return ({ direct: "直报监管", company_first: "燃气公司转报", hybrid: "上报燃气公司" })[value] || "燃气公司转报";
      }

      function normalizeScopeMeta(policy = {}) {
        const scopeType = String(policy.scopeType || "region").trim() === "company" ? "company" : "region";
        const regionCode = String(policy.regionCode || policy.scopeValue || "CN-DEFAULT").trim() || "CN-DEFAULT";
        const regionName = String(policy.content?.regionName || policy.regionName || "全国默认区域").trim() || "全国默认区域";
        const companyName = scopeType === "company" ? String(policy.scopeLabel || "默认燃气公司").trim() || "默认燃气公司" : "当前地区全部配送员";
        return { scopeType, regionCode, regionName, companyName };
      }

      function normalizePolicyContent(content = {}) {
        const deliveryEnabled = Boolean(content.inspection?.delivery?.enabled ?? content.safetyCheckRequired ?? true);
        const deliveryModeRaw = String(content.inspection?.delivery?.mode || "required");
        const deliveryMode = !deliveryEnabled ? "disabled" : deliveryModeRaw === "optional" ? "optional" : "required";
        const scanEnabled = Boolean(content.scan?.enabled ?? true);
        const scanRequired = Boolean(content.scan?.required ?? false);
        const reportingMode = String(content.reporting?.mode || "company_first");
        return {
          inspection: { delivery: { enabled: deliveryEnabled, mode: deliveryMode } },
          scan: { enabled: scanEnabled, required: scanRequired },
          reporting: { mode: reportingMode },
        };
      }

      function buildRows(items) {
        const grouped = new Map();
        items.forEach((item) => {
          const scope = normalizeScopeMeta(item);
          const key = `${scope.scopeType}:${scope.regionCode}:${scope.companyName}`;
          const current = grouped.get(key);
          if (!current) {
            grouped.set(key, item);
            return;
          }
          const currentPriority = current.status === "active" ? 3 : current.status === "draft" ? 2 : 1;
          const nextPriority = item.status === "active" ? 3 : item.status === "draft" ? 2 : 1;
          if (nextPriority > currentPriority || (nextPriority === currentPriority && Number(item.publishedAt || 0) > Number(current.publishedAt || 0))) {
            grouped.set(key, item);
          }
        });
        return [...grouped.values()];
      }

      function renderDetail(item) {
        if (!item) {
          detailPanel.innerHTML = '<div class="empty-block">请选择一条策略规则查看详情</div>';
          editBtn.href = "./policy-editor.html";
          return;
        }
        const scope = normalizeScopeMeta(item);
        const content = normalizePolicyContent(item.content || {});
        editBtn.href = `./policy-editor.html?version=${encodeURIComponent(item.version || "")}`;
        detailPanel.innerHTML = `
          <div class="summary-grid">
            <div class="summary-card">
              <h3>适用范围</h3>
              <div class="summary-list">
                <div class="summary-line"><span>规则类型</span><strong>${scopeTypeLabel(scope.scopeType)}</strong></div>
                <div class="summary-line"><span>地区</span><strong>${scope.regionName}</strong></div>
                <div class="summary-line"><span>区域编码</span><strong>${scope.regionCode}</strong></div>
                <div class="summary-line"><span>燃气公司</span><strong>${scope.companyName}</strong></div>
              </div>
            </div>
            <div class="summary-card">
              <h3>当前规则</h3>
              <div class="summary-list">
                <div class="summary-line"><span>随瓶安检</span><strong>${inspectionLabel(content)}</strong></div>
                <div class="summary-line"><span>扫码要求</span><strong>${scanLabel(content)}</strong></div>
                <div class="summary-line"><span>上报给谁</span><strong>${reportTargetLabel(content)}</strong></div>
                <div class="summary-line"><span>当前版本</span><strong>${item.version || "未保存"}</strong></div>
                <div class="summary-line"><span>发布时间</span><strong>${formatTime(item.publishedAt)}</strong></div>
              </div>
            </div>
          </div>
          <div class="summary-grid">
            <div class="summary-card">
              <h3>业务说明</h3>
              <div class="summary-list">
                <div class="summary-line"><span>配送员执行</span><strong>按当前规则统一作业</strong></div>
                <div class="summary-line"><span>异常处理</span><strong>去同步队列处理</strong></div>
                <div class="summary-line"><span>运维能力</span><strong>不在业务页面展开</strong></div>
              </div>
            </div>
          </div>
        `;
      }

      function renderList() {
        const filter = String(typeFilter.value || "all");
        const keyword = String(keywordInput.value || "").trim().toLowerCase();
        const rows = buildRows(allPolicyVersions).filter((item) => {
          const scope = normalizeScopeMeta(item);
          if (filter !== "all" && scope.scopeType !== filter) return false;
          const text = `${scope.regionName} ${scope.regionCode} ${scope.companyName}`.toLowerCase();
          return !keyword || text.includes(keyword);
        });
        ruleCountTag.textContent = `${rows.length} 条`;
        ruleList.innerHTML = rows.length
          ? rows.map((item) => {
              const scope = normalizeScopeMeta(item);
              const content = normalizePolicyContent(item.content || {});
              return `
                <button class="rule-card ${item.version === selectedVersion ? "active" : ""}" type="button" data-version="${item.version}">
                  <div class="rule-card-head">
                    <div>
                      <div class="rule-title">${scope.regionName}</div>
                      <div class="rule-sub">${scopeTypeLabel(scope.scopeType)} · ${scope.companyName}<br/>区域编码 ${scope.regionCode}</div>
                    </div>
                    <span class="status-pill ${item.status}">${statusLabel(item.status)}</span>
                  </div>
                  <div class="rule-meta">
                    <div class="meta-tile"><div class="meta-label">随瓶安检</div><div class="meta-value">${inspectionLabel(content)}</div></div>
                    <div class="meta-tile"><div class="meta-label">扫码要求</div><div class="meta-value">${scanLabel(content)}</div></div>
                    <div class="meta-tile"><div class="meta-label">上报给谁</div><div class="meta-value">${reportTargetLabel(content)}</div></div>
                    <div class="meta-tile"><div class="meta-label">当前版本</div><div class="meta-value">${item.version || "未保存"}</div></div>
                  </div>
                </button>
              `;
            }).join("")
          : '<div class="empty-block">当前没有匹配到策略规则</div>';

        ruleList.querySelectorAll("[data-version]").forEach((node) => {
          node.addEventListener("click", () => {
            const version = node.getAttribute("data-version") || "";
            const target = allPolicyVersions.find((item) => item.version === version);
            if (!target) return;
            selectedVersion = version;
            renderDetail(target);
            renderList();
          });
        });
      }

      async function loadAll() {
        const [currentRes, versionsRes] = await Promise.all([fetchCurrentPolicy(), fetchPolicyVersions()]);
        allPolicyVersions = versionsRes.success ? versionsRes.data || [] : [];
        const current = currentRes.success ? currentRes.data || null : null;
        if (current?.version) selectedVersion = current.version;
        renderList();
        renderDetail(allPolicyVersions.find((item) => item.version === selectedVersion) || current);
      }

      typeFilter.addEventListener("change", renderList);
      keywordInput.addEventListener("input", renderList);

      mountPlatformChrome({
        active: "policy",
        breadcrumb: "策略规则",
        title: "平台策略规则",
        actions: [{ label: "新增规则", href: "./policy-editor.html", variant: "primary" }],
      });

      loadAll();
    </script>
  </body>
</html>
