<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>平台策略列表</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
    <style>
      .page-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .page-toolbar-copy h2 {
        margin: 0;
        font-size: 22px;
      }
      .page-toolbar-copy p {
        margin: 6px 0 0;
        color: var(--text-secondary);
        font-size: 13px;
      }
      .page-layout {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }
      .column-stack {
        display: grid;
        gap: 16px;
        min-width: 0;
      }
      .column-stack > .card {
        margin-bottom: 0;
      }
      .list-card,
      .detail-card {
        border-radius: 24px;
        padding: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.04);
      }
      .scope-overview-head,
      .detail-head,
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
      }
      .panel-muted {
        margin-top: 4px;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.5;
      }
      .scope-filter-row {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 8px;
        margin: 12px 0;
      }
      .scope-grid,
      .summary-grid,
      .summary-list,
      .detail-grid {
        display: grid;
        gap: 8px;
      }
      .scope-card {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 12px;
        background: #fff;
        text-align: left;
        cursor: pointer;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }
      .scope-card.active {
        border-color: var(--brand);
        box-shadow: 0 10px 22px rgba(71, 153, 160, 0.1);
        transform: translateY(-1px);
      }
      .scope-card-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 10px;
      }
      .scope-card-title {
        font-size: 14px;
        font-weight: 700;
      }
      .scope-card-sub {
        margin-top: 4px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.5;
      }
      .scope-card-meta {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .scope-meta-tile,
      .summary-card {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 12px;
        background: #fff;
      }
      .scope-meta-label {
        font-size: 11px;
        color: var(--text-secondary);
      }
      .scope-meta-value {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 600;
      }
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .summary-card h3 {
        margin: 0 0 10px;
        font-size: 14px;
      }
      .summary-line {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
        color: var(--text-secondary);
      }
      .summary-line strong {
        color: var(--text-primary);
        text-align: right;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #d4e7ea;
        background: #fff;
        font-size: 12px;
      }
      .status-pill.active {
        background: #eff8f1;
        border-color: #cfe7d5;
        color: #20804f;
      }
      .status-pill.draft {
        background: #fff7ed;
        border-color: #fed7aa;
        color: #b45309;
      }
      .status-pill.history {
        background: #f3f4f6;
        border-color: #e5e7eb;
        color: #6b7280;
      }
      .empty-block {
        border: 1px dashed var(--border);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        color: var(--text-secondary);
        background: #fff;
      }
      @media (max-width: 1100px) {
        .page-layout {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 860px) {
        .scope-filter-row,
        .scope-card-meta,
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="platform-app">
      <div id="platformSidebar"></div>
      <div class="content-wrap">
        <div id="platformTopBar"></div>
        <main class="page-content">
          <div class="page-toolbar">
            <div class="page-toolbar-copy">
              <h2>策略列表</h2>
              <p>这个页面只负责查看、筛选和进入编辑，不在列表页直接改规则。</p>
            </div>
            <a class="btn primary" href="./policy-editor.html">新增规则</a>
          </div>

          <div class="page-layout">
            <div class="column-stack">
              <section class="card list-card">
                <div class="scope-overview-head">
                  <div>
                    <h2 class="card-title" style="margin-bottom: 0">配置对象列表</h2>
                    <p class="panel-muted">按地区、燃气公司、个人账号查看当前采用的策略。</p>
                  </div>
                  <span class="btn secondary" id="scopeCountTag">0 个作用域</span>
                </div>
                <div class="scope-filter-row">
                  <select id="scopeListFilter">
                    <option value="all">全部层级</option>
                    <option value="region">地区</option>
                    <option value="company">燃气公司</option>
                    <option value="account">个人账号</option>
                  </select>
                  <input id="scopeListSearch" placeholder="搜索作用域名称、标识、区域编码" />
                </div>
                <div class="scope-grid" id="scopeList"></div>
              </section>
            </div>

            <div class="column-stack">
              <section class="card detail-card">
                <div class="detail-head" style="margin-bottom: 12px;">
                  <div>
                    <h2 class="card-title" style="margin-bottom: 0">当前生效配置</h2>
                    <p class="panel-muted">先确认对象与当前配置，再进入编辑页处理。</p>
                  </div>
                  <div class="btn-row">
                    <a class="btn secondary" id="editPolicyBtn" href="./policy-editor.html">编辑规则</a>
                  </div>
                </div>
                <div id="currentPolicy"></div>
              </section>

              <section class="card detail-card">
                <div class="section-head" style="margin-bottom: 12px;">
                  <div>
                    <h2 class="card-title" style="margin-bottom: 0">业务说明</h2>
                    <p class="panel-muted">列表页只做查找和确认，不承担编辑动作。</p>
                  </div>
                </div>
                <div class="summary-grid">
                  <div class="summary-card">
                    <h3>这页做什么</h3>
                    <div class="summary-list">
                      <div class="summary-line"><span>查看对象</span><strong>看谁在用什么策略</strong></div>
                      <div class="summary-line"><span>查询筛选</span><strong>按层级和关键字定位</strong></div>
                      <div class="summary-line"><span>进入编辑</span><strong>跳转到编辑页处理</strong></div>
                    </div>
                  </div>
                  <div class="summary-card">
                    <h3>这页不做什么</h3>
                    <div class="summary-list">
                      <div class="summary-line"><span>不直接改</span><strong>避免列表页塞满表单</strong></div>
                      <div class="summary-line"><span>不做运维</span><strong>版本审计挂云上</strong></div>
                      <div class="summary-line"><span>不处理异常</span><strong>监控页/同步页承接</strong></div>
                    </div>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module">
      import { fetchCurrentPolicy, fetchPolicyVersions } from "./policy-release-client.js";
      import { mountPlatformChrome } from "./platform-shell.js";

      const DEFAULT_POLICY_CONTENT = {
        regionName: "全国默认区域",
        template: "standard",
        scan: { enabled: true, required: false, mode: "qr_code", scenes: ["delivery", "recovery"] },
        inspection: {
          delivery: { enabled: true, mode: "manual" },
          periodic: { enabled: true, cycleDays: 90 },
        },
        reporting: { mode: "hybrid", retryCount: 3, syncBatchSize: 20 },
      };

      const scopeListFilter = document.getElementById("scopeListFilter");
      const scopeListSearch = document.getElementById("scopeListSearch");
      const scopeList = document.getElementById("scopeList");
      const scopeCountTag = document.getElementById("scopeCountTag");
      const currentPolicy = document.getElementById("currentPolicy");
      const editPolicyBtn = document.getElementById("editPolicyBtn");

      let allPolicyVersions = [];
      let selectedVersion = "";

      function formatTime(ts) {
        if (!ts) return "未发布";
        return new Date(ts).toLocaleString("zh-CN", { hour12: false });
      }

      function uniq(values = []) {
        return [...new Set((values || []).map((item) => String(item || "").trim()).filter(Boolean))];
      }

      function scopeDefaults(type) {
        if (type === "company") return { value: "COMP-DEFAULT", label: "默认燃气公司" };
        if (type === "account") return { value: "DEALER-DEFAULT", label: "默认配送账号" };
        return { value: "CN-DEFAULT", label: "全国默认区域" };
      }

      function scopeTypeLabel(value) {
        return ({ region: "地区", company: "燃气公司", account: "个人账号" })[value] || "地区";
      }

      function statusLabel(value) {
        return value === "active" ? "生效中" : value === "draft" ? "草稿" : "历史";
      }

      function templateLabel(value) {
        return ({ strict: "严格", standard: "标准", loose: "宽松" })[value] || value;
      }

      function modeLabel(value) {
        return ({ ai_assist: "AI辅助", photo_only: "仅拍照", manual: "人工" })[value] || value;
      }

      function scanModeLabel(value) {
        return ({ qr_code: "二维码", rfid: "RFID", manual: "手动录入" })[value] || value;
      }

      function reportModeLabel(value) {
        return ({ company_first: "燃企中转", direct: "直连政府", hybrid: "混合模式" })[value] || value;
      }

      function normalizeScopeMeta(policy = {}) {
        const scopeType = ["region", "company", "account"].includes(String(policy.scopeType || "").trim())
          ? String(policy.scopeType || "").trim()
          : "region";
        const fallback = scopeDefaults(scopeType);
        const scopeValue = String(policy.scopeValue || policy.regionCode || fallback.value).trim() || fallback.value;
        const scopeLabel = String(policy.scopeLabel || policy.regionName || fallback.label).trim() || fallback.label;
        const regionCode = scopeType === "region" ? scopeValue : String(policy.regionCode || "CN-DEFAULT").trim() || "CN-DEFAULT";
        return { scopeType, scopeValue, scopeLabel, regionCode };
      }

      function normalizePolicyContent(content = {}) {
        return {
          regionName: String(content.regionName || DEFAULT_POLICY_CONTENT.regionName),
          template: String(content.template || DEFAULT_POLICY_CONTENT.template),
          scan: {
            enabled: Boolean(content.scan?.enabled ?? DEFAULT_POLICY_CONTENT.scan.enabled),
            required: Boolean(content.scan?.required ?? DEFAULT_POLICY_CONTENT.scan.required),
            mode: String(content.scan?.mode || DEFAULT_POLICY_CONTENT.scan.mode),
            scenes: uniq(content.scan?.scenes || DEFAULT_POLICY_CONTENT.scan.scenes),
          },
          inspection: {
            delivery: {
              enabled: Boolean(content.inspection?.delivery?.enabled ?? DEFAULT_POLICY_CONTENT.inspection.delivery.enabled),
              mode: String(content.inspection?.delivery?.mode || DEFAULT_POLICY_CONTENT.inspection.delivery.mode),
            },
            periodic: {
              enabled: Boolean(content.inspection?.periodic?.enabled ?? DEFAULT_POLICY_CONTENT.inspection.periodic.enabled),
              cycleDays: Number(content.inspection?.periodic?.cycleDays ?? DEFAULT_POLICY_CONTENT.inspection.periodic.cycleDays),
            },
          },
          reporting: {
            mode: String(content.reporting?.mode || DEFAULT_POLICY_CONTENT.reporting.mode),
            retryCount: Number(content.reporting?.retryCount ?? DEFAULT_POLICY_CONTENT.reporting.retryCount),
            syncBatchSize: Number(content.reporting?.syncBatchSize ?? DEFAULT_POLICY_CONTENT.reporting.syncBatchSize),
          },
        };
      }

      function buildScopeOverviewRows(versions = []) {
        const grouped = new Map();
        versions.forEach((item) => {
          const scope = normalizeScopeMeta(item);
          const key = `${scope.scopeType}:${scope.scopeValue}`;
          const current = grouped.get(key);
          if (!current) {
            grouped.set(key, item);
            return;
          }
          const currentPriority = current.status === "active" ? 3 : current.status === "draft" ? 2 : 1;
          const nextPriority = item.status === "active" ? 3 : item.status === "draft" ? 2 : 1;
          if (nextPriority > currentPriority) {
            grouped.set(key, item);
            return;
          }
          if (nextPriority === currentPriority && Number(item.publishedAt || 0) > Number(current.publishedAt || 0)) {
            grouped.set(key, item);
          }
        });
        return [...grouped.values()].sort((a, b) => {
          const scopeA = normalizeScopeMeta(a);
          const scopeB = normalizeScopeMeta(b);
          const order = { region: 1, company: 2, account: 3 };
          const delta = (order[scopeA.scopeType] || 9) - (order[scopeB.scopeType] || 9);
          if (delta !== 0) return delta;
          return String(scopeA.scopeLabel).localeCompare(String(scopeB.scopeLabel), "zh-CN");
        });
      }

      function renderCurrentPolicy(policy) {
        if (!policy) {
          currentPolicy.innerHTML = '<div class="empty-block">当前没有可查看的生效配置</div>';
          editPolicyBtn.href = "./policy-editor.html";
          return;
        }
        const normalized = normalizePolicyContent(policy.content || {});
        const scope = normalizeScopeMeta(policy);
        editPolicyBtn.href = `./policy-editor.html?version=${encodeURIComponent(policy.version || "")}`;
        currentPolicy.innerHTML = `
          <div class="summary-grid">
            <div class="summary-card">
              <h3>对象信息</h3>
              <div class="summary-list">
                <div class="summary-line"><span>层级</span><strong>${scopeTypeLabel(scope.scopeType)}</strong></div>
                <div class="summary-line"><span>作用域标识</span><strong>${scope.scopeValue}</strong></div>
                <div class="summary-line"><span>作用域名称</span><strong>${scope.scopeLabel}</strong></div>
                <div class="summary-line"><span>区域编码</span><strong>${scope.regionCode}</strong></div>
              </div>
            </div>
            <div class="summary-card">
              <h3>当前策略</h3>
              <div class="summary-list">
                <div class="summary-line"><span>模板</span><strong>${templateLabel(normalized.template)}</strong></div>
                <div class="summary-line"><span>随瓶安检</span><strong>${normalized.inspection.delivery.enabled ? modeLabel(normalized.inspection.delivery.mode) : "关闭"}</strong></div>
                <div class="summary-line"><span>扫码</span><strong>${normalized.scan.enabled ? `${scanModeLabel(normalized.scan.mode)} / ${normalized.scan.required ? "强制" : "建议"}` : "关闭"}</strong></div>
                <div class="summary-line"><span>上报模式</span><strong>${reportModeLabel(normalized.reporting.mode)}</strong></div>
                <div class="summary-line"><span>离线补传</span><strong>${normalized.reporting.retryCount} 次 / ${normalized.reporting.syncBatchSize} 条</strong></div>
                <div class="summary-line"><span>发布时间</span><strong>${formatTime(policy.publishedAt)}</strong></div>
              </div>
            </div>
          </div>
        `;
      }

      function renderScopeList() {
        const typeFilter = String(scopeListFilter.value || "all");
        const keyword = String(scopeListSearch.value || "").trim().toLowerCase();
        const rows = buildScopeOverviewRows(allPolicyVersions).filter((item) => {
          const scope = normalizeScopeMeta(item);
          const passType = typeFilter === "all" ? true : scope.scopeType === typeFilter;
          const text = `${scope.scopeLabel} ${scope.scopeValue} ${scope.regionCode}`.toLowerCase();
          const passKeyword = !keyword || text.includes(keyword);
          return passType && passKeyword;
        });
        scopeCountTag.textContent = `${rows.length} 个作用域`;
        scopeList.innerHTML = rows.length
          ? rows
              .map((item) => {
                const scope = normalizeScopeMeta(item);
                const content = normalizePolicyContent(item.content || {});
                return `
                  <button class="scope-card ${item.version === selectedVersion ? "active" : ""}" type="button" data-scope-version="${item.version}">
                    <div class="scope-card-head">
                      <div>
                        <div class="scope-card-title">${scope.scopeLabel}</div>
                        <div class="scope-card-sub">${scopeTypeLabel(scope.scopeType)} · ${scope.scopeValue}<br/>区域 ${scope.regionCode}</div>
                      </div>
                      <span class="status-pill ${item.status}">${statusLabel(item.status)}</span>
                    </div>
                    <div class="scope-card-meta">
                      <div class="scope-meta-tile"><div class="scope-meta-label">当前版本</div><div class="scope-meta-value">${item.version}</div></div>
                      <div class="scope-meta-tile"><div class="scope-meta-label">模板</div><div class="scope-meta-value">${templateLabel(content.template)}</div></div>
                      <div class="scope-meta-tile"><div class="scope-meta-label">随瓶安检</div><div class="scope-meta-value">${content.inspection.delivery.enabled ? "开启" : "关闭"}</div></div>
                      <div class="scope-meta-tile"><div class="scope-meta-label">扫码</div><div class="scope-meta-value">${content.scan.enabled ? (content.scan.required ? "强制" : "建议") : "关闭"}</div></div>
                    </div>
                  </button>
                `;
              })
              .join("")
          : '<div class="empty-block">当前没有匹配到作用域配置</div>';
        scopeList.querySelectorAll("[data-scope-version]").forEach((node) => {
          node.addEventListener("click", () => {
            const version = node.getAttribute("data-scope-version");
            const target = allPolicyVersions.find((item) => item.version === version);
            if (!target) return;
            selectedVersion = target.version;
            renderCurrentPolicy(target);
            renderScopeList();
          });
        });
      }

      async function loadAll() {
        const [currentRes, versionsRes] = await Promise.all([fetchCurrentPolicy(), fetchPolicyVersions()]);
        if (versionsRes.success) {
          allPolicyVersions = versionsRes.data || [];
          if (!selectedVersion && allPolicyVersions[0]) selectedVersion = allPolicyVersions[0].version;
        }
        if (currentRes.success && currentRes.data) {
          if (!selectedVersion) selectedVersion = currentRes.data.version || "";
          const current = allPolicyVersions.find((item) => item.version === selectedVersion) || currentRes.data;
          renderCurrentPolicy(current);
        } else {
          renderCurrentPolicy(null);
        }
        renderScopeList();
      }

      scopeListFilter.addEventListener("change", renderScopeList);
      scopeListSearch.addEventListener("input", renderScopeList);

      mountPlatformChrome({
        active: "policy",
        breadcrumb: "策略列表",
        title: "平台策略列表",
        actions: [{ label: "返回平台入口", href: "./index.html", variant: "secondary" }],
      });

      loadAll();
    </script>
  </body>
</html>
