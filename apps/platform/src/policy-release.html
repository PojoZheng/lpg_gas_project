<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>策略规则列表</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
  </head>
  <body>
    <div class="platform-app">
      <div id="platformSidebar"></div>
      <div class="content-wrap">
        <div id="platformTopBar"></div>
        <main class="page-content">
          <div class="page-stack">
            <section class="hero-panel">
              <div class="hero-grid">
                <div>
                  <span class="hero-kicker">Policy Registry</span>
                  <h2 class="hero-title-lg">策略规则列表</h2>
                  <p class="hero-copy">
                    用更接近 `shadcn/ui` 后台的方式管理规则。列表只负责检索、筛选和进入详情，详情和编辑拆成单独页面，避免一页里塞下过多判断。
                  </p>
                  <div class="hero-actions">
                    <a class="btn primary" href="./policy-editor.html">新增规则</a>
                    <a class="btn ghost" href="./platform-monitor.html">查看合规监控</a>
                  </div>
                </div>
                <div class="inline-metrics" id="metricPanel">
                  <div class="inline-metric">
                    <div class="inline-metric-label">生效规则</div>
                    <div class="inline-metric-value">--</div>
                    <div class="inline-metric-note">当前配送员实际执行中的版本</div>
                  </div>
                  <div class="inline-metric">
                    <div class="inline-metric-label">草稿规则</div>
                    <div class="inline-metric-value">--</div>
                    <div class="inline-metric-note">等待复核和发布</div>
                  </div>
                  <div class="inline-metric">
                    <div class="inline-metric-label">覆盖范围</div>
                    <div class="inline-metric-value">--</div>
                    <div class="inline-metric-note">地区规则与公司规则合计</div>
                  </div>
                </div>
              </div>
            </section>

            <section class="section-card">
              <div class="section-head">
                <div>
                  <h3 class="section-title">规则检索</h3>
                  <p class="section-copy">先筛选范围和关键字，再进入详情页做确认或跳去编辑。</p>
                </div>
                <span class="badge brand" id="rowCountBadge">0 条</span>
              </div>

              <div class="toolbar">
                <input class="input" id="keywordInput" placeholder="搜索地区、燃气公司、区域编码、版本号" />
                <select id="typeFilter">
                  <option value="all">全部范围</option>
                  <option value="region">地区规则</option>
                  <option value="company">燃气公司规则</option>
                </select>
                <select id="statusFilter">
                  <option value="all">全部状态</option>
                  <option value="active">仅生效中</option>
                  <option value="draft">仅草稿</option>
                  <option value="history">仅历史</option>
                </select>
              </div>

              <div class="table-shell">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>适用范围</th>
                      <th>规则要求</th>
                      <th>版本</th>
                      <th>状态</th>
                      <th>发布时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="6">加载中...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="./runtime-config.js"></script>
    <script type="module">
      import { fetchCurrentPolicy, fetchPolicyVersions } from "./policy-release-client.js";
      import { mountPlatformChrome } from "./platform-shell.js";
      import {
        buildPolicyRows,
        formatTime,
        inspectionLabel,
        normalizePolicyContent,
        normalizeScopeMeta,
        reportTargetLabel,
        scanLabel,
        scopeTypeLabel,
        statusLabel,
      } from "./policy-view-model.js";

      const keywordInput = document.getElementById("keywordInput");
      const typeFilter = document.getElementById("typeFilter");
      const statusFilter = document.getElementById("statusFilter");
      const rowCountBadge = document.getElementById("rowCountBadge");
      const tableBody = document.getElementById("tableBody");
      const metricPanel = document.getElementById("metricPanel");

      let currentVersion = "";
      let allPolicyVersions = [];

      function renderMetrics(rows) {
        const activeCount = rows.filter((item) => item.status === "active").length;
        const draftCount = rows.filter((item) => item.status === "draft").length;
        const coverageCount = rows.length;
        metricPanel.innerHTML = `
          <div class="inline-metric">
            <div class="inline-metric-label">生效规则</div>
            <div class="inline-metric-value">${activeCount}</div>
            <div class="inline-metric-note">当前配送员实际执行中的版本</div>
          </div>
          <div class="inline-metric">
            <div class="inline-metric-label">草稿规则</div>
            <div class="inline-metric-value">${draftCount}</div>
            <div class="inline-metric-note">等待复核和发布</div>
          </div>
          <div class="inline-metric">
            <div class="inline-metric-label">覆盖范围</div>
            <div class="inline-metric-value">${coverageCount}</div>
            <div class="inline-metric-note">地区规则与公司规则合计</div>
          </div>
        `;
      }

      function filteredRows() {
        const keyword = String(keywordInput.value || "").trim().toLowerCase();
        const type = String(typeFilter.value || "all");
        const status = String(statusFilter.value || "all");
        return buildPolicyRows(allPolicyVersions).filter((item) => {
          const scope = normalizeScopeMeta(item);
          if (type !== "all" && scope.scopeType !== type) return false;
          if (status !== "all" && String(item.status || "") !== status) return false;
          const text = [
            scope.regionName,
            scope.regionCode,
            scope.companyName,
            item.version || "",
            statusLabel(item.status),
          ]
            .join(" ")
            .toLowerCase();
          return !keyword || text.includes(keyword);
        });
      }

      function renderTable() {
        const rows = filteredRows();
        rowCountBadge.textContent = `${rows.length} 条`;
        renderMetrics(rows);
        if (!rows.length) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="6">
                <div class="empty-state">
                  <div>
                    <div>当前没有匹配到策略规则</div>
                    <div class="muted-note">可以调整筛选条件，或者直接新增一条规则。</div>
                  </div>
                </div>
              </td>
            </tr>
          `;
          return;
        }
        tableBody.innerHTML = rows
          .map((item) => {
            const scope = normalizeScopeMeta(item);
            const content = normalizePolicyContent(item.content || {});
            const activeClass = item.status === "active" ? "active" : item.status === "draft" ? "draft" : "history";
            const currentMark =
              currentVersion && item.version === currentVersion
                ? '<div class="table-sub">当前生效版本</div>'
                : `<div class="table-sub">${scopeTypeLabel(scope.scopeType)} · ${scope.regionCode}</div>`;
            return `
              <tr>
                <td>
                  <div class="table-title">${scope.regionName}</div>
                  <div class="table-sub">${scope.companyName}</div>
                  ${currentMark}
                </td>
                <td>
                  <div class="table-title">${inspectionLabel(content)} / ${scanLabel(content)}</div>
                  <div class="table-sub">${reportTargetLabel(content)}</div>
                </td>
                <td>
                  <div class="table-title">${item.version || "未保存"}</div>
                  <div class="table-sub">规则版本号</div>
                </td>
                <td><span class="badge ${activeClass}">${statusLabel(item.status)}</span></td>
                <td>
                  <div class="table-title">${formatTime(item.publishedAt)}</div>
                  <div class="table-sub">${item.publishedAt ? "最近一次发布时间" : "尚未正式发布"}</div>
                </td>
                <td>
                  <div class="toolbar-cluster">
                    <a class="btn secondary" href="./policy-detail.html?version=${encodeURIComponent(item.version || "")}">查看详情</a>
                    <a class="btn ghost" href="./policy-editor.html?version=${encodeURIComponent(item.version || "")}">编辑</a>
                  </div>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      async function loadAll() {
        const [currentRes, versionsRes] = await Promise.all([fetchCurrentPolicy(), fetchPolicyVersions()]);
        currentVersion = currentRes.success ? String(currentRes.data?.version || "") : "";
        allPolicyVersions = versionsRes.success ? versionsRes.data || [] : [];
        renderTable();
      }

      [keywordInput, typeFilter, statusFilter].forEach((el) => {
        el.addEventListener(el.tagName === "INPUT" ? "input" : "change", renderTable);
      });

      mountPlatformChrome({
        active: "policy",
        breadcrumb: "策略规则",
        title: "平台策略规则",
        actions: [{ label: "新增规则", href: "./policy-editor.html", variant: "primary" }],
      });

      loadAll();
    </script>
  </body>
</html>
