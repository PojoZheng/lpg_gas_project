<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安检上报列表</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
  </head>
  <body>
    <div class="platform-app">
      <div id="platformSidebar"></div>
      <div class="content-wrap">
        <div id="platformTopBar"></div>
        <main class="page-content">
          <div class="page-stack">
            <section class="hero-panel">
              <div class="hero-grid">
                <div>
                  <span class="hero-kicker">Sync Queue</span>
                  <h2 class="hero-title-lg">安检上报列表</h2>
                  <p class="hero-copy">
                    统一查看安检同步记录，先从列表筛选出失败、待补传或需人工介入的条目，再进入详情页执行操作。
                  </p>
                  <div class="hero-actions">
                    <button class="btn primary" id="batchBtn">批量补传</button>
                    <button class="btn ghost" id="refreshBtn">刷新列表</button>
                  </div>
                </div>
                <div class="inline-metrics" id="metricPanel">
                  <div class="inline-metric">
                    <div class="inline-metric-label">失败记录</div>
                    <div class="inline-metric-value">--</div>
                    <div class="inline-metric-note">需要优先处理</div>
                  </div>
                  <div class="inline-metric">
                    <div class="inline-metric-label">待补传</div>
                    <div class="inline-metric-value">--</div>
                    <div class="inline-metric-note">等待下一次重试</div>
                  </div>
                  <div class="inline-metric">
                    <div class="inline-metric-label">人工处理</div>
                    <div class="inline-metric-value">--</div>
                    <div class="inline-metric-note">自动流程已无法继续</div>
                  </div>
                </div>
              </div>
            </section>

            <section class="section-card">
              <div class="section-head">
                <div>
                  <h3 class="section-title">同步记录检索</h3>
                  <p class="section-copy">按状态、处理方式和关键字筛选安检同步记录。</p>
                </div>
                <span class="badge brand" id="rowCountBadge">0 条</span>
              </div>

              <div class="toolbar">
                <input class="input" id="keywordFilter" placeholder="搜索客户、地址、订单号、配送员" />
                <select id="statusFilter">
                  <option value="all">全部状态</option>
                  <option value="pending">待上报</option>
                  <option value="failed">上报失败</option>
                  <option value="completed">已完成</option>
                </select>
                <select id="modeFilter">
                  <option value="all">全部处理方式</option>
                  <option value="retry">等待补传</option>
                  <option value="manual">人工处理</option>
                </select>
              </div>

              <p class="tip" id="pageTip"></p>

              <div class="table-shell">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>客户与订单</th>
                      <th>业务信息</th>
                      <th>处理状态</th>
                      <th>更新时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody">
                    <tr>
                      <td colspan="5">加载中...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script type="module">
      import { batchSubmitSync, fetchSyncQueue } from "./sync-queue-client.js";
      import { mountPlatformChrome } from "./platform-shell.js";

      const keywordFilter = document.getElementById("keywordFilter");
      const statusFilter = document.getElementById("statusFilter");
      const modeFilter = document.getElementById("modeFilter");
      const batchBtn = document.getElementById("batchBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const rowCountBadge = document.getElementById("rowCountBadge");
      const tableBody = document.getElementById("tableBody");
      const metricPanel = document.getElementById("metricPanel");
      const pageTip = document.getElementById("pageTip");

      let allItems = [];

      function setTip(text = "", isError = false) {
        pageTip.textContent = text;
        pageTip.className = isError ? "tip err" : "tip";
      }

      function formatDate(value) {
        if (!value) return "--";
        const date = new Date(Number(value));
        if (Number.isNaN(date.getTime())) return "--";
        return date.toLocaleString("zh-CN", { hour12: false });
      }

      function statusLabel(status) {
        return status === "pending" ? "待上报" : status === "failed" ? "上报失败" : "已完成";
      }

      function modeLabel(item) {
        if (item.manualRequired) return "人工处理";
        if (item.nextRetryAt) return "等待补传";
        return "自动补传";
      }

      function getSafetyOrderId(item) {
        return String(item.business?.orderId || item.payload?.orderId || item.payload?.submitPayload?.orderId || "--");
      }

      function filteredItems() {
        const keyword = String(keywordFilter.value || "").trim().toLowerCase();
        const status = String(statusFilter.value || "all");
        const mode = String(modeFilter.value || "all");
        return allItems.filter((item) => {
          if (String(item.entityType || "") !== "safety") return false;
          if (status !== "all" && String(item.syncStatus || "") !== status) return false;
          if (mode === "retry" && !item.nextRetryAt) return false;
          if (mode === "manual" && !item.manualRequired) return false;
          if (!keyword) return true;
          const business = item.business || {};
          const text = [
            business.customerName,
            business.address,
            business.regionName,
            business.companyName,
            business.driverName,
            business.orderId,
            item.lastError,
            item.resultSummary,
          ]
            .join(" ")
            .toLowerCase();
          return text.includes(keyword);
        });
      }

      function renderMetrics(items) {
        const failed = items.filter((item) => item.syncStatus === "failed").length;
        const waitingRetry = items.filter((item) => item.nextRetryAt).length;
        const manual = items.filter((item) => item.manualRequired).length;
        metricPanel.innerHTML = `
          <div class="inline-metric">
            <div class="inline-metric-label">失败记录</div>
            <div class="inline-metric-value">${failed}</div>
            <div class="inline-metric-note">需要优先处理</div>
          </div>
          <div class="inline-metric">
            <div class="inline-metric-label">待补传</div>
            <div class="inline-metric-value">${waitingRetry}</div>
            <div class="inline-metric-note">等待下一次重试</div>
          </div>
          <div class="inline-metric">
            <div class="inline-metric-label">人工处理</div>
            <div class="inline-metric-value">${manual}</div>
            <div class="inline-metric-note">自动流程已无法继续</div>
          </div>
        `;
      }

      function renderTable() {
        const items = filteredItems();
        rowCountBadge.textContent = `${items.length} 条`;
        renderMetrics(items);
        if (!items.length) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="5">
                <div class="empty-state">
                  <div>
                    <div>当前没有匹配到安检同步记录</div>
                    <div class="muted-note">可以调整筛选条件，或等待新异常进入队列。</div>
                  </div>
                </div>
              </td>
            </tr>
          `;
          return;
        }

        tableBody.innerHTML = items
          .map((item) => {
            const business = item.business || {};
            const statusClass = item.syncStatus === "failed" ? "draft" : item.syncStatus === "completed" ? "active" : "history";
            return `
              <tr>
                <td>
                  <div class="table-title">${business.customerName || "未识别客户"}</div>
                  <div class="table-sub">${business.address || "待补充地址"}</div>
                  <div class="table-sub">订单 ${getSafetyOrderId(item)} · 安检 ${item.business?.safetyId || item.payload?.safetyId || item.offlineId}</div>
                </td>
                <td>
                  <div class="table-title">${business.regionName || "--"} / ${business.companyName || "--"}</div>
                  <div class="table-sub">配送员 ${business.driverName || "--"} · ${business.reportTargetName || "未识别上报对象"}</div>
                </td>
                <td>
                  <div><span class="badge ${statusClass}">${statusLabel(item.syncStatus)}</span></div>
                  <div class="table-sub">${modeLabel(item)}</div>
                  <div class="table-sub">${item.lastError || item.resultSummary || "待处理"}</div>
                </td>
                <td>
                  <div class="table-title">${formatDate(item.updatedAt || item.createdAt)}</div>
                  <div class="table-sub">重试 ${Number(item.retryCount || 0)} 次</div>
                </td>
                <td>
                  <div class="toolbar-cluster">
                    <a class="btn secondary" href="./sync-detail.html?offlineId=${encodeURIComponent(item.offlineId || "")}">查看详情</a>
                  </div>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      async function loadPage() {
        const res = await fetchSyncQueue({ entityType: "safety" });
        if (!res.success) {
          setTip(res.error || "安检记录加载失败", true);
          return;
        }
        allItems = Array.isArray(res.data?.items) ? res.data.items : [];
        setTip(allItems.length ? "" : "当前没有需要处理的安检上报记录");
        renderTable();
      }

      batchBtn.addEventListener("click", async () => {
        const ids = filteredItems()
          .filter((item) => !item.manualRequired && item.syncStatus !== "completed")
          .map((item) => item.offlineId);
        if (!ids.length) {
          setTip("当前没有可补传的安检记录");
          return;
        }
        setTip("正在批量补传安检记录...");
        const res = await batchSubmitSync({ offlineIds: ids });
        if (!res.success) {
          setTip(res.error || "批量补传失败", true);
          return;
        }
        setTip(`批量补传完成：成功 ${res.data?.completed || 0} 条，失败 ${res.data?.failed || 0} 条`);
        await loadPage();
      });

      [keywordFilter, statusFilter, modeFilter].forEach((el) => {
        el.addEventListener(el.tagName === "INPUT" ? "input" : "change", renderTable);
      });
      refreshBtn.addEventListener("click", loadPage);

      mountPlatformChrome({
        active: "sync",
        breadcrumb: "安检上报",
        title: "安检上报",
        actions: [{ label: "返回策略规则", href: "./policy-release.html", variant: "secondary" }],
      });

      loadPage();
    </script>
  </body>
</html>
