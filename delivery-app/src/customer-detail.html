<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>客户详情</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page { min-height: 100vh; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
      
      /* 头部 */
      .detail-header {
        background: linear-gradient(135deg, var(--brand) 0%, #3a8a91 100%);
        color: #fff;
        padding: 20px 16px 30px;
        position: relative;
      }
      .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .back-btn, .edit-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        color: #fff;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .customer-profile {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .avatar {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(255,255,255,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        flex-shrink: 0;
      }
      .profile-info {
        flex: 1;
      }
      .profile-name {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .profile-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .profile-tag {
        padding: 2px 10px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        font-size: 12px;
      }
      
      /* 联系方式 */
      .contact-section {
        background: #fff;
        margin: -15px 16px 12px;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        position: relative;
        z-index: 1;
      }
      .contact-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .contact-item:last-child {
        border-bottom: none;
      }
      .contact-icon-wrap {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--brand-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--brand);
        flex-shrink: 0;
      }
      .contact-content {
        flex: 1;
      }
      .contact-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 2px;
      }
      .contact-value {
        font-size: 15px;
        color: var(--text-primary);
      }
      .contact-action {
        padding: 6px 14px;
        background: var(--brand);
        color: #fff;
        border: none;
        border-radius: 16px;
        font-size: 13px;
        cursor: pointer;
      }
      
      /* 账户概况 */
      .section-card {
        background: #fff;
        margin: 0 16px 12px;
        border-radius: 12px;
        padding: 16px;
        border: 1px solid var(--border);
      }
      .section-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }
      .account-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
      .account-item {
        text-align: center;
        padding: 12px;
        background: var(--bg);
        border-radius: 10px;
      }
      .account-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 6px;
      }
      .account-value {
        font-size: 20px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .account-value.warning {
        color: var(--error);
      }
      .account-value.success {
        color: var(--success);
      }
      
      /* 快捷操作 */
      .quick-actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        padding: 4px;
      }
      .quick-action {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 12px 4px;
        background: var(--bg);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 12px;
        color: var(--text-primary);
      }
      .quick-action-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--brand);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .quick-action.warning .quick-action-icon {
        background: var(--error);
      }
      
      /* 最近订单 */
      .order-list {
        display: grid;
        gap: 12px;
      }
      .order-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: var(--bg);
        border-radius: 10px;
      }
      .order-date {
        width: 50px;
        text-align: center;
        flex-shrink: 0;
      }
      .order-day {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .order-month {
        font-size: 11px;
        color: var(--text-secondary);
      }
      .order-info {
        flex: 1;
      }
      .order-spec {
        font-size: 14px;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .order-status {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .order-amount {
        text-align: right;
      }
      .order-price {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .view-all-orders {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 14px;
        color: var(--brand);
        font-size: 14px;
        cursor: pointer;
        border-top: 1px solid var(--border);
        margin-top: 12px;
      }
      
      /* 空状态 */
      .empty-state {
        text-align: center;
        padding: 30px 20px;
        color: var(--text-secondary);
      }
      .empty-state-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      
      /* 底部操作栏 */
      .bottom-action {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
        background: #fff;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 12px;
        z-index: 100;
      }
      .action-btn-large {
        flex: 1;
        height: 48px;
        background: var(--brand);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
      }
      .action-btn-large.secondary {
        background: var(--bg);
        color: var(--text-primary);
        border: 1px solid var(--border);
      }
      
      /* 加载状态 */
      .loading-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-secondary);
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* 错误状态 */
      .error-state {
        text-align: center;
        padding: 60px 20px;
      }
      .error-state-title {
        font-size: 16px;
        color: var(--text-primary);
        margin-bottom: 12px;
      }
      .retry-btn {
        padding: 10px 24px;
        background: var(--brand);
        color: #fff;
        border: none;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="app-page page" id="pageContainer">
      <!-- 加载状态 -->
      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <div>加载中...</div>
      </div>
      
      <!-- 错误状态 -->
      <div class="error-state" id="errorState" style="display: none;">
        <div class="error-state-title">加载失败，请重试</div>
        <button class="retry-btn" id="retryBtn">重新加载</button>
      </div>
      
      <!-- 内容区域 -->
      <div id="contentArea" style="display: none;">
        <!-- 头部信息 -->
        <div class="detail-header">
          <div class="header-actions">
            <button class="back-btn" id="backBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
              返回
            </button>
            <button class="edit-btn" id="editBtn">编辑</button>
          </div>
          <div class="customer-profile">
            <div class="avatar" id="customerAvatar">👤</div>
            <div class="profile-info">
              <div class="profile-name" id="customerName">--</div>
              <div class="profile-tags" id="customerTags"></div>
            </div>
          </div>
        </div>
        
        <!-- 联系方式 -->
        <div class="contact-section">
          <div class="contact-item">
            <div class="contact-icon-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
            <div class="contact-content">
              <div class="contact-label">联系电话</div>
              <div class="contact-value" id="customerPhone">--</div>
            </div>
            <button class="contact-action" id="callBtn">拨打</button>
          </div>
          <div class="contact-item">
            <div class="contact-icon-wrap">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div class="contact-content">
              <div class="contact-label">配送地址</div>
              <div class="contact-value" id="customerAddress">--</div>
            </div>
            <button class="contact-action" id="navigateBtn">导航</button>
          </div>
        </div>
        
        <!-- 账户概况 -->
        <div class="section-card">
          <div class="section-title">账户概况</div>
          <div class="account-grid">
            <div class="account-item">
              <div class="account-label">押金余额</div>
              <div class="account-value" id="depositAmount">¥0</div>
            </div>
            <div class="account-item">
              <div class="account-label">预存余额</div>
              <div class="account-value success" id="prepaidAmount">¥0</div>
            </div>
            <div class="account-item">
              <div class="account-label">当前欠款</div>
              <div class="account-value warning" id="owedAmount">¥0</div>
            </div>
            <div class="account-item">
              <div class="account-label">当前欠瓶</div>
              <div class="account-value warning" id="owedBottles">0</div>
            </div>
          </div>
        </div>
        
        <!-- 快捷操作 -->
        <div class="section-card">
          <div class="section-title">快捷操作</div>
          <div class="quick-actions">
            <button class="quick-action" id="quickOrderBtn">
              <div class="quick-action-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                  <line x1="3" y1="6" x2="21" y2="6"/>
                  <path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>
              </div>
              <span>快速开单</span>
            </button>
            <button class="quick-action" id="viewOrdersBtn">
              <div class="quick-action-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10 9 9 9 8 9"/>
                </svg>
              </div>
              <span>查看订单</span>
            </button>
            <button class="quick-action warning" id="remindBtn">
              <div class="quick-action-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/>
                </svg>
              </div>
              <span>催款/催瓶</span>
            </button>
            <button class="quick-action" id="recordPaymentBtn">
              <div class="quick-action-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <line x1="9" y1="9" x2="15" y2="9"/>
                  <line x1="9" y1="15" x2="15" y2="15"/>
                </svg>
              </div>
              <span>记收款</span>
            </button>
          </div>
        </div>
        
        <!-- 最近订单 -->
        <div class="section-card">
          <div class="section-title">最近订单</div>
          <div class="order-list" id="recentOrders"></div>
          <div class="view-all-orders" id="viewAllOrders">
            <span>查看全部订单</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>
      </div>
      
      <!-- 底部操作栏 -->
      <div class="bottom-action" id="bottomAction" style="display: none;">
        <button class="action-btn-large secondary" id="backToListBtn">返回列表</button>
        <button class="action-btn-large" id="createOrderBtn">给TA开单</button>
      </div>
    </main>
    
    <script src="./customer-detail-client.js"></script>
  </body>
</html>
