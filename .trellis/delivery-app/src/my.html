<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page { min-height: 100vh; padding: 16px 14px calc(96px + env(safe-area-inset-bottom, 0px)); }
      .entry-list { display: grid; gap: 10px; }
      .section-subtitle { margin: 0 0 10px; font-size: 13px; color: var(--text-secondary); }
      .entry-btn {
        width: 100%;
        min-height: 68px;
        height: auto;
        text-align: left;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .entry-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .entry-icon {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        background: var(--brand-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--brand);
      }
      .entry-icon .nav-icon { width: 18px; height: 18px; }
      .entry-text { min-width: 0; }
      .entry-title { font-size: 15px; font-weight: 600; font-family: var(--font-title); }
      .sub { margin-top: 2px; color: var(--text-secondary); font-size: 12px; }
      .entry-arrow { color: var(--text-secondary); }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="app-header">
        <h1 class="app-title">我的</h1>
        <div style="display:flex; gap:8px;">
          <button class="app-btn" id="homeBtn">返回首页</button>
          <button class="app-btn ghost" id="loginTopBtn">登录</button>
          <button class="app-btn ghost" id="logoutTopBtn">退出登录</button>
        </div>
      </header>

      <section class="app-card">
        <h2 class="app-card-title">高频入口</h2>
        <p class="section-subtitle">优先处理配送与开单相关流程</p>
        <div class="entry-list">
          <button class="app-btn entry-btn" id="deliveryBtn">
            <span class="entry-main">
              <span class="entry-icon"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h10" /></svg></span>
              <span class="entry-text">
                <div class="entry-title">待配送完单</div>
                <div class="sub">订单完结、安检上报与撤销处理</div>
              </span>
            </span>
            <span class="entry-arrow">›</span>
          </button>
        </div>
      </section>

      <section class="app-card">
        <h2 class="app-card-title">管理入口</h2>
        <p class="section-subtitle">低频能力统一收敛至该区域</p>
        <div class="entry-list">
          <button class="app-btn entry-btn" id="financeBtn">
            <span class="entry-main">
              <span class="entry-icon"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19h16M6 16V8h12v8M9 12h6" /></svg></span>
              <span class="entry-text">
                <div class="entry-title">财务记账与日结</div>
                <div class="sub">低频财务能力统一收敛在“我的”</div>
              </span>
            </span>
            <span class="entry-arrow">›</span>
          </button>
          <button class="app-btn entry-btn" id="syncBtn">
            <span class="entry-main">
              <span class="entry-icon"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 0 1 13.8-5.6M20 12a8 8 0 0 1-13.8 5.6M17 4v3h-3M7 20v-3h3" /></svg></span>
              <span class="entry-text">
                <div class="entry-title">同步队列</div>
                <div class="sub">离线冲突与人工处理入口</div>
              </span>
            </span>
            <span class="entry-arrow">›</span>
          </button>
          <button class="app-btn entry-btn" id="platformBtn">
            <span class="entry-main">
              <span class="entry-icon"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19h14M7 17V9M12 17V5M17 17v-6" /></svg></span>
              <span class="entry-text">
                <div class="entry-title">平台运营入口</div>
                <div class="sub">进入平台监控/策略/同步管理</div>
              </span>
            </span>
            <span class="entry-arrow">›</span>
          </button>
          <button class="app-btn entry-btn" id="loginBtn">
            <span class="entry-main">
              <span class="entry-icon"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5H5v14h6M15 8l4 4-4 4M19 12H9" /></svg></span>
              <span class="entry-text">
                <div class="entry-title">登录与账号管理</div>
                <div class="sub">切换账号、重新登录</div>
              </span>
            </span>
            <span class="entry-arrow">›</span>
          </button>
          <button class="app-btn entry-btn" id="logoutBtn">
            <span class="entry-main">
              <span class="entry-icon"><svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 5h6v14h-6M11 8l-4 4 4 4M7 12h10" /></svg></span>
              <span class="entry-text">
                <div class="entry-title">退出登录</div>
                <div class="sub">清理本地会话并返回登录页</div>
              </span>
            </span>
            <span class="entry-arrow">›</span>
          </button>
        </div>
        <div class="state-block info app-tip" id="tip">低频能力已统一收敛到“我的”页面。</div>
      </section>
    </main>

    <div class="bottom-nav-wrap">
      <nav class="bottom-nav" aria-label="底部导航">
        <button class="nav-btn" id="navWorkbenchBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5" /><path d="M6.5 10.5V20h11V10.5" /></svg>
          <span>首页</span>
        </button>
        <button class="nav-btn" id="navQuickOrderBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19h14M7 17V7h10v10M9.5 10h5M9.5 13h5" /></svg>
          <span>客户</span>
        </button>
        <button class="nav-btn active" id="navMyBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5" /><path d="M5 20c1.8-3.5 4.2-5 7-5s5.2 1.5 7 5" /></svg>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <script type="module">
      import { ensureAuthenticatedPage, logoutCurrentSession } from "./auth-client.js";

      if (!ensureAuthenticatedPage()) {
        throw new Error("未登录");
      }

      const tip = document.getElementById("tip");
      const doLogout = async () => {
        await logoutCurrentSession();
        window.location.href = "./login.html?from=您已安全退出";
      };

      document.getElementById("homeBtn").addEventListener("click", () => (window.location.href = "./workbench.html"));
      document.getElementById("loginTopBtn").addEventListener("click", () => (window.location.href = "./login.html"));
      document.getElementById("logoutTopBtn").addEventListener("click", doLogout);
      document.getElementById("deliveryBtn").addEventListener("click", () => (window.location.href = "./delivery-complete.html"));
      document.getElementById("financeBtn").addEventListener("click", () => (window.location.href = "./finance-daily-close.html"));
      document.getElementById("syncBtn").addEventListener("click", () => (window.location.href = "/platform/src/sync-queue.html"));
      document.getElementById("platformBtn").addEventListener("click", () => (window.location.href = "/platform/src/index.html"));
      document.getElementById("loginBtn").addEventListener("click", () => (window.location.href = "./login.html"));
      document.getElementById("logoutBtn").addEventListener("click", doLogout);
      document.getElementById("navWorkbenchBtn").addEventListener("click", () => (window.location.href = "./workbench.html"));
      document.getElementById("navQuickOrderBtn").addEventListener("click", () => (window.location.href = "./quick-order.html"));
      document.getElementById("navMyBtn").addEventListener("click", () => {
        tip.textContent = "当前已在“我的”页，可执行退出登录或进入管理入口。";
      });
    </script>
  </body>
</html>
