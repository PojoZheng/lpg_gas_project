<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>库存管理</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page {
        min-height: 100vh;
        padding: 16px 14px calc(96px + env(safe-area-inset-bottom, 0px));
      }

      /* 库存概览 */
      .inventory-overview {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .overview-title {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        margin: 0 0 12px;
        color: var(--text-primary);
      }
      .inventory-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .inventory-item:last-child {
        border-bottom: none;
      }
      .inventory-info {
        flex: 1;
      }
      .inventory-name {
        font-size: 15px;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .inventory-status {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
      }
      .status-safe {
        color: var(--success);
      }
      .status-warning {
        color: var(--warning);
      }
      .status-danger {
        color: var(--error);
      }
      .inventory-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .inventory-count {
        font-size: 18px;
        font-weight: 600;
        font-family: var(--font-title);
        color: var(--text-primary);
        min-width: 40px;
        text-align: center;
      }
      .control-btn {
        width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--brand);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .control-btn:active {
        background: var(--brand-soft);
      }

      /* 预警卡片 */
      .alert-card {
        background: #fff5f5;
        border: 1px solid #fecaca;
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .alert-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .alert-badge {
        width: 20px;
        height: 20px;
        background: var(--error);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 12px;
        font-weight: 600;
      }
      .alert-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--error);
      }
      .alert-text {
        font-size: 13px;
        color: #b91c1c;
        margin-bottom: 10px;
      }
      .alert-btn {
        height: 32px;
        padding: 0 14px;
        border: 1px solid var(--error);
        border-radius: 8px;
        background: #fff;
        color: var(--error);
        font-size: 13px;
        cursor: pointer;
      }

      /* 最近操作 */
      .log-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .section-title {
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-title);
        margin: 0 0 12px;
        color: var(--text-primary);
      }
      .log-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .log-item:last-child {
        border-bottom: none;
      }
      .log-info {
        flex: 1;
      }
      .log-type {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 2px;
      }
      .log-detail {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .log-time {
        font-size: 12px;
        color: var(--text-secondary);
      }

      /* 快捷操作 */
      .action-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-card);
        padding: 14px;
        margin-bottom: 12px;
      }
      .action-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .quick-action {
        height: 72px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        color: var(--text-primary);
        font-size: 13px;
        font-family: var(--font-body);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .quick-action:active {
        background: var(--brand-soft);
      }
      .action-icon {
        width: 24px;
        height: 24px;
        stroke: var(--brand);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="app-header">
        <button class="app-btn ghost" id="backBtn" style="padding: 0 10px; width: auto; min-width: 64px;">返回</button>
        <h1 class="app-title">库存管理</h1>
        <div style="width: 64px;"></div>
      </header>

      <!-- 库存概览 -->
      <div class="inventory-overview">
        <h2 class="overview-title">库存概览</h2>
        <div id="inventoryList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 过期预警 -->
      <div class="alert-card" id="alertCard" style="display: none;">
        <div class="alert-header">
          <span class="alert-badge">!</span>
          <span class="alert-title">过期预警</span>
        </div>
        <div class="alert-text" id="alertText">3个气瓶7天后过期，需送检</div>
        <button class="alert-btn" id="alertBtn">查看详情</button>
      </div>

      <!-- 最近操作 -->
      <div class="log-section">
        <h2 class="section-title">最近操作</h2>
        <div id="logList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 快捷操作 -->
      <div class="action-section">
        <h2 class="section-title">快捷操作</h2>
        <div class="action-grid">
          <button class="quick-action" id="purchaseBtn">
            <svg class="action-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            <span>采购入库</span>
          </button>
          <button class="quick-action" id="refillBtn">
            <svg class="action-icon" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>
            <span>气瓶充装</span>
          </button>
          <button class="quick-action" id="checkBtn">
            <svg class="action-icon" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/></svg>
            <span>库存盘点</span>
          </button>
        </div>
      </div>
    </main>

    <!-- 底部导航 -->
    <div class="bottom-nav-wrap">
      <nav class="bottom-nav" aria-label="底部导航">
        <button class="nav-btn" id="navWorkbenchBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5" /><path d="M6.5 10.5V20h11V10.5" /></svg>
          <span>首页</span>
        </button>
        <button class="nav-btn" id="navCustomerBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>客户</span>
        </button>
        <button class="nav-btn" id="navMyBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5" /><path d="M5 20c1.8-3.5 4.2-5 7-5s5.2 1.5 7 5" /></svg>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <script type="module">
      import { ensureAuthenticatedPage } from "./auth-client.js";

      if (!ensureAuthenticatedPage()) {
        throw new Error("未登录");
      }

      // 模拟库存数据
      const inventoryData = [
        { spec: "15kg", type: "重瓶", count: 12, safeStock: 5 },
        { spec: "15kg", type: "空瓶", count: 8, safeStock: 3 },
        { spec: "10kg", type: "重瓶", count: 2, safeStock: 3 },
        { spec: "10kg", type: "空瓶", count: 3, safeStock: 2 },
        { spec: "50kg", type: "重瓶", count: 2, safeStock: 2 },
        { spec: "50kg", type: "空瓶", count: 1, safeStock: 1 }
      ];

      // 模拟操作日志
      const operationLogs = [
        { type: "采购入库", detail: "15kg×10", time: "今天 09:30" },
        { type: "充装入库", detail: "15kg×5", time: "今天 10:00" },
        { type: "配送出库", detail: "15kg×1 李大妈", time: "今天 10:15" },
        { type: "回收入库", detail: "15kg×1 李大妈", time: "今天 10:30" }
      ];

      // 渲染库存列表
      function renderInventory() {
        const listEl = document.getElementById("inventoryList");
        listEl.innerHTML = inventoryData.map((item, index) => {
          const statusClass = item.count < item.safeStock ? "status-warning" : "status-safe";
          const statusText = item.count < item.safeStock ? "不足" : "正常";
          return `
            <div class="inventory-item">
              <div class="inventory-info">
                <div class="inventory-name">${item.spec}${item.type}</div>
                <div class="inventory-status ${statusClass}">${statusText}</div>
              </div>
              <div class="inventory-controls">
                <button class="control-btn" data-index="${index}" data-action="minus">-</button>
                <span class="inventory-count">${item.count}</span>
                <button class="control-btn" data-index="${index}" data-action="plus">+</button>
              </div>
            </div>
          `;
        }).join("");

        // 绑定加减按钮
        document.querySelectorAll(".control-btn").forEach(btn => {
          btn.addEventListener("click", (e) => {
            const index = parseInt(e.target.dataset.index);
            const action = e.target.dataset.action;
            if (action === "plus") {
              inventoryData[index].count++;
            } else if (action === "minus" && inventoryData[index].count > 0) {
              inventoryData[index].count--;
            }
            renderInventory();
          });
        });
      }

      // 渲染操作日志
      function renderLogs() {
        const logEl = document.getElementById("logList");
        logEl.innerHTML = operationLogs.map(log => `
          <div class="log-item">
            <div class="log-info">
              <div class="log-type">${log.type}</div>
              <div class="log-detail">${log.detail}</div>
            </div>
            <span class="log-time">${log.time}</span>
          </div>
        `).join("");
      }

      // 显示过期预警
      function showAlert() {
        document.getElementById("alertCard").style.display = "block";
      }

      // 事件绑定
      document.getElementById("backBtn").addEventListener("click", () => {
        window.location.href = "./my.html";
      });

      document.getElementById("alertBtn").addEventListener("click", () => {
        alert("过期气瓶详情功能开发中...");
      });

      document.getElementById("purchaseBtn").addEventListener("click", () => {
        alert("采购入库功能开发中...");
      });

      document.getElementById("refillBtn").addEventListener("click", () => {
        alert("气瓶充装功能开发中...");
      });

      document.getElementById("checkBtn").addEventListener("click", () => {
        alert("库存盘点功能开发中...");
      });

      // 底部导航
      document.getElementById("navWorkbenchBtn").addEventListener("click", () => {
        window.location.href = "./workbench.html";
      });
      document.getElementById("navCustomerBtn").addEventListener("click", () => {
        window.location.href = "./quick-order.html";
      });
      document.getElementById("navMyBtn").addEventListener("click", () => {
        window.location.href = "./my.html";
      });

      // 初始化
      renderInventory();
      renderLogs();
      showAlert();
    </script>
  </body>
</html>
