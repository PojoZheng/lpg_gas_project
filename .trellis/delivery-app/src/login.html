<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录</title>
    <style>
      :root {
        --brand: #4799a0;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f8fa;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        color: #111111;
      }
      .card {
        width: 340px;
        border-radius: 24px;
        background: #ffffff;
        border: 1px solid #eceff3;
        padding: 28px 20px 22px;
      }
      .logo-wrap {
        text-align: center;
        margin-bottom: 16px;
      }
      .logo {
        width: 220px;
        max-width: 100%;
      }
      .title {
        text-align: center;
        margin: 8px 0 20px;
      }
      .field {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 14px;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        height: 44px;
        border-radius: 14px;
        border: 1px solid #eceff3;
        padding: 0 12px;
        font-size: 16px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 108px;
        gap: 8px;
      }
      button {
        border: none;
        border-radius: 14px;
        height: 44px;
        cursor: pointer;
      }
      .btn-ghost {
        background: #e7f3f4;
        color: #1f6f76;
      }
      .btn-primary {
        width: 100%;
        margin-top: 8px;
        background: var(--brand);
        color: white;
        font-size: 16px;
      }
      .tip {
        margin-top: 10px;
        color: #8b9098;
        font-size: 13px;
        min-height: 20px;
      }
      .ok {
        color: #166534;
      }
      .err {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo-wrap">
        <img class="logo" src="../../assets/logo-polygon.png" alt="POLYGON 品牌 Logo" />
      </div>
      <h2 class="title">手机号验证码登录</h2>

      <div class="field">
        <label for="phone">手机号</label>
        <input id="phone" placeholder="请输入 11 位手机号" />
      </div>

      <div class="field">
        <label for="code">验证码</label>
        <div class="row">
          <input id="code" placeholder="请输入 6 位验证码" />
          <button class="btn-ghost" id="sendCodeBtn">获取验证码</button>
        </div>
      </div>

      <button class="btn-primary" id="loginBtn">登录</button>
      <p id="tip" class="tip"></p>
    </main>

    <script type="module">
      import { sendCode, loginByCode, listDevices } from "./auth-client.js";

      const phone = document.getElementById("phone");
      const code = document.getElementById("code");
      const sendCodeBtn = document.getElementById("sendCodeBtn");
      const loginBtn = document.getElementById("loginBtn");
      const tip = document.getElementById("tip");

      const setTip = (text, type = "") => {
        tip.className = `tip ${type}`;
        tip.textContent = text;
      };

      sendCodeBtn.addEventListener("click", async () => {
        if (!/^1\d{10}$/.test(phone.value || "")) {
          return setTip("请输入正确的手机号", "err");
        }
        setTip("正在发送验证码...");
        const res = await sendCode(phone.value);
        if (!res.success) return setTip(res.error || "发送失败，请重试", "err");
        setTip(`验证码已发送（开发环境码：${res.data.dev_code}）`, "ok");
      });

      loginBtn.addEventListener("click", async () => {
        if (!/^1\d{10}$/.test(phone.value || "")) {
          return setTip("请输入正确的手机号", "err");
        }
        if (!/^\d{6}$/.test(code.value || "")) {
          return setTip("请输入 6 位验证码", "err");
        }
        setTip("正在登录...");
        const res = await loginByCode(phone.value, code.value);
        if (!res.success) return setTip(res.error || "登录失败，请稍后重试", "err");

        const devices = await listDevices();
        const deviceCount = devices.success ? devices.data.length : 0;
        setTip(`登录成功，当前设备会话数：${deviceCount}`, "ok");
        setTimeout(() => {
          window.location.href = "./workbench.html";
        }, 500);
      });
    </script>
  </body>
  </html>
