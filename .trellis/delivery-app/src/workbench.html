<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工作台</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page { padding: 16px 14px calc(96px + env(safe-area-inset-bottom, 0px)); }
      .header-main { min-width: 0; }
      .subtitle { margin: 4px 0 0; color: var(--text-secondary); font-size: 13px; }
      .login-btn { min-height: 40px; height: 40px; white-space: nowrap; }
      .line { margin: 6px 0; color: var(--text-secondary); }
      .line strong { color: var(--text-primary); }
      .todo-strong { font-size: 14px; color: var(--text-primary); font-weight: 600; }
    </style>
  </head>
  <body>
    <main class="app-page page" id="page">
      <header class="app-header">
        <div class="header-main">
          <h1 class="app-title">工作台</h1>
          <p class="subtitle">今日概览与主操作</p>
        </div>
        <button class="app-btn soft login-btn" id="loginBtn">登录 / 切换账号</button>
      </header>

      <section class="app-card hero-card">
        <h2 class="hero-title">今天能赚多少钱</h2>
        <div class="hero-main" id="totalToday">￥0.00</div>
        <div class="hero-split">
          <div class="hero-item">
            <div class="hero-label">已收</div>
            <div class="hero-value" id="receivedToday">￥0.00</div>
          </div>
          <div class="hero-item">
            <div class="hero-label">待收</div>
            <div class="hero-value" id="pendingToday">￥0.00</div>
          </div>
        </div>
      </section>

      <section class="app-card">
        <h2 class="app-card-title">主操作</h2>
        <div class="action-grid">
          <button class="action-tile primary" id="quickOrderBtn">
            <span class="action-icon-box">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
            </span>
            <span class="action-title">快速开单</span>
          </button>
          <button class="action-tile" id="deliveryCompleteBtn">
            <span class="action-icon-box">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h10" /></svg>
            </span>
            <span class="action-title">待配送</span>
          </button>
        </div>
      </section>

      <section class="app-card">
        <h2 class="app-card-title">待办事项</h2>
        <p class="line">客户：<strong id="nextCustomer">--</strong></p>
        <p class="line">地址：<strong id="nextAddress">--</strong></p>
        <p class="line">时间：<strong id="nextSchedule">--</strong></p>
        <p class="line">订单号：<strong id="nextOrderId">--</strong></p>
        <p class="line todo-strong">低频能力请前往“我的”统一处理。</p>
      </section>

      <p class="app-tip" id="tip"></p>
    </main>

    <div class="bottom-nav-wrap">
      <nav class="bottom-nav" aria-label="底部导航">
        <button class="nav-btn active" id="navWorkbenchBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5" /><path d="M6.5 10.5V20h11V10.5" /></svg>
          <span>首页</span>
        </button>
        <button class="nav-btn" id="navQuickOrderBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19h14M7 17V7h10v10M9.5 10h5M9.5 13h5" /></svg>
          <span>客户</span>
        </button>
        <button class="nav-btn" id="navMyBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5" /><path d="M5 20c1.8-3.5 4.2-5 7-5s5.2 1.5 7 5" /></svg>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <script type="module">
      import { fetchWorkbenchOverview } from "./workbench-client.js";

      const receivedToday = document.getElementById("receivedToday");
      const pendingToday = document.getElementById("pendingToday");
      const totalToday = document.getElementById("totalToday");
      const nextCustomer = document.getElementById("nextCustomer");
      const nextAddress = document.getElementById("nextAddress");
      const nextSchedule = document.getElementById("nextSchedule");
      const nextOrderId = document.getElementById("nextOrderId");
      const quickOrderBtn = document.getElementById("quickOrderBtn");
      const deliveryCompleteBtn = document.getElementById("deliveryCompleteBtn");
      const loginBtn = document.getElementById("loginBtn");
      const tip = document.getElementById("tip");
      const navWorkbenchBtn = document.getElementById("navWorkbenchBtn");
      const navQuickOrderBtn = document.getElementById("navQuickOrderBtn");
      const navMyBtn = document.getElementById("navMyBtn");

      const fmtCurrency = (num) => `￥${Number(num || 0).toFixed(2)}`;

      async function loadData(fromPull = false) {
        tip.textContent = fromPull ? "正在刷新工作台数据..." : "正在加载工作台数据...";
        const res = await fetchWorkbenchOverview();
        if (!res.success) {
          tip.textContent = res.error || "加载失败，请稍后重试";
          return;
        }
        const { finance, nextDelivery } = res.data;
        const received = Number(finance.receivedToday || 0);
        const pending = Number(finance.pendingToday || 0);
        totalToday.textContent = fmtCurrency(received + pending);
        receivedToday.textContent = fmtCurrency(received);
        pendingToday.textContent = fmtCurrency(pending);
        nextCustomer.textContent = nextDelivery.customerName;
        nextAddress.textContent = nextDelivery.address;
        nextSchedule.textContent = nextDelivery.scheduleAt;
        nextOrderId.textContent = nextDelivery.orderId;

        if (!navigator.onLine) {
          tip.textContent = "当前网络不可用，已展示缓存信息";
          return;
        }
        if (res.fromMock) {
          tip.textContent = "当前使用模拟数据，后端接口预留中";
          return;
        }
        tip.textContent = "数据已更新";
      }

      quickOrderBtn.addEventListener("click", () => {
        window.location.href = "./quick-order.html";
      });
      deliveryCompleteBtn.addEventListener("click", () => {
        window.location.href = "./delivery-complete.html";
      });
      loginBtn.addEventListener("click", () => {
        window.location.href = "./login.html";
      });
      navWorkbenchBtn.addEventListener("click", () => {
        window.location.href = "./workbench.html";
      });
      navQuickOrderBtn.addEventListener("click", () => {
        window.location.href = "./quick-order.html";
      });
      navMyBtn.addEventListener("click", () => {
        window.location.href = "./my.html";
      });

      window.addEventListener("offline", () => {
        tip.textContent = "当前网络不可用，已切换离线提示";
      });
      window.addEventListener("online", () => {
        tip.textContent = "网络已恢复，可下拉刷新";
      });

      let startY = 0;
      let canPull = false;
      window.addEventListener("touchstart", (e) => {
        canPull = window.scrollY <= 0;
        startY = e.touches[0]?.clientY || 0;
      });
      window.addEventListener("touchmove", (e) => {
        if (!canPull) return;
        const delta = (e.touches[0]?.clientY || 0) - startY;
        if (delta > 60) tip.textContent = "松开即可刷新";
      });
      window.addEventListener("touchend", async (e) => {
        if (!canPull) return;
        const endY = e.changedTouches[0]?.clientY || 0;
        if (endY - startY > 60) {
          tip.textContent = "正在刷新...";
          await loadData(true);
        }
      });

      loadData();
      window.setInterval(() => {
        if (!document.hidden) loadData(true);
      }, 30000);
    </script>
  </body>
</html>
