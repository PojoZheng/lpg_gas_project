<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待配送完单</title>
    <style>
      :root {
        --brand: #4799a0;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --border: #eceff3;
        --text-primary: #111111;
        --text-secondary: #8b9098;
        --error: #ef4444;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
      .page {
        max-width: 460px;
        margin: 0 auto;
        padding: 16px 14px calc(206px + env(safe-area-inset-bottom, 0px));
      }
      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .title { margin: 0; font-size: 22px; font-weight: 700; }
      .btn { border: 1px solid var(--border); border-radius: 12px; background: #fff; height: 44px; min-height: 44px; padding: 0 12px; cursor: pointer; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 14px; margin-bottom: 12px; }
      .card-title { margin: 0 0 10px; font-size: 16px; font-weight: 600; }
      .order-btn { width: 100%; text-align: left; border: 1px solid var(--border); background: #fff; border-radius: 12px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
      .order-btn.active { border-color: var(--brand); background: #f0f9fa; }
      .line2 { margin-top: 4px; color: var(--text-secondary); font-size: 13px; }
      .row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
      .row label { width: 74px; color: var(--text-secondary); font-size: 14px; }
      .row input, .row select { flex: 1; height: 44px; min-height: 44px; border: 1px solid var(--border); border-radius: 10px; padding: 0 10px; min-width: 0; }
      .pay-methods { display: flex; gap: 8px; margin-bottom: 10px; }
      .pay-btn { flex: 1; height: 44px; min-height: 44px; border: 1px solid var(--border); border-radius: 12px; background: #fff; cursor: pointer; }
      .pay-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .primary { background: var(--brand); color: #fff; border-color: var(--brand); }
      .warn { color: #b45309; border-color: #f5d9a5; background: #fff7ed; }
      .tip { min-height: 20px; margin-top: 8px; font-size: 13px; color: var(--text-secondary); }
      .err { color: var(--error); }
      .inventory-list { display: grid; gap: 8px; }
      .inventory-item {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        font-size: 13px;
        color: var(--text-secondary);
      }
      .inventory-item strong { color: var(--text-primary); }
      .summary { border: 1px solid var(--border); border-radius: 12px; padding: 10px; font-size: 14px; line-height: 1.6; background: #fbfcfe; }
      .muted { color: var(--text-secondary); font-size: 13px; }
      .safety-status {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        margin-bottom: 10px;
        background: #fff7ed;
        color: #b45309;
      }
      .check-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
      .check-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px;
        font-size: 13px;
        color: var(--text-secondary);
        background: #fff;
        min-height: 48px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .photo-tip { margin: 0 0 10px; color: var(--text-secondary); font-size: 12px; }
      .safety-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .dock-wrap {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        background: linear-gradient(to top, rgba(247, 248, 250, 0.98), rgba(247, 248, 250, 0.9));
        border-top: 1px solid var(--border);
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom, 0px));
      }
      .dock {
        max-width: 460px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .dock .btn {
        height: 48px;
        min-height: 48px;
      }
      .dock .btn.full {
        grid-column: 1 / -1;
      }
      .status-line {
        max-width: 460px;
        margin: 0 auto 8px;
        font-size: 12px;
        color: var(--text-secondary);
        padding: 0 2px;
      }
      .bottom-nav {
        max-width: 460px;
        margin: 8px auto 0;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .nav-btn {
        height: 48px;
        min-height: 48px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        color: #1f6f76;
        font-size: 14px;
        cursor: pointer;
      }
      .nav-btn.active {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
      }
      @media (max-width: 420px) {
        .title { font-size: 20px; }
        .row {
          display: block;
        }
        .row label {
          display: block;
          width: auto;
          margin-bottom: 6px;
        }
        .check-list,
        .actions,
        .safety-actions,
        .dock {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 class="title">待配送完单</h1>
        <button class="btn" id="backBtn">返回工作台</button>
      </header>

      <section class="card">
        <h2 class="card-title">待配送订单</h2>
        <div id="orderList"></div>
      </section>

      <section class="card">
        <h2 class="card-title">库存快照</h2>
        <div class="inventory-list" id="inventoryList"></div>
      </section>

      <section class="card">
        <h2 class="card-title">完单与修改</h2>
        <div class="row"><label>应收金额</label><input id="amountInput" disabled /></div>
        <div class="row"><label>实收金额</label><input id="receivedInput" type="number" min="0" step="0.01" /></div>
        <div class="pay-methods">
          <button class="pay-btn active" data-method="wechat">微信收款</button>
          <button class="pay-btn" data-method="cash">现金收款</button>
          <button class="pay-btn" data-method="credit">记账</button>
        </div>
        <div class="row"><label>回收空瓶</label><input id="recycleInput" type="number" min="0" step="1" value="0" /></div>
        <div class="row"><label>欠瓶数量</label><input id="owedInput" type="number" min="0" step="1" value="0" /></div>
        <div class="row"><label>配送时间</label><input id="scheduleInput" placeholder="如：今天 18:30" /></div>
        <div class="row"><label>配送地址</label><input id="addressInput" placeholder="请输入配送地址" /></div>
        <div class="actions">
          <button class="btn primary" id="completeBtn">确认完单</button>
          <button class="btn" id="updateBtn">保存修改</button>
          <button class="btn warn" id="cancelBtn">取消订单</button>
          <button class="btn" id="undoBtn">5 秒撤销</button>
        </div>
        <p class="tip" id="tip"></p>
      </section>

      <section class="card">
        <h2 class="card-title">客户详情与账户摘要</h2>
        <div class="summary" id="accountSummary">请选择订单后查看客户账户摘要。</div>
        <div class="row">
          <label>催收状态</label>
          <select id="collectionStatus">
            <option value="none">未开始</option>
            <option value="pending">待催收</option>
            <option value="contacted">已联系</option>
            <option value="promised">承诺付款</option>
            <option value="resolved">已结清</option>
          </select>
        </div>
        <div class="row"><label>备注</label><input id="collectionNote" placeholder="请输入催收备注（可选）" /></div>
        <div class="actions">
          <button class="btn primary" id="saveCollectionBtn">保存催收状态</button>
          <button class="btn" id="refreshAccountBtn">刷新账户摘要</button>
        </div>
        <p class="tip muted" id="accountTip"></p>
      </section>

      <section class="card" id="safetyCard">
        <h2 class="card-title">完单安检与上报</h2>
        <span class="safety-status" id="safetyStatus">待触发</span>
        <div class="check-list">
          <label class="check-item"><input type="checkbox" value="阀门密封检查" class="safety-check" /> 阀门密封检查</label>
          <label class="check-item"><input type="checkbox" value="减压阀连接检查" class="safety-check" /> 减压阀连接检查</label>
          <label class="check-item"><input type="checkbox" value="软管老化检查" class="safety-check" /> 软管老化检查</label>
          <label class="check-item"><input type="checkbox" value="通风环境检查" class="safety-check" /> 通风环境检查</label>
        </div>
        <div class="row"><label>安检照片</label><input id="photoInput" placeholder="输入照片编号，逗号分隔" /></div>
        <p class="photo-tip">示例：img-001,img-002。当前原型以照片编号代替上传。</p>
        <div class="row"><label>异常安检</label><input id="abnormalInput" placeholder="输入 是 或 否" value="否" /></div>
        <div class="row"><label>隐患说明</label><input id="hazardInput" placeholder="异常时必须填写隐患说明" /></div>
        <p class="tip" id="safetyTip"></p>
      </section>
    </main>
    <div class="dock-wrap">
      <div class="status-line" id="dockStatus">底部操作区：安检提交与失败重试</div>
      <div class="dock">
        <button class="btn primary full" id="submitSafetyBtn">提交安检并上报</button>
        <button class="btn" id="retrySafetyBtn">失败重试</button>
        <button class="btn" id="backWorkbenchBtn">返回工作台</button>
      </div>
      <nav class="bottom-nav" aria-label="底部导航">
        <button class="nav-btn" id="navWorkbenchBtn">工作台</button>
        <button class="nav-btn" id="navQuickOrderBtn">快速开单</button>
        <button class="nav-btn active" id="navDeliveryBtn">待配送完单</button>
      </nav>
    </div>

    <script type="module">
      import {
        fetchPendingDeliveryOrders,
        completeOrder,
        cancelOrder,
        updateOrder,
        undoOrderAction,
        fetchInventorySnapshot,
        fetchCustomerDetail,
        updateCollectionStatus,
        fetchSafetyByOrder,
        submitSafetyByOrder,
        retrySafetyReport,
      } from "./delivery-complete-client.js";

      const orderList = document.getElementById("orderList");
      const backBtn = document.getElementById("backBtn");
      const amountInput = document.getElementById("amountInput");
      const receivedInput = document.getElementById("receivedInput");
      const recycleInput = document.getElementById("recycleInput");
      const owedInput = document.getElementById("owedInput");
      const scheduleInput = document.getElementById("scheduleInput");
      const addressInput = document.getElementById("addressInput");
      const completeBtn = document.getElementById("completeBtn");
      const updateBtn = document.getElementById("updateBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const undoBtn = document.getElementById("undoBtn");
      const tip = document.getElementById("tip");
      const inventoryList = document.getElementById("inventoryList");
      const accountSummary = document.getElementById("accountSummary");
      const collectionStatus = document.getElementById("collectionStatus");
      const collectionNote = document.getElementById("collectionNote");
      const saveCollectionBtn = document.getElementById("saveCollectionBtn");
      const refreshAccountBtn = document.getElementById("refreshAccountBtn");
      const accountTip = document.getElementById("accountTip");
      const safetyStatus = document.getElementById("safetyStatus");
      const safetyTip = document.getElementById("safetyTip");
      const photoInput = document.getElementById("photoInput");
      const abnormalInput = document.getElementById("abnormalInput");
      const hazardInput = document.getElementById("hazardInput");
      const submitSafetyBtn = document.getElementById("submitSafetyBtn");
      const retrySafetyBtn = document.getElementById("retrySafetyBtn");
      const backWorkbenchBtn = document.getElementById("backWorkbenchBtn");
      const dockStatus = document.getElementById("dockStatus");
      const navWorkbenchBtn = document.getElementById("navWorkbenchBtn");
      const navQuickOrderBtn = document.getElementById("navQuickOrderBtn");
      const navDeliveryBtn = document.getElementById("navDeliveryBtn");
      const safetyChecks = [...document.querySelectorAll(".safety-check")];
      const payBtns = [...document.querySelectorAll(".pay-btn")];

      let selectedOrder = null;
      let paymentMethod = "wechat";
      let currentSafety = null;

      function setTip(text, isError = false) {
        tip.textContent = text;
        tip.className = isError ? "tip err" : "tip";
      }
      function setAccountTip(text, isError = false) {
        accountTip.textContent = text;
        accountTip.className = isError ? "tip err" : "tip muted";
      }

      function syncPayBtn() {
        payBtns.forEach((btn) => btn.classList.toggle("active", btn.dataset.method === paymentMethod));
      }

      function setSafetyTip(text, isError = false) {
        safetyTip.textContent = text;
        safetyTip.className = isError ? "tip err" : "tip";
        dockStatus.textContent = text || "底部操作区：安检提交与失败重试";
      }

      function setSafetyStatus(status) {
        const map = {
          pending: "待上报",
          completed: "已上报",
          failed: "上报失败",
          idle: "待触发",
        };
        safetyStatus.textContent = map[status] || map.idle;
      }

      function syncForm(order) {
        amountInput.value = Number(order.amount || 0).toFixed(2);
        receivedInput.value = Number(order.amount || 0).toFixed(2);
        recycleInput.value = "0";
        owedInput.value = "0";
        scheduleInput.value = order.scheduleAt || "";
        addressInput.value = order.address || "";
      }
      async function loadCustomerAccountByOrder(order) {
        if (!order || !order.customerId) {
          accountSummary.textContent = "当前订单未关联客户，无法加载账户摘要。";
          return;
        }
        setAccountTip("正在加载客户账户摘要...");
        const res = await fetchCustomerDetail(order.customerId);
        if (!res.success) {
          setAccountTip(res.error || "账户摘要加载失败，请稍后重试。", true);
          return;
        }
        const account = res.data.account || {};
        collectionStatus.value = account.collectionStatus || "none";
        collectionNote.value = account.collectionNote || "";
        accountSummary.innerHTML = `
          <div>客户名称：${res.data.name}</div>
          <div>手机号：${res.data.phone}</div>
          <div>账户欠款：${Number(account.owedAmount || 0).toFixed(2)} 元</div>
          <div>账户欠瓶：${Number(account.owedEmptyCount || 0)} 瓶</div>
          <div>催收状态：${collectionStatus.options[collectionStatus.selectedIndex].text}</div>
          <div>历史完单：${Number(account.completedOrders || 0)} 单</div>
        `;
        setAccountTip("客户账户摘要已更新。");
      }

      function renderOrders(list) {
        orderList.innerHTML = "";
        list.forEach((item) => {
          const btn = document.createElement("button");
          btn.className = "order-btn";
          btn.type = "button";
          btn.innerHTML = `<div>${item.customerName}（${item.spec} x ${item.quantity}）</div><div class="line2">${item.address}｜${item.scheduleAt}｜订单号 ${item.orderId}</div>`;
          btn.addEventListener("click", () => {
            selectedOrder = item;
            syncForm(item);
            loadCustomerAccountByOrder(item);
            loadSafety();
            [...orderList.children].forEach((x) => x.classList.remove("active"));
            btn.classList.add("active");
            setTip("已选择订单，可完单、取消或修改");
          });
          orderList.appendChild(btn);
        });
        if (!list.length) {
          setTip("当前无待配送订单，可先去快速开单创建", false);
          return;
        }
        selectedOrder = list[0];
        syncForm(list[0]);
        loadCustomerAccountByOrder(list[0]);
        orderList.firstChild.classList.add("active");
        loadSafety();
      }

      async function loadOrders() {
        setTip("正在加载待配送订单...");
        const res = await fetchPendingDeliveryOrders();
        if (!res.success) return setTip(res.error || "加载失败，请点击重试", true);
        renderOrders(res.data || []);
        if ((res.data || []).length) setTip("待配送订单加载完成");
      }

      async function loadInventory() {
        const res = await fetchInventorySnapshot();
        if (!res.success) {
          inventoryList.innerHTML = "<div class=\"inventory-item\">库存快照加载失败，请稍后重试</div>";
          return;
        }
        inventoryList.innerHTML = "";
        (res.data || []).forEach((item) => {
          const row = document.createElement("div");
          row.className = "inventory-item";
          row.innerHTML = `<div><strong>${item.spec}</strong></div><div>总库存：${item.onHand} 瓶</div><div>锁定库存：${item.locked} 瓶</div><div>可用库存：${item.available} 瓶</div>`;
          inventoryList.appendChild(row);
        });
      }

      async function loadSafety() {
        if (!selectedOrder) {
          currentSafety = null;
          setSafetyStatus("idle");
          setSafetyTip("请先选择订单");
          return;
        }
        const res = await fetchSafetyByOrder(selectedOrder.orderId);
        if (!res.success) {
          currentSafety = null;
          setSafetyStatus("idle");
          setSafetyTip(res.error || "安检记录加载失败", true);
          return;
        }
        if (!res.data) {
          currentSafety = null;
          setSafetyStatus("idle");
          setSafetyTip("完单后将自动触发安检流程");
          return;
        }
        currentSafety = res.data;
        setSafetyStatus(res.data.status || "pending");
        if (res.data.status === "failed") {
          setSafetyTip(`${res.data.lastError || "上报失败"}，可点击失败重试`, true);
        } else if (res.data.status === "completed") {
          setSafetyTip("安检上报已完成");
        } else {
          setSafetyTip("安检已触发，请补充检查项与照片后提交");
        }
      }

      payBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          paymentMethod = btn.dataset.method;
          syncPayBtn();
        });
      });

      completeBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        if (!window.confirm("确认执行完单并登记收款？")) return;
        setTip("正在提交完单...");
        const res = await completeOrder(selectedOrder.orderId, {
          receivedAmount: Number(receivedInput.value || 0),
          paymentMethod,
          recycledEmptyCount: Number(recycleInput.value || 0),
          owedEmptyCount: Number(owedInput.value || 0),
        });
        if (!res.success) return setTip(`${res.error || "完单失败"}，请修改后重试`, true);
        setTip(
          `完单成功：欠款 ${Number(res.data.owedAmount || 0).toFixed(2)} 元，欠瓶 ${Number(
            res.data.owedEmptyCount || 0
          )} 瓶；5 秒内可撤销`
        );
        await loadOrders();
        await loadInventory();
        await loadSafety();
      });

      cancelBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        if (!window.confirm("确认取消该订单并回滚库存？")) return;
        setTip("正在取消订单...");
        const res = await cancelOrder(selectedOrder.orderId);
        if (!res.success) return setTip(`${res.error || "取消失败"}，请重试`, true);
        setTip("订单已取消，库存已回滚，5 秒内可撤销");
        await loadOrders();
        await loadInventory();
        await loadSafety();
      });

      updateBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        setTip("正在保存基础修改...");
        const res = await updateOrder(selectedOrder.orderId, {
          scheduleAt: scheduleInput.value,
          address: addressInput.value,
        });
        if (!res.success) return setTip(`${res.error || "修改失败"}，请检查后重试`, true);
        setTip("订单基础信息已更新");
        await loadOrders();
        await loadInventory();
        await loadSafety();
      });

      undoBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        setTip("正在执行撤销...");
        const res = await undoOrderAction(selectedOrder.orderId);
        if (!res.success) return setTip(`${res.error || "撤销失败"}，可改用修改流程`, true);
        setTip("已撤销最近关键操作");
        await loadOrders();
        await loadInventory();
        await loadSafety();
      });

      submitSafetyBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setSafetyTip("请先选择订单并完成完单", true);
        const checkItems = safetyChecks.filter((x) => x.checked).map((x) => x.value);
        const photoUrls = String(photoInput.value || "")
          .split(",")
          .map((x) => x.trim())
          .filter(Boolean);
        const hasAbnormal = ["是", "y", "yes", "true", "1"].includes(String(abnormalInput.value || "").trim().toLowerCase());
        setSafetyTip("正在提交安检并执行上报...");
        const res = await submitSafetyByOrder(selectedOrder.orderId, {
          checkItems,
          photoUrls,
          hasAbnormal,
          hazardNote: hazardInput.value,
        });
        if (!res.success) return setSafetyTip(`${res.error || "安检提交失败"}，请修改后重试`, true);
        await loadSafety();
      });

      retrySafetyBtn.addEventListener("click", async () => {
        if (!currentSafety?.safetyId) return setSafetyTip("当前无可重试的安检记录", true);
        setSafetyTip("正在重试上报...");
        const res = await retrySafetyReport(currentSafety.safetyId);
        if (!res.success) return setSafetyTip(`${res.error || "重试失败"}，请稍后再试`, true);
        await loadSafety();
      });
      saveCollectionBtn.addEventListener("click", async () => {
        if (!selectedOrder || !selectedOrder.customerId) return setAccountTip("请先选择待配送订单。", true);
        setAccountTip("正在保存催收状态...");
        const res = await updateCollectionStatus(selectedOrder.customerId, {
          status: collectionStatus.value,
          note: collectionNote.value,
        });
        if (!res.success) return setAccountTip(res.error || "保存失败，请稍后重试。", true);
        await loadCustomerAccountByOrder(selectedOrder);
        setAccountTip("催收状态已保存。");
      });
      refreshAccountBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setAccountTip("请先选择待配送订单。", true);
        await loadCustomerAccountByOrder(selectedOrder);
      });

      backBtn.addEventListener("click", () => {
