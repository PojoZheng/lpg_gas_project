<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待配送完单</title>
    <style>
      :root {
        --brand: #4799a0;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --border: #eceff3;
        --text-primary: #111111;
        --text-secondary: #8b9098;
        --error: #ef4444;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
      .page { max-width: 460px; margin: 0 auto; padding: 16px 14px 28px; }
      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .title { margin: 0; font-size: 24px; font-weight: 700; }
      .btn { border: 1px solid var(--border); border-radius: 12px; background: #fff; height: 38px; padding: 0 12px; cursor: pointer; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 14px; margin-bottom: 12px; }
      .card-title { margin: 0 0 10px; font-size: 16px; font-weight: 600; }
      .order-btn { width: 100%; text-align: left; border: 1px solid var(--border); background: #fff; border-radius: 12px; padding: 10px; margin-bottom: 8px; cursor: pointer; }
      .order-btn.active { border-color: var(--brand); background: #f0f9fa; }
      .line2 { margin-top: 4px; color: var(--text-secondary); font-size: 13px; }
      .row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
      .row label { width: 74px; color: var(--text-secondary); font-size: 14px; }
      .row input, .row select { flex: 1; height: 40px; border: 1px solid var(--border); border-radius: 10px; padding: 0 10px; }
      .pay-methods { display: flex; gap: 8px; margin-bottom: 10px; }
      .pay-btn { flex: 1; height: 40px; border: 1px solid var(--border); border-radius: 12px; background: #fff; cursor: pointer; }
      .pay-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .primary { background: var(--brand); color: #fff; border-color: var(--brand); }
      .warn { color: #b45309; border-color: #f5d9a5; background: #fff7ed; }
      .tip { min-height: 20px; margin-top: 8px; font-size: 13px; color: var(--text-secondary); }
      .err { color: var(--error); }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 class="title">待配送完单</h1>
        <button class="btn" id="backBtn">返回工作台</button>
      </header>

      <section class="card">
        <h2 class="card-title">待配送订单</h2>
        <div id="orderList"></div>
      </section>

      <section class="card">
        <h2 class="card-title">完单与修改</h2>
        <div class="row"><label>应收金额</label><input id="amountInput" disabled /></div>
        <div class="row"><label>实收金额</label><input id="receivedInput" type="number" min="0" step="0.01" /></div>
        <div class="pay-methods">
          <button class="pay-btn active" data-method="wechat">微信收款</button>
          <button class="pay-btn" data-method="cash">现金收款</button>
          <button class="pay-btn" data-method="credit">记账</button>
        </div>
        <div class="row"><label>回收空瓶</label><input id="recycleInput" type="number" min="0" step="1" value="0" /></div>
        <div class="row"><label>欠瓶数量</label><input id="owedInput" type="number" min="0" step="1" value="0" /></div>
        <div class="row"><label>配送时间</label><input id="scheduleInput" placeholder="如：今天 18:30" /></div>
        <div class="row"><label>配送地址</label><input id="addressInput" placeholder="请输入配送地址" /></div>
        <div class="actions">
          <button class="btn primary" id="completeBtn">确认完单</button>
          <button class="btn" id="updateBtn">保存修改</button>
          <button class="btn warn" id="cancelBtn">取消订单</button>
          <button class="btn" id="undoBtn">5 秒撤销</button>
        </div>
        <p class="tip" id="tip"></p>
      </section>
    </main>

    <script type="module">
      import {
        fetchPendingDeliveryOrders,
        completeOrder,
        cancelOrder,
        updateOrder,
        undoOrderAction,
      } from "./delivery-complete-client.js";

      const orderList = document.getElementById("orderList");
      const backBtn = document.getElementById("backBtn");
      const amountInput = document.getElementById("amountInput");
      const receivedInput = document.getElementById("receivedInput");
      const recycleInput = document.getElementById("recycleInput");
      const owedInput = document.getElementById("owedInput");
      const scheduleInput = document.getElementById("scheduleInput");
      const addressInput = document.getElementById("addressInput");
      const completeBtn = document.getElementById("completeBtn");
      const updateBtn = document.getElementById("updateBtn");
      const cancelBtn = document.getElementById("cancelBtn");
      const undoBtn = document.getElementById("undoBtn");
      const tip = document.getElementById("tip");
      const payBtns = [...document.querySelectorAll(".pay-btn")];

      let selectedOrder = null;
      let paymentMethod = "wechat";

      function setTip(text, isError = false) {
        tip.textContent = text;
        tip.className = isError ? "tip err" : "tip";
      }

      function syncPayBtn() {
        payBtns.forEach((btn) => btn.classList.toggle("active", btn.dataset.method === paymentMethod));
      }

      function syncForm(order) {
        amountInput.value = Number(order.amount || 0).toFixed(2);
        receivedInput.value = Number(order.amount || 0).toFixed(2);
        recycleInput.value = "0";
        owedInput.value = "0";
        scheduleInput.value = order.scheduleAt || "";
        addressInput.value = order.address || "";
      }

      function renderOrders(list) {
        orderList.innerHTML = "";
        list.forEach((item) => {
          const btn = document.createElement("button");
          btn.className = "order-btn";
          btn.type = "button";
          btn.innerHTML = `<div>${item.customerName}（${item.spec} x ${item.quantity}）</div><div class="line2">${item.address}｜${item.scheduleAt}｜订单号 ${item.orderId}</div>`;
          btn.addEventListener("click", () => {
            selectedOrder = item;
            syncForm(item);
            [...orderList.children].forEach((x) => x.classList.remove("active"));
            btn.classList.add("active");
            setTip("已选择订单，可完单、取消或修改");
          });
          orderList.appendChild(btn);
        });
        if (!list.length) {
          setTip("当前无待配送订单，可先去快速开单创建", false);
          return;
        }
        selectedOrder = list[0];
        syncForm(list[0]);
        orderList.firstChild.classList.add("active");
      }

      async function loadOrders() {
        setTip("正在加载待配送订单...");
        const res = await fetchPendingDeliveryOrders();
        if (!res.success) return setTip(res.error || "加载失败，请点击重试", true);
        renderOrders(res.data || []);
        if ((res.data || []).length) setTip("待配送订单加载完成");
      }

      payBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          paymentMethod = btn.dataset.method;
          syncPayBtn();
        });
      });

      completeBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        if (!window.confirm("确认执行完单并登记收款？")) return;
        setTip("正在提交完单...");
        const res = await completeOrder(selectedOrder.orderId, {
          receivedAmount: Number(receivedInput.value || 0),
          paymentMethod,
          recycledEmptyCount: Number(recycleInput.value || 0),
          owedEmptyCount: Number(owedInput.value || 0),
        });
        if (!res.success) return setTip(`${res.error || "完单失败"}，请修改后重试`, true);
        setTip("完单成功，5 秒内可点击“5 秒撤销”恢复");
        await loadOrders();
      });

      cancelBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        if (!window.confirm("确认取消该订单并回滚库存？")) return;
        setTip("正在取消订单...");
        const res = await cancelOrder(selectedOrder.orderId);
        if (!res.success) return setTip(`${res.error || "取消失败"}，请重试`, true);
        setTip("订单已取消，库存已回滚，5 秒内可撤销");
        await loadOrders();
      });

      updateBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        setTip("正在保存基础修改...");
        const res = await updateOrder(selectedOrder.orderId, {
          scheduleAt: scheduleInput.value,
          address: addressInput.value,
        });
        if (!res.success) return setTip(`${res.error || "修改失败"}，请检查后重试`, true);
        setTip("订单基础信息已更新");
        await loadOrders();
      });

      undoBtn.addEventListener("click", async () => {
        if (!selectedOrder) return setTip("请先选择待配送订单", true);
        setTip("正在执行撤销...");
        const res = await undoOrderAction(selectedOrder.orderId);
        if (!res.success) return setTip(`${res.error || "撤销失败"}，可改用修改流程`, true);
        setTip("已撤销最近关键操作");
        await loadOrders();
      });

      backBtn.addEventListener("click", () => {
        window.location.href = "./workbench.html";
      });

      syncPayBtn();
      loadOrders();
    </script>
  </body>
</html>
