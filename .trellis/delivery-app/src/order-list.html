<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订单列表</title>
    <link rel="stylesheet" href="./delivery-shell.css" />
    <style>
      .page { min-height: 100vh; padding: 16px 14px calc(96px + env(safe-area-inset-bottom, 0px)); }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .back-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-button); background: #fff; cursor: pointer; }
      .title { margin: 0; font-size: 20px; font-weight: 600; font-family: var(--font-title); }
      .tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
      .tab { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text-secondary); position: relative; }
      .tab.active { color: var(--brand); font-weight: 600; }
      .tab.active::after { content: ""; position: absolute; bottom: 0; left: 8px; right: 8px; height: 2px; background: var(--brand); border-radius: 2px; }
      .search-box { width: 100%; height: 44px; border: 1px solid var(--border); border-radius: var(--radius-input); padding: 0 12px; margin-bottom: 16px; font-size: 14px; }
      .order-list { display: grid; gap: 12px; }
      .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 14px; cursor: pointer; transition: transform 0.1s; }
      .order-card:active { transform: scale(0.98); }
      .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      .customer-name { font-weight: 600; font-size: 16px; font-family: var(--font-title); }
      .status-badge { padding: 4px 10px; border-radius: 999px; font-size: 12px; }
      .status-pending { background: #fff7ed; color: #b45309; }
      .status-completed { background: #f0fdf4; color: #166534; }
      .status-cancelled { background: #f5f5f5; color: #757575; }
      .status-returned { background: #fef2f2; color: #c62828; }
      .order-info { display: grid; gap: 6px; font-size: 14px; color: var(--text-secondary); }
      .order-info-row { display: flex; justify-content: space-between; }
      .order-amount { font-weight: 600; color: var(--text-primary); font-family: var(--font-title); }
      .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
      .empty-title { font-size: 16px; margin-bottom: 8px; }
      .empty-desc { font-size: 14px; }
      .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
  </head>
  <body>
    <main class="app-page page">
      <header class="header">
        <button class="back-btn" id="backBtn">返回</button>
        <h1 class="title">订单列表</h1>
        <span></span>
      </header>

      <nav class="tabs">
        <button class="tab active" data-filter="all">全部</button>
        <button class="tab" data-filter="pending">待配送</button>
        <button class="tab" data-filter="completed">已完成</button>
        <button class="tab" data-filter="cancelled">已取消</button>
      </nav>

      <input type="text" class="search-box" id="searchInput" placeholder="搜索客户、地址、订单号..." />

      <div class="order-list" id="orderList">
        <div class="loading">加载中...</div>
      </div>
    </main>

    <div class="bottom-nav-wrap">
      <nav class="bottom-nav" aria-label="底部导航">
        <button class="nav-btn" id="navWorkbenchBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5" /><path d="M6.5 10.5V20h11V10.5" /></svg>
          <span>首页</span>
        </button>
        <button class="nav-btn" id="navQuickOrderBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19h14M7 17V7h10v10M9.5 10h5M9.5 13h5" /></svg>
          <span>客户</span>
        </button>
        <button class="nav-btn active" id="navMyBtn">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5" /><path d="M5 20c1.8-3.5 4.2-5 7-5s5.2 1.5 7 5" /></svg>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <script type="module">
      import { ensureAuthenticatedPage } from "./auth-client.js";
      import { fetchOrderList } from "./order-client.js";

      if (!ensureAuthenticatedPage()) {
        throw new Error("未登录");
      }

      let currentFilter = "all";
      let allOrders = [];

      const orderListEl = document.getElementById("orderList");
      const searchInput = document.getElementById("searchInput");

      function formatStatus(status) {
        const map = {
          pending_delivery: { text: "待配送", class: "status-pending" },
          completed: { text: "已完成", class: "status-completed" },
          cancelled: { text: "已取消", class: "status-cancelled" },
          returned: { text: "已退货", class: "status-returned" },
        };
        return map[status] || { text: status, class: "" };
      }

      function formatDate(timestamp) {
        if (!timestamp) return "";
        const date = new Date(Number(timestamp));
        return `${date.getMonth() + 1}月${date.getDate()}日 ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
      }

      function renderOrders(orders) {
        if (!orders.length) {
          orderListEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-title">暂无订单</div>
              <div class="empty-desc">还没有符合条件的订单</div>
            </div>
          `;
          return;
        }

        orderListEl.innerHTML = orders.map(order => {
          const status = formatStatus(order.orderStatus);
          return `
            <div class="order-card" data-order-id="${order.orderId}">
              <div class="order-header">
                <span class="customer-name">${order.customerName || "未知客户"}</span>
                <span class="status-badge ${status.class}">${status.text}</span>
              </div>
              <div class="order-info">
                <div class="order-info-row">
                  <span>${order.spec || ""} ${order.quantity || 0}瓶</span>
                  <span class="order-amount">¥${order.amount || 0}</span>
                </div>
                <div class="order-info-row">
                  <span>${order.address || ""}</span>
                  <span>${formatDate(order.createdAt)}</span>
                </div>
              </div>
            </div>
          `;
        }).join("");

        orderListEl.querySelectorAll(".order-card").forEach(card => {
          card.addEventListener("click", () => {
            const orderId = card.dataset.orderId;
            window.location.href = `./order-detail.html?orderId=${encodeURIComponent(orderId)}`;
          });
        });
      }

      function filterOrders() {
        let filtered = allOrders;

        if (currentFilter !== "all") {
          filtered = filtered.filter(o => {
            if (currentFilter === "pending") return o.orderStatus === "pending_delivery";
            if (currentFilter === "completed") return o.orderStatus === "completed";
            if (currentFilter === "cancelled") return o.orderStatus === "cancelled" || o.orderStatus === "returned";
            return true;
          });
        }

        const keyword = searchInput.value.trim().toLowerCase();
        if (keyword) {
          filtered = filtered.filter(o =>
            (o.customerName || "").toLowerCase().includes(keyword) ||
            (o.address || "").toLowerCase().includes(keyword) ||
            (o.orderId || "").toLowerCase().includes(keyword)
          );
        }

        renderOrders(filtered);
      }

      async function loadOrders() {
        try {
          const result = await fetchOrderList();
          if (result.success) {
            allOrders = result.data || [];
            filterOrders();
          } else {
            orderListEl.innerHTML = `<div class="empty-state"><div class="empty-title">加载失败</div><div class="empty-desc">${result.error || "请稍后重试"}</div></div>`;
          }
        } catch (err) {
          orderListEl.innerHTML = `<div class="empty-state"><div class="empty-title">加载失败</div><div class="empty-desc">${err.message}</div></div>`;
        }
      }

      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          currentFilter = tab.dataset.filter;
          filterOrders();
        });
      });

      searchInput.addEventListener("input", filterOrders);

      document.getElementById("backBtn").addEventListener("click", () => {
        window.location.href = "./my.html";
      });

      document.getElementById("navWorkbenchBtn").addEventListener("click", () => {
        window.location.href = "./workbench.html";
      });

      document.getElementById("navQuickOrderBtn").addEventListener("click", () => {
        window.location.href = "./quick-order.html";
      });

      document.getElementById("navMyBtn").addEventListener("click", () => {
        window.location.href = "./my.html";
      });

      loadOrders();
    </script>
  </body>
</html>
