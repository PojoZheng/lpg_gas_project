<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design System 最小接入示例</title>
    <link rel="stylesheet" href="../styles/tokens.css" />
    <link rel="stylesheet" href="../styles/components.css" />
  </head>
  <body class="ds-root">
    <div aria-hidden="true" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg">
        <use href="../icons/sprite.svg#i-home"></use>
      </svg>
    </div>
    <main class="ds-page">
      <h1 style="font-size: var(--ds-font-size-page-title); font-family: var(--ds-font-display);">最小接入示例（app/web 共用）</h1>

      <section class="ds-card">
        <h2 class="ds-card-title">按钮 / 卡片</h2>
        <button class="ds-btn ds-btn-primary">确认操作</button>
        <button class="ds-btn ds-btn-ghost" style="margin-left: 8px">次级操作</button>
      </section>

      <section class="ds-card">
        <h2 class="ds-card-title">表单</h2>
        <div class="ds-field">
          <label class="ds-label">客户姓名</label>
          <input class="ds-input" placeholder="请输入客户姓名" />
        </div>
        <div class="ds-tip">提示信息示例（错误时使用 .error）</div>
      </section>

      <section class="ds-card">
        <h2 class="ds-card-title">底部导航</h2>
        <div class="ds-nav">
          <button class="ds-nav-btn active">首页</button>
          <button class="ds-nav-btn">客户</button>
          <button class="ds-nav-btn">我的</button>
        </div>
      </section>

      <section class="ds-card">
        <h2 class="ds-card-title">状态与图标</h2>
        <span class="ds-status-badge success">同步成功</span>
        <span class="ds-status-badge warning" style="margin-left:8px;">待处理</span>
        <div style="margin-top: 8px;">
          <svg class="ds-icon" viewBox="0 0 24 24" aria-hidden="true">
            <use href="../icons/sprite.svg#i-home"></use>
          </svg>
          <svg class="ds-icon" viewBox="0 0 24 24" aria-hidden="true" style="margin-left:8px;">
            <use href="../icons/sprite.svg#i-customer"></use>
          </svg>
          <svg class="ds-icon" viewBox="0 0 24 24" aria-hidden="true" style="margin-left:8px;">
            <use href="../icons/sprite.svg#i-my"></use>
          </svg>
        </div>
      </section>

      <section class="ds-card">
        <h2 class="ds-card-title">强化组件（task-35）</h2>
        <div class="ds-page-header">
          <h3 class="ds-page-header-title">工作台</h3>
          <button class="ds-btn">刷新</button>
        </div>
        <div class="ds-stat-card" style="margin-bottom: 8px;">
          <div class="ds-stat-label">今日已收</div>
          <div class="ds-stat-value">￥860.00</div>
        </div>
        <div class="ds-form-section" style="margin-bottom: 8px;">
          <div class="ds-form-section-title">订单筛选</div>
          <div class="ds-field">
            <label class="ds-label">状态</label>
            <select class="ds-select"><option>全部状态</option></select>
          </div>
        </div>
        <div class="ds-empty-state" style="margin-bottom: 8px;">
          <p class="ds-empty-title">当前无待配送订单</p>
          <p class="ds-empty-desc">可前往快速开单创建新订单</p>
        </div>
        <div class="ds-feedback-banner info">数据已更新，可继续操作</div>
      </section>
    </main>
  </body>
</html>
