<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>同步队列与冲突处理</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
  </head>
  <body>
    <div class="platform-app">
      <aside class="side-nav">
        <div class="brand">LPG 平台</div>
        <nav class="menu-group">
          <a class="menu-link" href="./index.html">快速入口</a>
          <a class="menu-link" href="./platform-monitor.html">监控看板</a>
          <a class="menu-link" href="./policy-release.html">策略发布</a>
          <a class="menu-link active" href="./sync-queue.html">同步队列</a>
        </nav>
      </aside>
      <div class="content-wrap">
        <header class="top-bar">
          <div>
            <div class="breadcrumb"><span>平台端</span><span>/</span><span>同步队列</span></div>
            <h1 class="top-title">同步队列</h1>
          </div>
          <div class="top-actions">
            <button class="btn secondary" id="backBtn">返回平台入口</button>
          </div>
        </header>
        <main class="page-content">
      <section class="page-hero">
        <h2 class="page-title">离线同步与冲突处理</h2>
        <p class="page-subtitle">按筛选条件快速定位异常记录并执行重试或人工处理。</p>
      </section>

      <section class="card">
        <h2 class="card-title">新增离线变更</h2>
        <div class="field">
          <label>实体类型</label>
          <select id="entitySelect">
            <option value="order">订单</option>
            <option value="inventory">库存</option>
            <option value="customer">客户</option>
          </select>
        </div>
        <div class="field"><label>动作</label><input id="actionInput" value="update" /></div>
        <div class="field"><label>关联ID</label><input id="refIdInput" placeholder="如：ORD-xxxx 或 CUST-xxx" /></div>
        <div class="field"><label>本地状态</label><input id="localStatusInput" placeholder="如：pending_delivery/completed" /></div>
        <div class="field"><label>库存基线</label><input id="baseOnHandInput" type="number" placeholder="库存同步时填写" /></div>
        <div class="btn-row">
          <button class="btn primary" id="enqueueBtn">加入离线队列</button>
          <button class="btn disabled" type="button" disabled>导入模板（预留）</button>
        </div>
        <p class="tip" id="enqueueTip"></p>
      </section>

      <section class="card">
        <h2 class="card-title">队列统计</h2>
        <div class="kpi-grid" id="stats"></div>
        <div class="btn-row">
          <button class="btn primary" id="batchBtn">批量同步</button>
          <button class="btn ghost" id="applyFilterBtn">刷新筛选结果</button>
        </div>
        <p class="tip" id="batchTip"></p>
      </section>

      <section class="card">
        <h2 class="card-title">冲突与处理结果</h2>
        <div class="filter-panel">
          <div class="filter-grid">
            <div class="field">
              <label>状态筛选</label>
              <select id="statusFilter">
                <option value="all">全部状态</option>
                <option value="pending">待同步</option>
                <option value="syncing">同步中</option>
                <option value="failed">同步失败</option>
                <option value="completed">已完成</option>
              </select>
            </div>
            <div class="field">
              <label>实体筛选</label>
              <select id="entityFilter">
                <option value="all">全部实体</option>
                <option value="order">订单</option>
                <option value="inventory">库存</option>
                <option value="customer">客户</option>
              </select>
            </div>
            <div class="field">
              <label>关键字</label>
              <input id="keywordFilter" placeholder="按离线ID/错误关键字筛选" />
            </div>
            <div class="field">
              <label>筛选操作</label>
              <button class="btn secondary" id="filterBtn">应用筛选</button>
            </div>
          </div>
          <div class="switch-line">
            <label><input type="checkbox" id="manualOnlyFilter" /> 仅看人工处理</label>
            <label><input type="checkbox" id="conflictOnlyFilter" /> 仅看冲突</label>
          </div>
        </div>
        <div class="table-card">
          <div class="table-head">
            <strong>队列记录</strong>
            <span class="tip">列表支持失败重试与转人工处理</span>
          </div>
          <div id="queueList"></div>
        </div>
      </section>
        </main>
      </div>
    </div>

    <script type="module">
      import {
        fetchSyncQueue,
        enqueueSyncItem,
        batchSubmitSync,
        retrySyncItem,
        markSyncManual,
      } from "./sync-queue-client.js";

      const backBtn = document.getElementById("backBtn");
      const entitySelect = document.getElementById("entitySelect");
      const actionInput = document.getElementById("actionInput");
      const refIdInput = document.getElementById("refIdInput");
      const localStatusInput = document.getElementById("localStatusInput");
      const baseOnHandInput = document.getElementById("baseOnHandInput");
      const enqueueBtn = document.getElementById("enqueueBtn");
      const enqueueTip = document.getElementById("enqueueTip");
      const stats = document.getElementById("stats");
      const batchBtn = document.getElementById("batchBtn");
      const batchTip = document.getElementById("batchTip");
      const queueList = document.getElementById("queueList");
      const statusFilter = document.getElementById("statusFilter");
      const entityFilter = document.getElementById("entityFilter");
      const keywordFilter = document.getElementById("keywordFilter");
      const manualOnlyFilter = document.getElementById("manualOnlyFilter");
      const conflictOnlyFilter = document.getElementById("conflictOnlyFilter");
      const filterBtn = document.getElementById("filterBtn");
      const applyFilterBtn = document.getElementById("applyFilterBtn");

      function setTip(el, text, isError = false) {
        el.textContent = text;
        el.className = isError ? "tip err" : "tip";
      }

      function renderStats(data, filteredStats = null) {
        stats.innerHTML = "";
        const rows = [
          ["待同步", data.pending || 0],
          ["同步中", data.syncing || 0],
          ["同步失败", data.failed || 0],
          ["已完成", data.completed || 0],
          ["人工处理", data.manualRequired || 0],
          ["等待重试", data.waitingRetry || 0],
        ];
        rows.forEach(([label, value]) => {
          const el = document.createElement("div");
          el.className = "kpi-card";
          el.innerHTML = `<div>${label}</div><strong>${value}</strong>`;
          stats.appendChild(el);
        });
        if (filteredStats) {
          const summary = document.createElement("div");
          summary.className = "kpi-card";
          summary.innerHTML = `<div>筛选命中</div><strong>${filteredStats.pending + filteredStats.syncing + filteredStats.failed + filteredStats.completed}</strong>`;
          stats.appendChild(summary);
        }
      }

      function renderList(items) {
        queueList.innerHTML = "";
        if (!items.length) {
          queueList.innerHTML = "<p class=\"tip\">当前无离线队列记录</p>";
          return;
        }
        items.forEach((item) => {
          const box = document.createElement("div");
          box.className = "item";
          box.innerHTML = `
            <div><strong>${item.entityType}</strong> / ${item.action} <span class="status-tag">${item.syncStatus}</span></div>
            <div class="item-line">离线ID：${item.offlineId}</div>
            <div class="item-line">重试次数：${item.retryCount}，冲突类型：${item.conflictType || "无"}</div>
            <div class="item-line">处理结果：${item.resultSummary || "待处理"}${item.lastError ? `（${item.lastError}）` : ""}</div>
            <div class="item-line">下次重试：${item.nextRetryAt ? new Date(item.nextRetryAt).toLocaleString("zh-CN", { hour12: false }) : "可立即重试"}</div>
            <div class="item-actions">
              <button class="btn retry-btn" data-id="${item.offlineId}">失败重试</button>
              <button class="btn manual-btn" data-id="${item.offlineId}">转人工处理</button>
            </div>
          `;
          queueList.appendChild(box);
        });
        [...document.querySelectorAll(".retry-btn")].forEach((btn) => {
          btn.addEventListener("click", async () => {
            const res = await retrySyncItem(btn.dataset.id);
            if (!res.success) return setTip(batchTip, res.error || "重试失败", true);
            setTip(batchTip, "重试已执行，结果已更新");
            await loadQueue();
          });
        });
        [...document.querySelectorAll(".manual-btn")].forEach((btn) => {
          btn.addEventListener("click", async () => {
            const res = await markSyncManual(btn.dataset.id);
            if (!res.success) return setTip(batchTip, res.error || "转人工失败", true);
            setTip(batchTip, "该记录已转人工处理");
            await loadQueue();
          });
        });
      }

      async function loadQueue() {
        const res = await fetchSyncQueue({
          status: statusFilter.value,
          entityType: entityFilter.value,
          keyword: keywordFilter.value,
          manualOnly: manualOnlyFilter.checked ? "1" : "0",
          conflictOnly: conflictOnlyFilter.checked ? "1" : "0",
        });
        if (!res.success) {
          setTip(batchTip, res.error || "队列加载失败，请稍后重试", true);
          return;
        }
        renderStats(res.data.stats || {}, res.data.filteredStats || null);
        renderList(res.data.items || []);
      }

      enqueueBtn.addEventListener("click", async () => {
        const entityType = entitySelect.value;
        const action = String(actionInput.value || "").trim();
        const refId = String(refIdInput.value || "").trim();
        const localStatus = String(localStatusInput.value || "").trim();
        const baseOnHand = Number(baseOnHandInput.value || "");
        const payload = {};
        if (entityType === "order") {
          payload.orderId = refId;
          payload.orderStatus = localStatus;
        } else if (entityType === "inventory") {
          payload.spec = refId || "15kg";
          if (Number.isFinite(baseOnHand)) payload.baseOnHand = baseOnHand;
        } else {
          payload.customerId = refId;
        }
        setTip(enqueueTip, "正在写入离线队列...");
        const res = await enqueueSyncItem({
          entityType,
          action,
          payload,
        });
        if (!res.success) return setTip(enqueueTip, res.error || "入队失败，请检查后重试", true);
        setTip(enqueueTip, "离线变更已加入队列");
        await loadQueue();
      });

      batchBtn.addEventListener("click", async () => {
        setTip(batchTip, "正在批量同步...");
        const res = await batchSubmitSync({});
        if (!res.success) return setTip(batchTip, res.error || "批量同步失败，请稍后重试", true);
        const data = res.data || {};
        setTip(batchTip, `批量同步完成：成功 ${data.completed || 0} 条，失败 ${data.failed || 0} 条`);
        await loadQueue();
      });

      backBtn.addEventListener("click", () => {
        window.location.href = "./index.html";
      });
      filterBtn.addEventListener("click", () => {
        loadQueue();
      });
      applyFilterBtn.addEventListener("click", () => {
        loadQueue();
      });
      manualOnlyFilter.addEventListener("change", () => loadQueue());
      conflictOnlyFilter.addEventListener("change", () => loadQueue());

      loadQueue();
    </script>
  </body>
</html>
