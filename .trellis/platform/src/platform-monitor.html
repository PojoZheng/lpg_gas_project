<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>平台监控与合规看板</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
  </head>
  <body>
    <div class="platform-app">
      <aside class="side-nav">
        <div class="brand">LPG 平台</div>
        <nav class="menu-group">
          <a class="menu-link" href="./index.html">快速入口</a>
          <a class="menu-link active" href="./platform-monitor.html">监控看板</a>
          <a class="menu-link" href="./policy-release.html">策略发布</a>
          <a class="menu-link" href="./sync-queue.html">同步队列</a>
        </nav>
      </aside>

      <div class="content-wrap">
        <header class="top-bar">
          <div>
            <div class="breadcrumb"><span>平台端</span><span>/</span><span>监控看板</span></div>
            <h1 class="top-title">平台监控看板</h1>
          </div>
          <div class="top-actions">
            <button class="btn secondary" id="backBtn">返回平台入口</button>
          </div>
        </header>

        <main class="page-content">
          <section class="page-hero">
            <h2 class="page-title">经营与合规总览</h2>
            <p class="page-subtitle">聚合关键指标并提供异常重试入口，支持快速定位问题。</p>
          </section>
          <section class="card">
            <h2 class="card-title">核心经营指标</h2>
            <div class="grid-2" id="bizMetrics"></div>
          </section>

          <section class="card">
            <h2 class="card-title">合规上报状态</h2>
            <div class="grid-2" id="complianceMetrics"></div>
          </section>

          <section class="card">
            <h2 class="card-title">异常下钻与处置</h2>
            <div class="table-card">
              <div class="table-head">
                <strong>失败记录列表</strong>
                <button class="btn ghost" type="button">按更新时间排序</button>
              </div>
              <div id="failedList"></div>
            </div>
          </section>

          <p class="tip" id="tip"></p>
        </main>
      </div>
    </div>

    <script type="module">
      import {
        fetchBusinessMetrics,
        fetchComplianceMetrics,
        retrySafetyById,
      } from "./platform-monitor-client.js";

      const backBtn = document.getElementById("backBtn");
      const bizMetrics = document.getElementById("bizMetrics");
      const complianceMetrics = document.getElementById("complianceMetrics");
      const failedList = document.getElementById("failedList");
      const tip = document.getElementById("tip");

      function setTip(text, isError = false) {
        tip.textContent = text;
        tip.className = isError ? "tip err" : "tip";
      }

      function renderMetric(target, rows) {
        target.innerHTML = "";
        rows.forEach(([label, value]) => {
          const el = document.createElement("div");
          el.className = "metric";
          el.innerHTML = `<div>${label}</div><strong>${value}</strong>`;
          target.appendChild(el);
        });
      }

      function fmtTime(ts) {
        if (!ts) return "未知";
        return new Date(ts).toLocaleString("zh-CN", { hour12: false });
      }

      async function loadBusiness() {
        const res = await fetchBusinessMetrics();
        if (!res.success) throw new Error(res.error || "经营指标加载失败");
        const d = res.data || {};
        renderMetric(bizMetrics, [
          ["总订单数", d.order?.totalOrders || 0],
          ["待配送订单", d.order?.pendingDeliveryOrders || 0],
          ["已完成订单", d.order?.completedOrders || 0],
          ["累计实收", `￥${Number(d.finance?.totalRevenue || 0).toFixed(2)}`],
          ["待收金额", `￥${Number(d.finance?.pendingReceivable || 0).toFixed(2)}`],
          ["同步失败", d.sync?.failedCount || 0],
        ]);
      }

      async function loadCompliance() {
        const res = await fetchComplianceMetrics();
        if (!res.success) throw new Error(res.error || "合规指标加载失败");
        const s = res.data?.summary || {};
        renderMetric(complianceMetrics, [
          ["安检总数", s.total || 0],
          ["上报成功", s.completed || 0],
          ["上报失败", s.failed || 0],
          ["待上报", s.pending || 0],
          ["异常安检", s.abnormal || 0],
        ]);

        const failed = res.data?.failedList || [];
        failedList.innerHTML = "";
        if (!failed.length) {
          failedList.innerHTML = "<p class=\"tip\">当前没有上报失败记录</p>";
          return;
        }
        failed.forEach((x) => {
          const row = document.createElement("div");
          row.className = "item";
          row.innerHTML = `
            <div class="item-line">安检ID：${x.safetyId}</div>
            <div class="item-line">订单：${x.orderId} / 客户：${x.customerName}</div>
            <div class="item-line">失败原因：${x.lastError || "未知"}</div>
            <div class="item-line">重试次数：${x.reportAttempts} / 更新时间：${fmtTime(x.updatedAt)}</div>
            <button class="btn danger retry-btn" data-id="${x.safetyId}">立即重试上报</button>
          `;
          failedList.appendChild(row);
        });
        [...document.querySelectorAll(".retry-btn")].forEach((btn) => {
          btn.addEventListener("click", async () => {
            setTip("正在执行重试...");
            const r = await retrySafetyById(btn.dataset.id);
            if (!r.success) return setTip(r.error || "重试失败，请稍后再试", true);
            setTip("重试请求已提交");
            await loadCompliance();
          });
        });
      }

      async function loadAll() {
        try {
          setTip("正在加载平台监控看板...");
          await loadBusiness();
          await loadCompliance();
          setTip("看板已更新");
        } catch (err) {
          setTip(err.message || "加载失败，请稍后重试", true);
        }
      }

      backBtn.addEventListener("click", () => {
        window.location.href = "./index.html";
      });

      loadAll();
    </script>
  </body>
</html>
