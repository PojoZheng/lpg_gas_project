<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>平台端统一入口</title>
    <link rel="stylesheet" href="./platform-design-system.css" />
  </head>
  <body>
    <div class="platform-app">
      <aside class="side-nav">
        <div class="brand">LPG 平台</div>
        <nav class="menu-group">
          <a class="menu-link active" href="./index.html">快速入口</a>
          <a class="menu-link" href="./platform-monitor.html">监控看板</a>
          <a class="menu-link" href="./policy-release.html">策略发布</a>
          <a class="menu-link" href="./sync-queue.html">同步队列</a>
        </nav>
      </aside>

      <div class="content-wrap">
        <header class="top-bar">
          <h1 class="top-title">平台端统一入口</h1>
          <div class="top-actions">
            <a class="btn" href="./platform-monitor.html">查看监控</a>
          </div>
        </header>
        <main class="page-content">
          <section class="metrics">
            <article class="metric-card">
              <div class="metric-label">模块数</div>
              <div class="metric-value">3</div>
              <div class="metric-note">监控、策略、同步</div>
            </article>
            <article class="metric-card">
              <div class="metric-label">入口可达</div>
              <div class="metric-value">100%</div>
              <div class="metric-note">一跳进入核心页面</div>
            </article>
            <article class="metric-card">
              <div class="metric-label">导航一致性</div>
              <div class="metric-value">已统一</div>
              <div class="metric-note">左侧导航 + 顶栏</div>
            </article>
            <article class="metric-card">
              <div class="metric-label">视觉风格</div>
              <div class="metric-value">对齐中</div>
              <div class="metric-note">浅底、卡片、弱边框</div>
            </article>
          </section>

          <section class="card">
            <h2 class="card-title">经营与合规监控</h2>
            <div class="btn-row">
              <a class="btn primary" href="./platform-monitor.html">进入监控看板</a>
            </div>
          </section>

          <section class="card">
            <h2 class="card-title">策略配置与发布</h2>
            <div class="btn-row">
              <a class="btn primary" href="./policy-release.html">进入策略发布</a>
            </div>
          </section>

          <section class="card">
            <h2 class="card-title">同步冲突与人工处理</h2>
            <div class="btn-row">
              <a class="btn primary" href="./sync-queue.html">进入同步队列</a>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
