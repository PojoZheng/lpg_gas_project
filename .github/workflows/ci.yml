# Trellis：在 PR / push 上跑静态检查与脚本化回归（无需本地预览服务）
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Task graph / conflict check
        run: python3 ./.trellis/scripts/task_conflict_check.py

      - name: Auto test runner (default: backend JS syntax + npm scripts if present)
        run: python3 ./.trellis/scripts/auto_test_runner.py --once

      - name: Delivery-app client JS syntax
        run: |
          set -e
          if [ -d .trellis/delivery-app/src ]; then
            find .trellis/delivery-app/src -name '*.js' -print0 | while IFS= read -r -d '' f; do
              echo "node --check $f"
              node --check "$f"
            done
          fi

      - name: Regression smokes (task 02 / 03)
        run: |
          set -e
          python3 ./.trellis/scripts/task02_smoke_test.py
          python3 ./.trellis/scripts/task03_smoke_test.py
