name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Task conflict check
        run: python3 ./.trellis/scripts/task_conflict_check.py

      - name: Auto test runner once
        run: python3 ./.trellis/scripts/auto_test_runner.py --once

      - name: Backend syntax check
        run: |
          set -e
          if [ -d .trellis/backend/src ]; then
            for f in .trellis/backend/src/*.js; do
              [ -f "$f" ] || continue
              node --check "$f"
            done
          fi
